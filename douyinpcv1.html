<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>douyinpcv1 · 抖音双主线经营 PC Workbench · 数据接入前最终业务版</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{--bg:#0b0e14;--panel:#10141d;--card:#151b28;--line:#232b3d;--tx:#dce4f0;--dim:#8b98ad;
--red:#ff5c5c;--green:#3ad98a;--amber:#ffb020;--blue:#54a8ff;--acc:#25d0c8}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--tx);font:13px/1.55 -apple-system,"PingFang SC","Microsoft YaHei",sans-serif}
.pc-shell{display:grid;height:100vh;grid-template-rows:56px minmax(0,1fr) 30px;
  grid-template-columns:214px minmax(0,1fr) 366px;
  grid-template-areas:"top top top" "side main right" "foot foot foot"}
.topbar{grid-area:top;display:flex;align-items:center;gap:10px;padding:0 14px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:nowrap;overflow-x:auto}
.topbar .lg{font-weight:800;color:var(--acc);white-space:nowrap}
.topbar label{color:var(--dim);font-size:11px;white-space:nowrap}
select,input[type=text]{background:#0d1220;border:1px solid var(--line);color:var(--tx);border-radius:6px;padding:5px 8px;font-size:12px}
.chip{display:inline-block;padding:3px 9px;border-radius:999px;border:1px solid var(--line);font-size:11px;color:var(--dim);white-space:nowrap}
.chip.mode{border-color:var(--amber);color:var(--amber)}
.sidebar{grid-area:side;background:var(--panel);border-right:1px solid var(--line);padding:10px 8px;overflow:auto}
.nav{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;cursor:pointer;color:var(--dim);user-select:none}
.nav:hover{background:#171e2e}
.nav.on{background:#1b2436;color:#fff;font-weight:700}
.nav .cnt{margin-left:auto;min-width:18px;text-align:center;background:var(--red);color:#fff;border-radius:999px;font-size:10px;padding:1px 5px}
.nav .cnt.zero{background:#26314a;color:var(--dim)}
.main{grid-area:main;overflow:auto;padding:14px}
.right{grid-area:right;background:var(--panel);border-left:1px solid var(--line);overflow:auto;padding:12px}
.foot{grid-area:foot;display:flex;align-items:center;gap:14px;padding:0 14px;background:var(--panel);border-top:1px solid var(--line);color:var(--dim);font-size:11px}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:12px}
.card h4{margin:0 0 8px;font-size:13px}
.hint{color:var(--dim);font-size:11px;line-height:1.6}
.cols2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cols3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.tb{width:100%;border-collapse:collapse;font-size:12px}
.tb th{color:var(--dim);text-align:left;padding:6px 8px;border-bottom:1px solid var(--line);font-weight:600;white-space:nowrap}
.tb td{padding:6px 8px;border-bottom:1px solid #1a2132;vertical-align:top}
.tb tr.click{cursor:pointer}.tb tr.click:hover{background:#182034}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;vertical-align:middle}
.dot.ok{background:var(--green)}.dot.bad{background:var(--red)}.dot.na{background:#3a4560}.dot.warn{background:var(--amber)}
.kv{color:var(--dim)} .kv b{color:var(--tx)}
.btn{display:inline-block;background:#1c2740;border:1px solid #2c3a5c;color:var(--tx);border-radius:7px;padding:5px 11px;font-size:12px;cursor:pointer;user-select:none}
.btn:hover{background:#243354}
.btn.go{border-color:var(--green);color:var(--green)}
.btn.red{border-color:var(--red);color:var(--red)}
.btn.warn{border-color:var(--amber);color:var(--amber)}
.btn.dis{opacity:.45;cursor:not-allowed}
.badge{display:inline-block;padding:1px 7px;border-radius:999px;font-size:10px;border:1px solid var(--line);color:var(--dim)}
.badge.money{border-color:var(--amber);color:var(--amber)}
.badge.rej{border-color:var(--red);color:var(--red)}
.badge.st{border-color:var(--blue);color:var(--blue)}
.badge.done{border-color:var(--green);color:var(--green)}
.tile{background:#121828;border:1px solid var(--line);border-radius:9px;padding:9px;cursor:pointer}
.tile:hover{border-color:#33456e}
.tile .mk{color:var(--dim);font-size:11px}
.tile .mv{font-size:17px;font-weight:800;margin-top:2px}
.tile.ok .mv{color:var(--green)}.tile.bad .mv{color:var(--red)}.tile.na .mv{color:#5b6a88}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.swim{display:grid;grid-template-columns:120px repeat(7,minmax(0,1fr));gap:6px;font-size:12px}
.swim .hd{color:var(--dim);font-weight:700;text-align:center;padding:6px 0;cursor:pointer}
.swim .rowhd{color:var(--dim);font-weight:700;display:flex;align-items:center}
.swimcell{background:#121828;border:1px solid var(--line);border-radius:8px;padding:7px 8px;cursor:pointer;min-height:52px}
.swimcell:hover{border-color:#33456e}
.pipe{display:flex;align-items:stretch;gap:0;overflow-x:auto;padding:4px 0}
.pnode{background:#121828;border:1px solid var(--line);border-radius:9px;padding:9px 10px;min-width:150px;cursor:pointer;flex:1}
.pnode:hover{border-color:#33456e}
.parrow{display:flex;align-items:center;color:#3a4a70;padding:0 5px;font-size:16px}
.kb{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}
.kbcol{background:#101625;border:1px solid var(--line);border-radius:9px;padding:8px;min-height:90px}
.kbcol h5{margin:0 0 6px;color:var(--dim);font-size:11px}
.kbcard{background:#161e30;border:1px solid #24304c;border-radius:7px;padding:6px 8px;margin-bottom:6px;cursor:pointer;font-size:11.5px}
.kbcard:hover{border-color:#3a4c78}
pre.json{background:#0c101c;border:1px solid var(--line);border-radius:8px;padding:9px;font-size:10.5px;line-height:1.5;overflow:auto;color:#9fd0ff;max-height:340px;white-space:pre-wrap;word-break:break-all}
.toastwrap{position:fixed;right:16px;bottom:40px;z-index:99;display:flex;flex-direction:column;gap:8px;max-width:420px}
.toast{background:#141c2e;border:1px solid var(--line);border-left:4px solid var(--blue);border-radius:8px;padding:9px 12px;font-size:12px;box-shadow:0 6px 22px rgba(0,0,0,.5)}
.toast.go{border-left-color:var(--green)}.toast.red{border-left-color:var(--red)}.toast.warn{border-left-color:var(--amber)}
.sep{border-top:1px dashed var(--line);margin:9px 0}
mark{background:#3a4a12;color:#e8ffb0;padding:0 2px;border-radius:3px}
@media(min-width:1700px){.pc-shell{grid-template-columns:230px minmax(0,1fr) 400px}}
</style>
</head>
<body>
<div class="pc-shell">
  <div class="topbar" id="topbar"></div>
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"></div>
  <div class="right" id="right"></div>
  <div class="foot" id="foot"></div>
</div>
<div class="toastwrap" id="tw"></div>
<script src="douyincore.js"></script>
<script>


/* ============================================================
   douyinpcv1 · PC Workbench 壳(渲染层)
   业务数据/规则/判级/SOP/归因 全部来自上方同源 core(douyinv20 逐字抽取)
   壳只做:布局 / 表格化 / 泳道 / 管道 / 看板 / 审批中心 / 右侧诊断
   ============================================================ */
const PC_VERSION={app_version:"douyinpcv1",theme:"抖音双主线经营 PC Workbench",data_mode:VERSION.data_mode,platform:"PC 1440/1920",core:"douyinv20 同源(douyincore)"};
const REFRESH_TS="2026-07-11 09:30";
const SKU_LIST=[
 {id:SKU.id||"DY-LYX-Q10",name:SKU.name,f:1,stage:null,owner:"种草达人一线"},
 {id:"DY-WDM-201",name:"味达美·臻品臻醇酱油1L",f:0.82,stage:"growth",owner:"带货达人一线"},
 {id:"DY-CBL-330",name:"葱伴侣·葱香豆瓣酱330g",f:0.65,stage:"mature",owner:"直播间一线"}];
const RANGE_F={today:0.93,last_7_days:1,last_30_days:1.06};
const RANGE_NM={today:"今日",last_7_days:"近7天",last_30_days:"近30天"};
const GMV_MOCK={import:86000,growth:420000,mature:980000,decline:260000,renewal:210000,retire:12000};
const ROI_MOCK={import:1.1,growth:1.8,mature:2.6,decline:1.2,renewal:1.4,retire:0};
const DATA_SRC=[
 ["巨量云图","已联调(mock回放)","2026-07-11 08:50","96%","aiq分层字段缺","作战官","hybrid_ready"],
 ["巨量星图","待接入","—","0%","达人历史CPA3","作战官","接口申请中"],
 ["巨量千川","已联调(mock回放)","2026-07-11 08:50","92%","素材疲劳度","作战官","hybrid_ready"],
 ["抖店","待接入","—","0%","退款原因码","带货达人岗","接口申请中"],
 ["电商罗盘/灵犀","待接入","—","0%","搜索词组件","作战官","接口申请中"],
 ["订单系统","待接入","—","0%","sku_nps问卷","主管","字段§七预留"],
 ["手工导入","可用","2026-07-11 09:12","—","NPS临时通道","主管","manual_import"]];
const PC_SWIM=[
 {row:"seed", nm:"种草达人岗", cells:["人群场景","内容共创","兴趣测试","信任建立","外溢承接","口碑反馈","内容资产"]},
 {row:"sell", nm:"带货达人岗", cells:["货盘机会","卖点脚本","点击测试","加购验证","成交转化","退款反馈","复购资产"]},
 {row:"live", nm:"直播间岗",   cells:["人群理解","话术共创","进房测试","停留验证","直播成交","场次复盘","切片资产"]},
 {row:"ops",  nm:"作战官",     cells:["定标","协同","判断","诊断","分流","回流","复盘"]}];
const ROLE_HOME={seed_kol:"today",commerce_kol:"today",live_room:"today",ops:"ledger",mgr:"cockpit"};
const NAV=[["today","📌 今日运营"],["dual","🎯 双前线 J0–J6"],["pipe","🧩 N0–N6 引擎槽"],["collect","📥 量实 / 数据口径"],["ledger","📚 三本账"],["task","🧠 任务 / 复盘 / SOP"],["cockpit","🛩 驾驶舱"]];
const P={screen:"today",sku:SKU_LIST[0].id,range:"last_7_days",search:"",diag:null,sopRole:"sop_seed",lastExport:null,primaryStage:null};

/* ---------- 壳基础 ---------- */
function toast(msg,cls){const tw=document.getElementById('tw');const t=document.createElement('div');t.className='toast '+(cls||'');t.innerHTML=msg;tw.appendChild(t);setTimeout(()=>t.remove(),4200);}
function esc(x){return String(x).replace(/</g,'&lt;');}
function curSkuMeta(){return SKU_LIST.find(x=>x.id===P.sku)||SKU_LIST[0];}
function skuF(){return curSkuMeta().f*(RANGE_F[P.range]||1);}
function pcWrap(m){const f=skuF();if(f===1)return m;const v=+(m.v*f).toPrecision(6);const pass=m.dir==='lt'?(v<m.t):(v>=m.t);return Object.assign({},m,{v,show:v,pass});}
function pcMetrics(){return curMetrics().map(pcWrap);}
function pcLed(){const L=led();return {seed:L.seed.map(pcWrap),sell:L.sell.map(pcWrap),joint:L.joint.map(pcWrap)};}
function pcLedMap(){const o={};const L=pcLed();['seed','sell','joint'].forEach(g=>L[g].forEach(m=>o[m.k]=m));return o;}
function pcFired(){const lm=pcLedMap();return RULES.filter(r=>{try{return !!r.when(lm)}catch(e){return false}});}
function pcGate(){const mp=pcMetrics().every(m=>m.pass);const gr=curSKU().gate_result||{};const red=gr.hard_redline?gr.hard_redline.pass===true:true;return mp&&red&&gatePass()===gatePass();}
function pcGateFull(){return skuF()===1?gatePass():(pcMetrics().every(m=>m.pass));}
function rowKeys(row){const L=pcLed();if(row==='seed')return new Set(L.seed.map(m=>m.k));if(row==='sell')return new Set(L.sell.filter(m=>!/^live/.test(m.k)).map(m=>m.k));if(row==='live')return new Set(L.sell.filter(m=>/^live/.test(m.k)).map(m=>m.k));return new Set(Object.keys(pcLedMap()));}
function cellLamp(j,row){const node=JOURNEY.find(x=>x.j===j);if(!node)return 'na';const ks=rowKeys(row);const rel=(node.keys||[]).filter(k=>ks.has(k));if(!rel.length)return 'na';const lm=pcLedMap();return rel.every(k=>lm[k]&&lm[k].pass)?'ok':'bad';}
function dotOf(m){return '<span class="dot '+(m.pass?'ok':'bad')+'"></span>';}
function gapOf(m){const g=m.dir==='lt'?(m.t-m.v):(m.v-m.t);const good=m.dir==='lt'?(m.v<m.t):(m.v>=m.t);return '<span style="color:var(--'+(good?'green':'red')+')">'+(good?'+':'')+fmt(g)+(m.u||'')+'</span>';}
function hl(txt){if(!P.search)return esc(txt);const t=esc(txt);try{return t.replace(new RegExp(P.search.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),s=>'<mark>'+s+'</mark>');}catch(e){return t;}}
function matches(m){if(!P.search)return true;return (m.label+' '+m.k).toLowerCase().includes(P.search.toLowerCase());}

/* ---------- 壳动作(语义=douyinv20,渲染换PC) ---------- */
function hsConfirm(side){
  if(hsExempt()){toast("本阶段停投·握手不适用(new_spend_allowed=false)","warn");return;}
  const perm={seed:['seed_kol','ops','mgr'],commerce:['commerce_kol','ops','mgr'],live:['live_room','ops','mgr']};
  const nm={seed:"种草岗",commerce:"带货岗",live:"直播岗"};
  if((perm[side]||[]).indexOf(S.role)<0){toast(nm[side]+"确认只能由 "+nm[side].replace("岗","")+"/作战官/主管 点(permission_boundary)","red");return;}
  const h=hsState();
  if(h[side]){toast("该侧已确认过(留痕不可撤·要改走主管) · "+h[side].by+" · "+h[side].ts,"warn");return;}
  h[side]={by:OP_ROLES[S.role]||S.role,role:S.role,ts:"W28-D6 14:2"+Object.keys(h).filter(k=>h[k]).length};
  render();
  toast(hsPass()?"🤝 N1↔N2 握手完成(unlock_rule: 种草∧(带货∨直播)) · N2 采买通道解锁":"已确认「"+nm[side]+"」· 等对侧确认(unlock_rule: seed AND (commerce OR live))",hsPass()?"go":"warn");
}
function toggleN3(i){
  const ov=S.n3Edited[S.stage]=S.n3Edited[S.stage]||{};const cur=(i in ov)?ov[i]:true;ov[i]=!cur;render();
  const it=n3Items()[i];
  toast(it.pass?("✓ "+it.name+" 已修复"+(n3Pass()?" · N3全过·允许进N2加投":"")):("⛔ "+it.name+" 未过 → "+it.cons+" · N3未过不准进N2加投"),it.pass?"go":"red");
}
function buy(amt){
  if(!(S.stage==='decline'||S.stage==='retire')){
    if(!hsPass()){toast("⛔ N1↔N2 联合策略未握手 · 内容没绑投放策略,不准花钱(N0–N6 屏握手卡确认)","red");return;}
    if(!n3Pass()){toast("⛔ N3 站内承接未过 · 不准进N2加投(N0–N6 屏检查表修复)","red");return;}
  }
  const who=OP_ROLES[S.role]||S.role;
  if(S.stage==='decline'||S.stage==='retire'){
    S.pending.push({kind:S.stage==='retire'?"淘汰期禁采买·需核定":"衰退期残值复投·例外需核定",text:SKU.name+" · "+STAGES[S.stage].name+" · 上限¥"+CHANNEL.residual_cap.amount.toLocaleString()+"·ROI≥"+CHANNEL.residual_cap.roi,amt,irr:true,applicant:who,ts:REFRESH_TS,rule:"redline_gates"});
    render();toast("⛔ 本阶段禁止额度内自动采买 → 强制进 HUMAN_GATE_QUEUE,等主管核定","red");return;
  }
  if(amt<=S.budget){S.budget-=amt;render();toast("额度内自主放行 · 已投达人/投流 ¥"+amt.toLocaleString()+" · 剩 ¥"+S.budget.toLocaleString(),"go");}
  else{S.pending.push({kind:"达人/投流采买超额",text:SKU.name+"·投放计划/达人矩阵",amt,irr:false,applicant:who,ts:REFRESH_TS,rule:"hitl_policy·超额"});render();toast("超额 → 涉钱进 HUMAN_GATE_QUEUE · 已挂起,等主管核定","warn");}
}
function dispatch(rid,ti){
  if(!(S.role==='ops'||S.role==='mgr')){toast("派发权在 作战官/主管 · permission_boundary(L4护栏先于自动化)","red");return;}
  const r=RULES.find(x=>x.id===rid);if(!r)return;const t=r.tasks[ti];if(!t)return;
  if(S.tasks.some(x=>x.rid===rid&&x.ti===ti&&x.status!=='已驳回')){toast("该任务已在任务中心,未重复派发","warn");return;}
  const money=t.money||0,irr=!!t.irr,hitl=(money>0||irr);
  const task={id:++S.tid,rid,ti,name:t.t,team:t.team,srcNode:r.node,kpi:r.kpi,money,irr,status:hitl?'待核定':'待处理',verdict:null,sop:false};
  S.tasks.push(task);
  if(hitl){S.pending.push({kind:(irr?'不可逆任务':'涉钱任务')+'·'+t.t,text:SKU.name+' · '+STAGES[S.stage].name+' · 来源'+r.node+'/'+r.id,amt:money,irr,taskId:task.id,applicant:OP_ROLES[S.role]||S.role,ts:REFRESH_TS,rule:r.id+' '+r.nm});
    toast(money>0?"涉钱任务 ¥"+money.toLocaleString()+" → 进 HUMAN_GATE_QUEUE · 卡执行前":"⚠ 不可逆任务 → 进 HUMAN_GATE_QUEUE · 卡执行前","warn");}
  else toast("✓ 已派发给"+TEAM[t.team]+" · 状态=待处理","go");
  render();
}
function approve(i){
  if(S.role!=='mgr'){toast("核定权在主管(human_gate)","red");return;}
  const p=S.pending[i];if(!p)return;
  if(p.irr&&!p.confirm){p.confirm=true;render();toast("⚠ 不可逆动作 · 请再次点击「确认通过」二次确认","warn");return;}
  if(p.amt){if(p.amt>S.budget){p.budget_override=true;}S.budget-=p.amt;}
  S.pending.splice(i,1);S.history.unshift(Object.assign({},p,{result:"通过",by:"抖音主管",ts:REFRESH_TS}));
  if(p.taskId){const t=findTask(p.taskId);if(t)t.status='待处理';}
  render();toast("✓ 已核定通过 · "+p.kind+(p.amt?" ¥"+p.amt.toLocaleString()+(p.budget_override?"(超额授权·预算转负)":""):"")+" · 已留痕",p.budget_override?"warn":"go");
}
function reject(i){
  if(S.role!=='mgr'){toast("核定权在主管(human_gate)","red");return;}
  const p=S.pending[i];if(!p)return;
  S.pending.splice(i,1);S.history.unshift(Object.assign({},p,{result:"驳回",by:"抖音主管",ts:REFRESH_TS}));
  if(p.taskId){const t=findTask(p.taskId);if(t)t.status='已驳回';}
  render();toast("✗ 已驳回 · "+p.kind+" 退回一线(记原因·未执行·已留痕)","red");
}
function returnFix(i){
  if(S.role!=='mgr'){toast("核定权在主管(human_gate)","red");return;}
  const p=S.pending[i];if(!p)return;
  S.pending.splice(i,1);S.history.unshift(Object.assign({},p,{result:"退回修改",by:"抖音主管",ts:REFRESH_TS}));
  if(p.taskId){const t=findTask(p.taskId);if(t)t.status='待处理';}
  render();toast("↩ 退回修改 · "+p.kind+" 补充方案后重新提交 · 已留痕","warn");
}
function startTask(id){const t=findTask(id);if(!t)return;if(!ownable(t)){toast("这条任务不属于你这条线(permission_boundary)","red");return;}t.status='进行中';render();toast("任务已开始 · "+t.name);}
function finishTask(id){const t=findTask(id);if(!t)return;if(!ownable(t)){toast("这条任务不属于你这条线(permission_boundary)","red");return;}t.status='已完成';render();toast("已完成 ≠ 验果通过 · 请作战官/主管到复盘区确认「结果指标动没动」","warn");}
function review(id,moved){
  const t=findTask(id);if(!t)return;
  if(!(S.role==='ops'||S.role==='mgr')){toast("验证永远是人的事:复盘权在 作战官/主管(L5 人不删除只换位)","red");return;}
  const verdict=moved?"有效":"无效";
  if(VERDICT_OPTIONS.indexOf(verdict)<0){toast("裁决不在 options 枚举内,已拒绝","red");return;}
  t.verdict=verdict;t.status='已复盘';

    +DATA_SRC.map(r=>'<tr><td>'+esc(r[0])+'</td><td>'+esc(r[1])+'</td><td>'+esc(r[2])+'</td><td>'+esc(r[3])+'</td><td>'+esc(r[4])+'</td><td>'+esc(r[5])+'</td><td>'+esc(r[6])+'</td></tr>').join('')+'</table></div>';
  h+='<div class="card" id="cardBrandObs"><h4>🔭 品牌观察(P1-03 · 不进SKU Gate主判)</h4>'
    +'<div class="kv">SOV '+fmt((BRAND_OBS.sov||0.14)*100)+'% · 美誉度 '+fmt((BRAND_OBS.goodwill||0.86)*100)+'% · AIQ '+(BRAND_OBS.aiq||72)+' · AICO '+(BRAND_OBS.aico||68)+'</div>'
    +'<div style="margin-top:6px">'+((BRAND_OBS.words||['减盐','鲜','0添加','凉拌','一勺出味']).map(wd=>'<span class="chip" data-bw onclick="toast(\'品牌词「'+esc(typeof wd==='string'?wd:wd[0])+'」:观察模块·供作战官/主管看盘,不进单SKU红绿灯\')" style="cursor:pointer;margin:2px">'+esc(typeof wd==='string'?wd:wd[0])+'</span>')).join('')+'</div>'
    +'<div class="hint" style="margin-top:6px">词云/SOV/美誉度/AIQ/AICO=观察轴 · SKU Gate=判级轴,两轴不混</div>'
    +'<div class="sep"></div><div class="hint">'+esc(INCOME_MODEL)+'</div>'
    +'<div class="sep"></div><div class="kv">留痕('+S.history.length+'):'+S.history.slice(0,6).map(x=>esc(x.result)+'·'+esc((x.kind||'').slice(0,12))).join(' | ')+'</div></div>';
  h+='</div>';
  return h;
}

/* ---------- 导出(P1-03) ---------- */
function doExport(name,content,mime){
  P.lastExport={name,content};
  try{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(["\ufeff"+content],{type:mime||'text/csv'}));a.download=name;a.click();}catch(e){}
  toast('📤 已导出 '+name+'(演示假水·结构=真)','go');
}
function expLedger(){const L=pcLed();let c='账,指标,键,当前,目标,单位,达标\n';['seed','sell','joint'].forEach(g=>L[g].forEach(m=>{c+=[g,m.label,m.k,m.v,m.t,m.u||'',m.pass?'Y':'N'].join(',')+'\n';}));doExport('douyin_ledger3_'+S.stage+'.csv',c);}
function expHitl(){let c='时间,动作,金额,申请人,规则,风险,结果,核定人\n';S.pending.forEach(p=>{c+=[p.ts||'',p.kind,p.amt||0,p.applicant||'',p.rule||'',p.irr?'不可逆':'涉钱','待核定',''].join(',')+'\n';});S.history.forEach(x=>{c+=[x.ts||'',x.kind,x.amt||0,x.applicant||'',x.rule||'',x.irr?'不可逆':'涉钱',x.result,x.by||''].join(',')+'\n';});doExport('douyin_hitl_records.csv',c);}
function expSop(){let c='SOP,Step,环节,KPI,目标,最佳,当前,达标,建议,HITL\n';SOPS.forEach(sp=>sp.steps.forEach(st=>(st.kq||[]).forEach(q=>{c+=[sp.id,st.s,st.env,q[0],q[1],q[2],q[3],q[4]?'Y':'N',sopSuggest(st),st.hitl?'Y':'N'].join(',')+'\n';})));doExport('douyin_sop_exec.csv',c);}
function expN6(){doExport('douyin_n6_verdict_'+S.stage+'.json',JSON.stringify(n6Verdict(),null,2),'application/json');}
function expReview(){const done=S.tasks.filter(t=>t.status==='已复盘');
  let c='抖音复盘报告(演示) · '+SKU.name+' · '+STAGES[S.stage].name+' · '+REFRESH_TS+'\n'
   +'Gate='+STAGES[S.stage].gate+' 判级='+(pcGateFull()?'达标':'未达标')+' · 红灯 '+pcFired().length+' 条\n'
   +'红灯:'+pcFired().map(r=>r.id+' '+r.nm).join('、')+'\n'
   +'已复盘任务:\n'+done.map(t=>'#'+t.id+' '+t.name+' → '+t.verdict).join('\n')+'\n'
   +'留痕:\n'+S.history.map(x=>x.result+' · '+x.kind+(x.amt?' ¥'+x.amt:'')).join('\n')+'\n'
   +'验果铁律:验的是上一层的标动没动,不是任务做没做。';
  doExport('douyin_review_'+S.stage+'.txt',c,'text/plain');}

/* ---------- 路由 / 全局 ---------- */
const SCR_FN={today:scrToday,dual:scrDual,pipe:scrPipe,collect:scrCollect,ledger:scrLedger,task:scrTask,cockpit:scrCockpit};
function render(){renderTop();renderSide();document.getElementById('main').innerHTML=(SCR_FN[P.screen]||scrToday)();renderRight();renderFoot();}
function setScreen(id){P.screen=id;render();}
function setStagePC(k){S.stage=k;S.done=false;P.diag=null;render();toast('阶段切换 → '+STAGES[k].name+'(七屏同步·同一SKU不同阶段标准不同)');}
function setRolePC(k){S.role=k;P.screen=ROLE_HOME[k]||P.screen;P.diag=null;render();toast('角色 → '+OP_ROLES[k]+' · 默认视图='+(NAV.find(n=>n[0]===P.screen)||['',''])[1]);}
function setSku(id){const sk=SKU_LIST.find(x=>x.id===id);if(!sk)return;P.sku=id;if(sk.stage){S.stage=sk.stage;}else if(P.primaryStage){S.stage=P.primaryStage;}P.diag=null;render();toast('SKU → '+sk.name+'(三本账/N0–N6/J0–J6 同步刷新)');}
function setRange(k){P.range=k;render();toast('周期 → '+RANGE_NM[k]+'(演示口径缩放)');}
function onSearch(v){P.search=v;const keep=document.getElementById('inSearch');render();const el=document.getElementById('inSearch');el.focus();el.setSelectionRange(v.length,v.length);}

/* ---------- boot ---------- */
(function(){
  const p=new URLSearchParams(location.search);
  const role=p.get('role');const name=p.get('name');
  if(name)CHANNEL.who=name;
  if(['seed_kol','commerce_kol','live_room','ops','mgr'].indexOf(role)>=0)S.role=role;
  P.primaryStage=S.stage;
  P.screen=ROLE_HOME[S.role]||'today';
  render();
})();

</script>
