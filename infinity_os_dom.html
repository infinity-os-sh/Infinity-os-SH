<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>INFINITY OS · 管理层一本账</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Mono:wght@400;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07080e;--bg2:#0b0d15;--bg3:#10131c;--card:#13161f;--card2:#181c28;
  --border:rgba(255,255,255,0.05);--border2:rgba(255,255,255,0.10);
  --text:#dde3f0;--text2:#7a8499;--text3:#3d4457;
  --amber:#f5a623;--amber-dim:rgba(245,166,35,0.08);
  --teal:#4ecdc4;--teal-dim:rgba(78,205,196,0.08);
  --red:#ff5f5f;--red-dim:rgba(255,95,95,0.08);
  --green:#4ade80;--green-dim:rgba(74,222,128,0.08);
  --blue:#60a5fa;--blue-dim:rgba(96,165,250,0.08);
  --purple:#a78bfa;--purple-dim:rgba(167,139,250,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;min-height:100vh}

.topbar{position:sticky;top:0;z-index:100;background:rgba(7,8,14,.97);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);display:flex;align-items:center;
  justify-content:space-between;padding:0 14px;height:52px;gap:8px}
.logo{display:flex;align-items:center;gap:7px}
.ls{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#f5a623,#ff7c38);
  display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;color:#000}
.ln{font-family:'Syne',sans-serif;font-size:13px;font-weight:700}
.ln em{color:var(--amber);font-style:normal}
.ver{font-size:9px;font-family:'Space Mono',monospace;color:var(--purple);
  background:var(--purple-dim);border:1px solid rgba(167,139,250,.2);padding:2px 7px;border-radius:10px}
.hb{background:var(--card2);border:1px solid var(--border2);border-radius:16px;
  padding:5px 11px;font-size:11px;color:var(--text2);text-decoration:none;white-space:nowrap}
.ck{font-family:'Space Mono',monospace;font-size:10px;color:var(--text3)}

/* 层级 */
.lvbar{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);
  position:sticky;top:52px;z-index:91}
.lvb{flex:1;padding:10px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;
  cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .2s}
.lvb.on{border-bottom-color:var(--purple)}
.lvb-ic{font-size:13px}
.lvb-lbl{font-size:11px;font-weight:600;color:var(--text3)}
.lvb.on .lvb-lbl{color:var(--purple)}
.lvb-sub{font-size:8px;color:var(--text3);font-family:'Space Mono',monospace}

/* 入口 */
.ebbar{display:flex;background:var(--bg3);border-bottom:1px solid var(--border);
  position:sticky;top:97px;z-index:90}
.ebb{flex:1;padding:8px 4px;display:flex;flex-direction:column;align-items:center;gap:1px;
  cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .2s}
.ebb.on{border-bottom-color:var(--amber)}
.ebb-ic{font-size:12px}
.ebb-lbl{font-size:10px;font-weight:600;color:var(--text3)}
.ebb.on .ebb-lbl{color:var(--amber)}

/* person bar */
.pbar{background:var(--bg);border-bottom:1px solid var(--border);padding:8px 14px;
  display:flex;align-items:center;gap:7px;overflow-x:auto;scrollbar-width:none;
  position:sticky;top:141px;z-index:89}
.pbar::-webkit-scrollbar{display:none}
.pc{background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:4px 11px;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.pc.on{background:var(--purple-dim);border-color:rgba(167,139,250,.35);color:var(--purple)}
.pl{font-size:10px;color:var(--text3);flex-shrink:0}

/* screen */
.sc{display:none;padding:0 0 80px}
.sc.on{display:block;animation:fu .2s ease}
@keyframes fu{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* person head */
.ph{padding:14px;display:flex;align-items:flex-start;justify-content:space-between}
.ph-role{font-size:10px;font-family:'Space Mono',monospace;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
.ph-name{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:2px}
.ph-reg{font-size:11px;color:var(--text3)}
.ph-r{text-align:right}
.ph-earn{font-family:'Syne',sans-serif;font-size:26px;font-weight:800}
.ph-max{font-size:10px;color:var(--text3);margin-top:2px}
.ph-vs{font-size:10px;margin-top:4px;padding:3px 8px;border-radius:7px;display:inline-block}
.vu{background:var(--green-dim);color:var(--green)}
.vd{background:var(--red-dim);color:var(--red)}

/* SKU行 */
.sl{padding:0 14px;display:flex;flex-direction:column;gap:6px}
.sr{background:var(--card);border:1px solid var(--border);border-radius:13px;overflow:hidden;cursor:pointer;transition:all .15s}
.sr:hover{border-color:var(--border2)}
.sr.exp{border-color:rgba(245,166,35,.25)}
.sr-main{padding:12px 14px;display:flex;align-items:center;gap:10px}
.sg{width:32px;height:32px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:10px;font-weight:800}
.g1{background:rgba(74,222,128,.15);color:var(--green)}
.g2{background:rgba(245,166,35,.15);color:var(--amber)}
.g3{background:rgba(96,165,250,.15);color:var(--blue)}
.g4{background:rgba(167,139,250,.15);color:var(--purple)}
.g5{background:rgba(255,95,95,.15);color:var(--red)}
.si{flex:1;min-width:0}
.si-name{font-size:13px;font-weight:600;margin-bottom:3px}
.si-sub{font-size:10px;color:var(--text3);font-family:'Space Mono',monospace}
.si-bar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:5px}
.si-fill{height:100%;border-radius:2px;transition:width .6s ease}
.srt{text-align:right;flex-shrink:0;min-width:76px}
.srt-ach{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;line-height:1}
.srt-cp{font-size:10px;margin-top:3px;font-family:'Space Mono',monospace}
.srt-gp{font-size:10px;margin-top:2px}

/* ── 三层下钻 ── */
.drill{display:none;border-top:1px solid var(--border);background:rgba(255,255,255,.01)}
.sr.exp .drill{display:block}

/* 下钻 Tab */
.dtabs{display:flex;border-bottom:1px solid var(--border)}
.dtab{flex:1;padding:8px 4px;text-align:center;font-size:11px;font-weight:600;
  color:var(--text3);cursor:pointer;border:none;background:none;
  border-bottom:2px solid transparent;transition:all .15s}
.dtab.on{color:var(--amber);border-bottom-color:var(--amber)}

/* 下钻内容 */
.dpanel{display:none;padding:10px 12px}
.dpanel.on{display:block}

/* 经销商行 */
.dist-row{display:flex;align-items:center;gap:8px;padding:8px 10px;
  background:var(--card);border:1px solid var(--border);border-radius:9px;margin-bottom:5px;
  cursor:pointer;transition:all .15s}
.dist-row:hover{background:var(--card2)}
.dist-rank{width:20px;height:20px;border-radius:5px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;font-family:'Space Mono',monospace}
.rk1{background:rgba(245,166,35,.2);color:var(--amber)}
.rk2{background:rgba(255,255,255,.07);color:var(--text2)}
.rk3{background:rgba(78,205,196,.1);color:var(--teal)}
.rkn{background:rgba(255,255,255,.03);color:var(--text3)}
.dist-info{flex:1}
.dist-name{font-size:12px;font-weight:600;margin-bottom:1px}
.dist-meta{font-size:10px;color:var(--text3);font-family:'Space Mono',monospace}
.dist-bw{width:50px;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.dist-bf{height:100%;border-radius:2px}
.dist-ach{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;width:34px;text-align:right}
.dist-comp{font-size:10px;font-family:'Space Mono',monospace;width:50px;text-align:right}

/* DSR行 */
.dsr-row{display:flex;align-items:center;gap:8px;padding:8px 10px;
  background:var(--card);border:1px solid var(--border);border-radius:9px;margin-bottom:5px}
.dsr-avatar{width:28px;height:28px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:12px;
  background:var(--teal-dim);border:1px solid rgba(78,205,196,.2)}
.dsr-info{flex:1}
.dsr-name{font-size:12px;font-weight:600;margin-bottom:2px}
.dsr-region{font-size:10px;color:var(--text3)}
.dsr-stores{font-size:10px;color:var(--text3);font-family:'Space Mono',monospace}
.dsr-bw{width:50px;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:4px}
.dsr-bf{height:100%;border-radius:2px}
.dsr-right{text-align:right;flex-shrink:0}
.dsr-ach{font-family:'Space Mono',monospace;font-size:12px;font-weight:700}
.dsr-inc{font-size:10px;font-family:'Space Mono',monospace;margin-top:2px}

/* 美顾行 */
.ba-row{display:flex;align-items:center;gap:8px;padding:8px 10px;
  background:var(--card);border:1px solid var(--border);border-radius:9px;margin-bottom:5px}
.ba-avatar{width:28px;height:28px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:12px;
  background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.2)}
.ba-info{flex:1}
.ba-name{font-size:12px;font-weight:600;margin-bottom:2px}
.ba-store{font-size:10px;color:var(--text3)}
.ba-tasks{font-size:10px;color:var(--text3);font-family:'Space Mono',monospace}
.ba-bw{width:50px;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:4px}
.ba-bf{height:100%;border-radius:2px}
.ba-right{text-align:right;flex-shrink:0}
.ba-ach{font-family:'Space Mono',monospace;font-size:12px;font-weight:700}
.ba-inc{font-size:10px;font-family:'Space Mono',monospace;margin-top:2px}

.drill-summary{margin-top:8px;padding:8px 10px;background:rgba(245,166,35,.05);
  border:1px solid rgba(245,166,35,.15);border-radius:9px;font-size:11px;color:var(--text2)}

/* 人员账单行 */
.bsec{padding:0 14px}
.btitle{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.09em;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;margin-bottom:8px}
.btitle::after{content:'';flex:1;height:1px;background:var(--border)}
.br{background:var(--card);border-left:3px solid;border-radius:0 12px 12px 0;
  padding:11px 14px;margin-bottom:6px;cursor:pointer;transition:all .15s;display:flex;align-items:stretch;gap:10px}
.br:hover{background:var(--card2)}
.br.bx{border-color:var(--amber)!important}
.brl{flex:1;min-width:0}
.brl-sku{font-size:13px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.brl-tg{display:flex;gap:10px;font-size:10px;color:var(--text3);font-family:'Space Mono',monospace;flex-wrap:wrap}
.brl-pg{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:6px}
.brl-pf{height:100%;border-radius:2px;transition:width .7s ease}
.brr{text-align:right;flex-shrink:0;display:flex;flex-direction:column;justify-content:space-between;align-items:flex-end;min-width:76px}
.brr-ach{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;line-height:1}
.brr-cp{font-family:'Space Mono',monospace;font-size:11px;margin-top:3px}
.brr-gp{font-size:10px;margin-top:2px;font-family:'Space Mono',monospace}

/* bill展开 */
.bd{display:none;margin:0 14px 6px;padding:10px 12px;background:var(--bg3);
  border:1px solid var(--border);border-radius:0 0 12px 12px;border-top:none;margin-top:-6px}
.bd.show{display:block}

/* 账单汇总 */
.bsum{margin:10px 14px 0;padding:14px;background:var(--card);border:1px solid var(--border2);border-radius:14px}
.bsr{display:flex;justify-content:space-between;align-items:center;font-size:12px;margin-bottom:7px}
.bsr-l{color:var(--text2)}
.bsr-v{font-family:'Space Mono',monospace;font-weight:700}
.bdiv{height:1px;background:var(--border2);margin:4px 0 10px}
.btot{display:flex;justify-content:space-between;align-items:center;padding:12px;
  background:linear-gradient(135deg,rgba(167,139,250,.08),rgba(9,9,15,1));
  border:1px solid rgba(167,139,250,.2);border-radius:10px}
.btot-l{font-size:13px;font-weight:700}
.btot-v{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--purple)}

/* 排名 */
.rl{display:flex;flex-direction:column;gap:6px;padding:0 14px}
.rr{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:10px 13px;display:flex;align-items:center;gap:9px}
.rr.me{border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.04)}
.rr-n{width:24px;height:24px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:11px;font-weight:700}
.n1{background:rgba(245,166,35,.2);color:var(--amber)}
.n2{background:rgba(255,255,255,.08);color:var(--text2)}
.n3{background:rgba(78,205,196,.12);color:var(--teal)}
.nn{background:rgba(255,255,255,.04);color:var(--text3)}
.nme{background:rgba(167,139,250,.15);color:var(--purple);border:1px solid rgba(167,139,250,.3)}
.rr-inf{flex:1;min-width:0}
.rr-nm{font-size:12px;font-weight:600;margin-bottom:3px;display:flex;align-items:center;gap:6px}
.metag{font-size:9px;background:var(--purple-dim);color:var(--purple);border:1px solid rgba(167,139,250,.2);padding:1px 6px;border-radius:6px;font-family:'Space Mono',monospace}
.rr-bw{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.rr-bf{height:100%;border-radius:2px}
.rr-rt{text-align:right;flex-shrink:0}
.rr-inc{font-family:'Syne',sans-serif;font-size:16px;font-weight:800}
.rr-sb{font-size:10px;color:var(--text3);font-family:'Space Mono',monospace;margin-top:2px}

/* AI */
.aiw{margin:10px 14px 0;background:var(--card);border:1px solid var(--border);border-radius:13px;overflow:hidden}
.aih{padding:10px 14px;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.07em;text-transform:uppercase}
.cps{display:flex;gap:5px;padding:8px 12px;overflow-x:auto;scrollbar-width:none}
.cps::-webkit-scrollbar{display:none}
.cp{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:4px 10px;font-size:11px;color:var(--text2);white-space:nowrap;cursor:pointer;transition:all .15s;flex-shrink:0;font-family:'Noto Sans SC',sans-serif}
.cp:hover{border-color:var(--amber);color:var(--amber);background:var(--amber-dim)}
.ab{margin:0 12px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:9px 12px;font-size:12px;color:var(--text2);line-height:1.65}
.ar{display:none;margin:0 12px 8px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--text2);line-height:1.7}
.ar.show{display:block}
.aq{font-size:10px;color:var(--text3);margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.airw{display:flex;gap:6px;padding:6px 12px 10px}
.ain{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:8px 11px;font-size:12px;color:var(--text);outline:none;font-family:'Noto Sans SC',sans-serif}
.ain:focus{border-color:rgba(245,166,35,.4)}
.ain::placeholder{color:var(--text3)}
.asb{width:36px;height:36px;border-radius:9px;background:var(--amber);border:none;cursor:pointer;font-size:14px;flex-shrink:0}
.td-wrap{display:flex;gap:4px;align-items:center}
.td{width:5px;height:5px;border-radius:50%;background:var(--amber);animation:tda 1.2s infinite}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes tda{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

.sp{padding:12px 14px 6px}
.sec{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.09em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:2px}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><div class="ls">∞</div><div class="ln">INFINITY <em>OS</em></div><div class="ver">管理层</div></div>
  <a class="hb" href="index.html">⌂ 门户</a>
  <div class="ck" id="ck"></div>
</div>

<div class="lvbar">
  <button class="lvb on" id="lv-dom" onclick="switchLv('dom')">
    <span class="lvb-ic">🏢</span><span class="lvb-lbl">DOM</span><span class="lvb-sub">区域主管</span>
  </button>
  <button class="lvb" id="lv-city" onclick="switchLv('city')">
    <span class="lvb-ic">🌆</span><span class="lvb-lbl">城市经理</span><span class="lvb-sub">管多DOM</span>
  </button>
  <button class="lvb" id="lv-region" onclick="switchLv('region')">
    <span class="lvb-ic">🗺️</span><span class="lvb-lbl">大区总</span><span class="lvb-sub">管多城市</span>
  </button>
</div>

<div class="ebbar">
  <button class="ebb on" id="eb-sku" onclick="switchEb('sku')">
    <span class="ebb-ic">📦</span><span class="ebb-lbl">SKU账单</span>
  </button>
  <button class="ebb" id="eb-person" onclick="switchEb('person')">
    <span class="ebb-ic">🏢</span><span class="ebb-lbl" id="ebLbl">DOM账单</span>
  </button>
  <button class="ebb" id="eb-rank" onclick="switchEb('rank')">
    <span class="ebb-ic">📊</span><span class="ebb-lbl">关系对比</span>
  </button>
</div>

<div class="pbar" id="pbar"></div>

<!-- SKU账单 -->
<div class="sc on" id="sc-sku">
  <div style="padding:14px 14px 8px;display:flex;justify-content:space-between;align-items:flex-start">
    <div>
      <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:700" id="skuTitle">六月鲜 · DOM · 王磊</div>
      <div style="font-size:10px;color:var(--text3);font-family:'Space Mono',monospace;margin-top:2px" id="skuSub"></div>
    </div>
    <div style="text-align:right">
      <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--purple)" id="skuEarned">—</div>
      <div style="font-size:10px;color:var(--text3)" id="skuMax"></div>
    </div>
  </div>
  <div class="sl" id="sl"></div>
  <div style="margin:10px 14px 0;padding:14px;background:linear-gradient(135deg,rgba(167,139,250,.07),rgba(9,9,15,1));border:1px solid rgba(167,139,250,.2);border-radius:14px" id="sf"></div>
  <div class="aiw">
    <div class="aih">📦 SKU账单 Agent</div>
    <div class="cps">
      <div class="cp" onclick="ask('sku','哪个SKU在哪个经销商差距最大？对应哪个DSR执行不力？')">经销商×DSR差距定位</div>
      <div class="cp" onclick="ask('sku','美顾覆盖的门店动销和没有美顾的门店差多少？')">美顾价值量化</div>
      <div class="cp" onclick="ask('sku','如果所有SKU达成80%，本月薪酬是多少？')">80%场景测算</div>
    </div>
    <div class="ab" id="skuAb">你好，我是SKU账单 Agent。每行是一个SKU，点开可以看经销商、DSR、美顾三层执行情况。</div>
    <div class="ar" id="skuAr"><div class="aq" id="skuAq"></div><div id="skuAa"></div></div>

const BASE_A=[0.62,0.77,0.92,0.85,0.60];

function genSkus(lvk,pi){
  const lv=LV[lvk]; const p=lv.persons[pi];
  const li={'dom':0,'city':1,'region':2}[lvk];
  return SKUS.map((t,i)=>{
    const pt=BASE_P[li][i];
    const compMax=Math.round(p.pool*t.cw/100);
    return {...t, profitTarget:pt, profitActual:Math.round(pt*BASE_A[i]), compMax};
  });
}
function calcC(sku,lvk){
  return Math.round(sku.compMax*Math.min((sku.profitActual/sku.profitTarget)*LV[lvk].coeff,2.0));
}

  document.getElementById('drill-'+uid).style.display=row.classList.contains('exp')?'block':'none';
}
function switchDtab(uid,tab){
  ['dist','dsr','ba'].forEach(t=>{
    document.getElementById('dt-'+t+'-'+uid)?.classList.toggle('on',t===tab);
    document.getElementById('dp-'+t+'-'+uid)?.classList.toggle('on',t===tab);
  });
}

// ── 人员账单 ──────────────────────────────────────────
function renderBillLedger(lv,p,total,inc){
  const rc={dom:'var(--teal)',city:'var(--blue)',region:'var(--purple)'}[curLv];
  const diff=total-lv.avg;
  const maxInc=cachedSkus.reduce((s,sk)=>s+sk.compMax,0);

  document.getElementById('personAb').textContent=`你好，我是${p.name}的账单 Agent。每行是一个SKU，点开看在哪个${lv.subLabel}、哪个DSR、哪个美顾执行如何。`;

  document.getElementById('ph').innerHTML=`
  <div>
    <div class="ph-role" style="color:${rc}">${lv.label}</div>
    <div class="ph-name">${p.name}</div>
    <div class="ph-reg">${p.region} · ${p.dists?.length||0}个${lv.subLabel} · ${p.dists?.reduce((s,d)=>s+(d.dsrs?.length||0),0)||0}名DSR · ${p.dists?.reduce((s,d)=>s+(d.bas?.length||0),0)||0}名美顾</div>
  </div>
  <div class="ph-r">
    <div class="ph-earn" style="color:${rc}">¥${total.toLocaleString()}</div>
    <div class="ph-max">满额 ¥${(p.base+maxInc).toLocaleString()}</div>
    <div class="ph-vs ${diff>=0?'vu':'vd'}">${diff>=0?'↑高于':'↓低于'}均值 ¥${Math.abs(diff).toLocaleString()}</div>
  </div>`;

  const brows=document.getElementById('brows');
  brows.innerHTML='';
  cachedSkus.forEach(sku=>{
    const earned=calcC(sku,curLv);
    const pa=(sku.profitActual/sku.profitTarget*100).toFixed(0);
    const gap=sku.compMax-earned;
    const pct=Math.min(100,parseInt(pa));
    const ac=pct>=85?'var(--green)':pct>=65?'var(--amber)':'var(--red)';

    const allDsrs=p.dists?.flatMap(d=>d.dsrs)||[];
    const allBas=p.dists?.flatMap(d=>d.bas)||[];
    const worstDist=p.dists?[...p.dists].sort((a,b)=>a.ach-b.ach)[0]:null;
    const bestDsr=allDsrs.length?[...allDsrs].sort((a,b)=>b.ach-a.ach)[0]:null;

    const row=document.createElement('div');
    row.className='br'; row.style.borderColor=sku.color;
    row.innerHTML=`
    <div class="brl" onclick="toggleBd('bd-b-${sku.id}',this.closest('.br'))">
      <div class="brl-sku">
        <span style="width:10px;height:10px;border-radius:3px;background:${sku.color};display:inline-block;flex-shrink:0"></span>
        ${sku.name}
        <span style="background:rgba(255,255,255,.05);padding:1px 6px;border-radius:6px;font-size:9px;color:var(--text3);font-family:'Space Mono',monospace">年级${sku.grade}</span>
      </div>
      <div class="brl-tg"><span>利润目标 ¥${(sku.profitTarget/1000).toFixed(0)}K</span><span>权重 ${sku.cw}%</span></div>
      <div class="brl-pg"><div class="brl-pf" style="width:${pct}%;background:${ac}"></div></div>
    </div>
    <div class="brr" onclick="toggleBd('bd-b-${sku.id}',this.closest('.br'))">
      <div class="brr-ach" style="color:${ac}">${pa}%</div>
      <div class="brr-cp" style="color:${ac}">+¥${earned.toLocaleString()}</div>
      <div class="brr-gp" style="color:${gap>0?'var(--red)':'var(--green)'}">${gap>0?'差¥'+gap.toLocaleString():'✓'}</div>
    </div>`;
    brows.appendChild(row);

    const detail=document.createElement('div');
    detail.className='bd'; detail.id='bd-b-'+sku.id;
    detail.innerHTML=`
    <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:8px">
      ${p.dists?.map(d=>{
        const dc=d.ach>=85?'var(--green)':d.ach>=65?'var(--amber)':'var(--red)';
        return `<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--card);border:1px solid var(--border);border-radius:9px;font-size:11px">
          <span style="flex:1;font-weight:600">🤝 ${d.name}</span>
          <span style="color:var(--text3);font-size:10px">${d.dsrs.length}DSR+${d.bas.length}美顾</span>
          <span style="font-family:'Space Mono',monospace;font-weight:700;color:${dc}">${d.ach}%</span>
        </div>`;
      }).join('')||''}
    </div>
    <div style="background:rgba(74,222,128,.05);border:1px solid rgba(74,222,128,.15);border-radius:9px;padding:9px;font-size:11px;color:var(--text2)">
      ${worstDist?`💡 <strong style="color:var(--amber)">最弱：${worstDist.name} ${worstDist.ach}%</strong>`:''}
      ${bestDsr?` · 最强DSR：<strong style="color:var(--green)">${bestDsr.name} ${bestDsr.ach}%</strong>`:''}
    </div>`;
    brows.appendChild(detail);
  });

  document.getElementById('bsum').innerHTML=`
  <div class="bsr"><span class="bsr-l">基础月薪</span><span class="bsr-v">¥${p.base.toLocaleString()}</span></div>
  <div class="bsr"><span class="bsr-l">动销激励（5个SKU）</span><span class="bsr-v" style="color:var(--green)">+¥${inc.toLocaleString()}</span></div>
  <div class="bsr"><span class="bsr-l">激励满额上限</span><span class="bsr-v" style="color:var(--text3)">¥${maxInc.toLocaleString()}</span></div>
  <div class="bsr"><span class="bsr-l">已达成比例</span><span class="bsr-v" style="color:var(--amber)">${(inc/maxInc*100).toFixed(0)}%</span></div>
  <div class="bdiv"></div>
  <div class="btot"><div class="btot-l">本月到手</div><div class="btot-v">¥${(p.base+inc).toLocaleString()}</div></div>`;
}
function toggleBd(id,row){const d=document.getElementById(id);const s=d.classList.toggle('show');row.classList.toggle('bx',s)}

// ── 关系排名 ──────────────────────────────────────────
function renderRank(){
  const lv=LV[curLv];
  document.getElementById('rankConcept').innerHTML=lv.rc;
  document.getElementById('rt1').textContent=lv.rt1;
  renderOneRank(lv.r1,'rl1');
  if(lv.r2.length>0){
    document.getElementById('rt2').textContent=lv.rt2;
    document.getElementById('rt2wrap').style.display='block';
    renderOneRank(lv.r2,'rl2');
  }else{
    document.getElementById('rt2wrap').style.display='none';
    document.getElementById('rl2').innerHTML='';
  }
}
function renderOneRank(data,elId){
  const self=data.find(d=>d.me)||data[1];
  const maxV=data[0].v;
  document.getElementById(elId).innerHTML=data.map((d,i)=>{
    const nc=i===0?'n1':i===1?'n2':i===2?'n3':d.me?'nme':'nn';
    const nt=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'';
    const bc=d.me?'var(--purple)':i<=2?'var(--green)':'var(--blue)';
    const diff=d.v-(self?.v||0);
    return `<div class="rr ${d.me?'me':''}">
      <div class="rr-n ${nc}">${nt}</div>
      <div class="rr-inf">
        <div class="rr-nm">${d.n}<span style="font-size:9px;color:var(--text3);margin-left:4px">${d.r||''}</span>${d.me?'<span class="metag">你</span>':''}${!d.me&&diff!==0?`<span style="font-size:10px;font-family:'Space Mono',monospace;color:${diff>0?'var(--green)':'var(--red)'}">  ${diff>0?'↑+':'↓'}¥${Math.abs(diff).toLocaleString()}</span>`:''}</div>
        <div class="rr-bw"><div class="rr-bf" style="width:${Math.round(d.v/maxV*100)}%;background:${bc}50;border-right:2px solid ${bc}"></div></div>
      </div>
      <div class="rr-rt">
        <div class="rr-inc" style="color:${d.me?'var(--purple)':bc}">¥${d.v.toLocaleString()}</div>
        <div class="rr-sb">达成 ${d.ra||'—'}%</div>
      </div>
    </div>`;
  }).join('');
}

// ── AI ────────────────────────────────────────────────
async function callC(sys,q,aEl){
  aEl.innerHTML='<div class="td-wrap"><div class="td"></div><div class="td"></div><div class="td"></div></div>';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:[{role:'user',content:q}]})});
    const d=await r.json();
    aEl.innerHTML=`<div style="white-space:pre-wrap">${d.content?.map(c=>c.text||'').join('')||'—'}</div>`;
  }catch(e){aEl.innerHTML=`<div style="color:var(--red);font-size:11px">⚠️ ${e.message}</div>`}
}
function getSys(){
  const lv=LV[curLv]; const p=lv.persons[curPi];
  const inc=cachedSkus.reduce((s,sk)=>s+calcC(sk,curLv),0);
  const dsrs=p.dists?.flatMap(d=>d.dsrs)||[];
  const bas=p.dists?.flatMap(d=>d.bas)||[];
  return `你是INFINITY OS ${lv.label}账单Agent。当前：${p.name}（${p.region}）。
下属：${p.dists?.map(d=>`${d.name}达成${d.ach}%`).join('、')||''}。
DSR：${dsrs.map(d=>`${d.name}${d.ach}%`).join('、')||''}。
美顾：${bas.map(b=>`${b.name}${b.ach}%`).join('、')||''}。
SKU：${cachedSkus.map(s=>`${s.name}达成${(s.profitActual/s.profitTarget*100).toFixed(0)}%已挣¥${calcC(s,curLv)}`).join('、')}。
合计¥${p.base+inc}。中文简洁含数字不超过150字。`;
}
async function ask(type,q,el){
  if(!q||!q.trim())return;
  if(el instanceof HTMLElement)el.value='';
  document.getElementById(type+'Ar').classList.add('show');
  document.getElementById(type+'Aq').textContent='❓ '+q;
  await callC(getSys(),q,document.getElementById(type+'Aa'));
}

renderPbar(); renderAll();
