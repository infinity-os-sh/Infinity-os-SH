<style>
:root{

}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--cjk);font-size:12.5px;line-height:1.55;-webkit-font-smoothing:antialiased;padding-bottom:70px}
.top{position:sticky;top:0;z-index:30;background:#1b2230;color:#eef1f7;padding:10px 12px 8px;box-shadow:0 1px 6px rgba(0,0,0,.18)}
.top .t1{font-size:14px;font-weight:800;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.top .t1 .who{font-family:var(--mono);font-size:10px;background:#2b3550;color:#aec3f2;border-radius:4px;padding:1px 7px}
.top .t1 .rolechip{font-family:var(--mono);font-size:10px;background:#4a3d1e;color:#eccf8b;border-radius:4px;padding:1px 7px}
.top .inc{margin-top:5px;font-size:11px;color:#c8d2e6;display:flex;gap:12px;flex-wrap:wrap}
.top .inc b{color:#ffe08a;font-family:var(--mono)}
.tabs{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;background:#1b2230;border-top:1px solid #2c3448}
.tabs .tb{flex:1;text-align:center;color:#8e99b3;padding:9px 2px 10px;font-size:10.5px;cursor:pointer;line-height:1.3}
.tabs .tb .ic{display:block;font-size:15px}
.tabs .tb.on{color:#fff;font-weight:700}
.wrap{max-width:560px;margin:0 auto;padding:10px 10px 20px}
.card{background:var(--card);border:1px solid var(--rule);border-radius:12px;padding:11px 12px;margin:0 0 10px;box-shadow:0 1px 2px rgba(20,24,32,.04)}
.ph{font-size:12px;font-weight:800;margin:0 0 7px}
.ph .sub{font-weight:400;font-size:10px;color:var(--dim)}
.hint{font-size:10px;color:var(--dim);line-height:1.5}
.row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--rule);font-size:11.5px}
.row:last-child{border-bottom:none}
.mono{font-family:var(--mono);font-size:10.5px}
.btn{border:none;border-radius:7px;background:var(--blue);color:#fff;font-size:11px;font-weight:700;padding:7px 12px;cursor:pointer;font-family:var(--cjk)}
.btn.o{background:#eef2fb;color:var(--blue);border:1px solid #c9d6f2}
.btn.go{background:var(--go)}
.btn.red{background:var(--red)}
.btn.gray{background:#e3e6ec;color:#6a7080}
.btn.xs{font-size:10px;padding:4px 9px;border-radius:6px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.skubar{display:flex;gap:6px;overflow-x:auto;padding:2px 0 8px}
.skubar .sk{flex:0 0 auto;background:#fff;border:1px solid var(--rule);border-radius:9px;padding:6px 10px;font-size:10.5px;cursor:pointer;line-height:1.35}
.skubar .sk.on{border-color:var(--blue);background:#eef3fd;font-weight:700}
.skubar .sk .st{display:block;font-family:var(--mono);font-size:9px;color:var(--dim)}
.sstrip{display:flex;gap:4px;margin:4px 0 8px}
.sstep{flex:1;text-align:center;font-size:9.5px;font-family:var(--mono);padding:5px 2px;border-radius:6px;background:#eceef3;color:#8a90a0;border:1px solid transparent}
.sstep.on{background:#20304e;color:#fff;font-weight:700}
.sstep.done{background:#dfe9df;color:#4c7a5c}

.fourl .ly .lv{color:var(--dim);margin-left:auto;font-family:var(--mono);font-size:9.5px;text-align:right}
.ring{display:flex;gap:4px;margin-top:6px}

.tiles{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:4px}
.tile{position:relative;background:#f7f8fb;border:1.5px solid var(--rule);border-radius:9px;padding:8px 9px;cursor:pointer}
.tile.pass{border-color:#bcd9c6;background:#f2f9f4}
.tile.fail{border-color:#e6c2bd;background:#fbf3f2}
.tile .tl{font-size:10px;color:var(--dim)}
.tile .tv{font-family:var(--mono);font-size:15px;font-weight:800;margin-top:2px}
.tile.pass .tv{color:var(--go)} .tile.fail .tv{color:var(--red)}
.tile .tt{font-family:var(--mono);font-size:9px;color:var(--dim);margin-top:1px}
.tile .editpen{position:absolute;top:5px;right:7px;font-size:11px;color:#a8aebc;cursor:pointer}
.tile .attrdot{position:absolute;bottom:5px;right:7px;font-size:9px;color:var(--blue)}
.redline{background:#fbeeec;border:1.5px solid #e2a49c;border-radius:9px;padding:8px 10px;font-size:11px;color:#8a3128;margin-top:8px}
.redline.ok{background:#f0f7f1;border-color:#bcd9c6;color:#39684a}
.attr{border-radius:11px;padding:10px 11px;margin-top:9px;border:1.5px solid}
.attr.win{background:#f2f9f4;border-color:#a9cdb6}
.attr.lose{background:#fbf4f0;border-color:#dcb4a6}
.attr .ah{font-size:12px;font-weight:800}
.attr .delta{font-family:var(--mono);font-size:11px}
.attr .delta.up{color:var(--go)} .attr .delta.dn{color:var(--red)}
.attr .badge{font-size:9px;font-family:var(--mono);background:#fff;border:1px solid var(--rule);border-radius:4px;padding:1px 6px;margin-left:5px;color:var(--dim)}

.attr .why{font-size:10.5px;padding:4px 0;border-top:1px dashed #d8d2c8}

table.tb2 tr:last-child td{border-bottom:none}

.pill.amber{background:#f6ecd8;color:#8a6215}

.task.irr{border-color:#dca9a2}

.task .tsub{font-size:10.5px;color:var(--dim);margin-top:3px}
.task .tst{font-family:var(--mono);font-size:9.5px;margin-top:5px;padding:4px 8px;border-radius:5px;background:#f2f3f7;color:#5c6272}
.gq{background:#fff;border:1.5px solid #e2c48e;border-radius:10px;padding:9px 10px;margin-bottom:8px}
.gq .gh{font-size:11.5px;font-weight:800}
.gq .gmeta{font-family:var(--mono);font-size:9.5px;color:var(--dim);margin-top:2px}
.toastwrap{position:fixed;left:50%;transform:translateX(-50%);bottom:64px;z-index:60;display:flex;flex-direction:column;gap:6px;width:min(92vw,480px)}
.toast{background:#242a38;color:#f2f4fa;border-radius:9px;padding:9px 13px;font-size:11.5px;line-height:1.5;opacity:0;transform:translateY(8px);transition:.24s;box-shadow:0 4px 14px rgba(0,0,0,.28)}

.toast.red{background:#57241e}
.toast.warn{background:#4a3c17}
.panel{display:none}
.panel.on{display:block}
.qq{background:#f2f4fa;border-radius:7px;padding:6px 9px;font-size:9.5px;color:#5c6478;margin-top:7px;line-height:1.55}

.verify{border:1px solid var(--rule);border-radius:9px;padding:7px 9px;margin-bottom:7px;background:#f7f8fb}
.verify .vh{font-size:11px;font-weight:800}
.verify .vm{font-family:var(--mono);font-size:10px;margin-top:2px}
.sw{display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:10.5px;background:#eef2fb;border:1px solid #c9d6f2;color:var(--blue);border-radius:7px;padding:4px 10px;font-weight:700}

</head>

/* ── helpers(引擎件③ 手势:toast/flash/↘/✎) ── */
function toast(msg,kind){
  const w=document.getElementById("tw");const d=document.createElement("div");
  d.className="toast"+(kind?" "+kind:"");d.textContent=msg;w.appendChild(d);
  requestAnimationFrame(()=>d.classList.add("show"));
  setTimeout(()=>{d.classList.remove("show");setTimeout(()=>d.remove(),260);},2600);
}
function flashEl(sel){
  setTimeout(()=>{
    const el=document.querySelector(sel); if(!el)return;
    el.scrollIntoView({behavior:"smooth",block:"center"});
    el.classList.remove("flash"); void el.offsetWidth; el.classList.add("flash");
    setTimeout(()=>el.classList.remove("flash"),2400);
  },140);
}
function fmtU(v,u){
  if(u==="%")return (v*100).toFixed(Math.abs(v)<0.01?2:1)+"%";
  if(u==="¥")return "¥"+Number(v).toLocaleString();
  if(u==="bool")return v?"✓已点亮":"✗未点亮";
  return v>=1000?Number(v).toLocaleString():String(v);
}
function curSKU(){ return SKUS[S.sku]; }
function curStage(){ return STAGES[curSKU().stage]; }
function curMetrics(){
  const ov=S.edited[S.sku]||{};
  return curSKU().metrics.map(m=>{
    const v=(m.k in ov)?ov[m.k]:m.v;
    const pass=m.dir==="lt"?(v<=m.t):(v>=m.t);
    return Object.assign({},m,{show:v,pass:pass});
  });
}
function reconDiff(i){
  const s=SKUS[i];
  if(S.reconFixed[i])return 0;
  return Math.abs(s.wh.book-s.wh.real)/Math.max(s.wh.book,1);
}
function redlineFired(){ return reconDiff(S.sku)>0.02; }
function gatePass(){ return curMetrics().every(m=>m.pass) && !redlineFired(); }

/* ── 收入四段(引擎件①) ── */
function incomeCalc(){
  let meritTiles=0;
  SKUS.forEach((s,i)=>{
    const ov=S.edited[i]||{};
    s.metrics.forEach(m=>{
      const v=(m.k in ov)?ov[m.k]:m.v;
      if(m.dir==="lt"?(v<=m.t):(v>=m.t))meritTiles++;
    });
  });
  const merit=meritTiles*MERIT_PER_TILE;
  const matureOK=SKUS[2].metrics.every(m=>{
    const ov=S.edited[2]||{};const v=(m.k in ov)?ov[m.k]:m.v;
    return m.dir==="lt"?(v<=m.t):(v>=m.t);
  }) && reconDiff(2)<=0.02;
  const gate=matureOK?GATE_BONUS:0;
  const effBase=EFF_SAVINGS.reduce((a,b)=>a+b.amt,0);
  const eff=Math.round(effBase*EFF_RATE);
  return {meritTiles,merit,gate,gateCand:matureOK,eff,effBase,
          total:INCOME_BASE+merit+gate+eff};
}

  const passNow=m.dir==="lt"?(cur<=m.t):(cur>=m.t);
  let nv;

/* ── 任务/抢单/HITL(引擎件·护栏:propose-only·卡执行前·检测≠判决) ── */
function taskAct(id){
  const t=S.tasks.find(x=>x.id===id); if(!t)return;
  if(t.st==="idle"){
    if(t.money){
      t.st="gated";
      S.gateQueue.push({tid:id, t:t.t, amt:t.amt, irr:!!t.irr, by:WHO.nm, st:"pending"});
      renderClose(); if(ROLE==="mgr")renderRegion();
      toast("🔒 涉钱"+(t.irr?"/不可逆":"")+" → 已提交 HUMAN_GATE_QUEUE · 卡在执行前,未批不得执行(引擎只提案不执行)","warn");
    } else {
      t.st="grabbed"; renderClose();
      toast("🙋 抢单成功 · "+t.t+" · 执行后记得回来点「完成」","go");
    }
  } else if(t.st==="grabbed"||t.st==="approved"){
    t.st="done"; renderClose(); renderPay();
    toast("✅ 任务完成=SOP候选(候选≠固化) · 固化要等验果:上一层的标动了才允许 · 去记分卡屏看验果面板","go");
  }
}
function gateDecide(qi,ok){
  const q=S.gateQueue[qi]; if(!q||q.st!=="pending")return;
  q.st=ok?"approved":"rejected"; q.decider=WHO.nm;
  const t=S.tasks.find(x=>x.id===q.tid);
  if(t)t.st=ok?"approved":"idle";
  S.gateHistory.unshift({t:q.t, amt:q.amt, st:q.st, by:q.decider});
  renderRegion(); renderClose();
  toast(ok?"✅ 已核定(留痕) · 该任务解锁为可执行 · 核定≠验果:结果指标动没动下期验"
         :"↩ 已驳回(留痕) · 任务退回提案位 · 检测≠判决,驳回不自动罚",ok?"go":"red");
}

    const lvl=diff<=0.01?["go","≤1% 一致"]:(diff<=0.02?["amber","1–2% 观察"]:["red",">2% 红线→转人工"]);
    return `<div class="verify" id="reconRow${i}" data-recon="${i}">
      <div class="vh">${s.name} <span class="pill ${lvl[0]}">${lvl[1]}</span>${fixed?'<span class="pill go">已盘点归位</span>':""}</div>
      <div class="vm">账面 ${s.wh.book}${(s.wh.push&&S.calib)?"(压货+"+s.wh.push+"已剔)":""} · 实物 ${fixed?s.wh.book:s.wh.real} · 差异 ${(diff*100).toFixed(1)}%</div>
      <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn xs ${diff>0.02?"red":"o"}" data-recount="${i}" onclick="doRecount(${i})" ${fixed?"disabled":""}>📷 XD现场盘·修账</button>
        ${diff>0.02?'<span class="pill red">差异大→HITL转人工·检测≠判决·不自动罚</span>':""}
      </div>
    </div>`;}).join("");
  document.getElementById("pRecon").innerHTML=`
  <div class="card" id="cardReconHead">
    <div class="ph">⚖️ 账实核对 · 有货命门(内核⑭首位节点) <span class="sub">Workflow·链式:现场盘→比账面→出差异 · 账面=实物 才算"有货"</span></div>
    <div class="hint">前置仓的"有货"开关=账实一致,不是账面有数。账面96实物93=线上显示有货但拣不出=接单即毁约,毁的是30分钟确定性=毁复购。每日优鲜死于命门失守。</div>
    <div class="qq"><b>三连问</b>:数从哪来=erp_wms(账面)+xd_warehouse(实物) · 到哪去=差异→补货触发+HITL,判定→KPI结算 · 谁的钱=账实差收窄省下的钱计仓管效率提成</div>
  </div>
  ${rows}
  <div class="card">
    <div class="ph">🧪 校准纪律(算差前必做) </div>
    <div class="row"><span>线上端去假</span><span style="text-align:right;color:var(--dim)">剔促销冲量GMV(冲量≠自然动销)</span></div>
    <div class="row"><span>仓库端去假</span><span style="text-align:right;color:var(--dim)">剔压货虚增(为KPI多订的货不算健康有货)</span></div>
    <div class="row"><span>TypeB 蝴蝶</span><span style="text-align:right;color:var(--dim)">别的仓调拨在途误计本仓 → 剔除后再算差</span></div>
  </div>`;
}

/* ── 屏4 · 关差·抢单 ── */
function renderClose(){
  const stMap={idle:["提案位·待抢/待核","gray"],grabbed:["🙋 已抢单·执行中","blue"],gated:["🔒 已进HITL队列·未批不得执行","amber"],approved:["✅ 已核定·可执行(执行仍是人)","go"],done:["✔ 完成=候选(候选≠固化)","go"]};
  const tasksH=S.tasks.map(t=>{
    const st=stMap[t.st];
    const btn=t.st==="idle"?(t.money?"提交核定(HITL)":"🙋 抢单")
             :(t.st==="grabbed"||t.st==="approved")?"完成":"";
    return `<div class="task ${t.money?"money":""} ${t.irr?"irr":""}" data-task="${t.id}">
      <div class="th">${t.t}
        ${t.money?'<span class="pill amber">涉钱'+(t.amt?" ¥"+t.amt.toLocaleString():"")+"</span>":'<span class="pill go">可逆·自主</span>'}
        ${t.irr?'<span class="pill red">不可逆·统一审批</span>':""}</div>
      <div class="tsub">${t.why}</div>
      <div class="tst" data-tst="${t.id}">${st[0]}</div>
      ${btn?`<div style="margin-top:7px"><button class="btn xs ${t.money&&t.st==="idle"?"":"go"}" data-taskbtn="${t.id}" onclick="taskAct(${t.id})">${btn}</button></div>`:""}
    </div>`;}).join("");
  document.getElementById("pClose").innerHTML=`
  <div class="card" id="cardNodes">
    <div class="ph">🖐 本体节点(内核⑭⑮⑯ · 节点=手,开关是数据) <span class="sub">全 Workflow ①规则型 · 建设三阶段现阶段 · loop_spec=N/A</span></div>
    ${NODES.map(n=>`<div class="node" id="${n.id}" data-node="${n.id}"><div class="nh">${n.nm}</div><div class="bea">${n.bea}</div></div>`).join("")}
  </div>
  <div class="card" id="cardTasks">
    <div class="ph">⚔️ 关差任务(抢单) <span class="sub">授权分级:可逆→自主 · 涉钱/不可逆→HITL卡执行前(propose-only)</span></div>
    ${tasksH}
    <div class="qq"><b>三连问</b>:数从哪来=判级节点差值 · 到哪去=完成→候选→验果 · 谁的钱=涉钱任务全走HITL,引擎只提案绝不自动花钱</div>
  </div>`;
}

/* ── 屏5 · 记分卡·收入·验果 ── */
function renderPay(){
  const I=incomeCalc();
  const sc=SIX.map((s,i)=>{
    const got=[10,9,S.reconFixed[1]?22:16,15,16,10][i];
    return `<div class="row" id="swRow${i}" data-sw="${s.k}">
      <span><b>${s.nm}</b> <span class="hint">${s.online!=="—"?s.online:""}${s.online!=="—"&&s.wh!=="—"?" / ":""}${s.wh!=="—"?s.wh:""}</span></span>
      <span class="mono">${got}/${s.full} <span class="pill blue" style="cursor:pointer" onclick="setTab('dual');flashEl('#cardSix')">↘原位</span></span></div>`;}).join("");
  const verH=VERIFY.map((v,i)=>`<div class="verify" data-verify="${i}">
      <div class="vh">${v.std} ${v.moved?'<span class="pill go">动了 ↑</span>':'<span class="pill gray">没动(持平)</span>'}</div>
      <div class="vm">上期 ${v.prev} → 本期 ${v.now}</div></div>`).join("");
  const candH=SOP_CAND.map((c,i)=>{
    const ok=VERIFY[c.vk].moved;
    return `<div class="row" data-cand="${i}"><span>${c.t}<br><span class="hint">挂验果:${VERIFY[c.vk].std}</span></span>
      <button class="btn xs ${ok?"go":"gray"}" data-candbtn="${i}" onclick="${ok
        ?`toast('📌 已固化进本仓规则(验果通过:上一层的标真动了)','go')`
        :`toast('⛔ 验果铁律:候选≠固化 · 该上层标没动,不允许固化(任务做完≠验果)','red')`}">固化</button></div>`;}).join("");
  document.getElementById("pPay").innerHTML=`
  <div class="card" id="cardIncome">
    <div class="ph">💰 收入四段(引擎件①·前置仓翻译) <span class="sub">${INCOME_MODEL}</span></div>
    <div class="row" data-pay="base"><span>① 底薪</span><span class="mono">¥${INCOME_BASE.toLocaleString()}</span></div>
    <div class="row" data-pay="merit"><span>② 战功分(双端6开关达标 ${I.meritTiles}判×6分×¥40)</span><span class="mono" data-merit>¥${I.merit.toLocaleString()}</span></div>
    <div class="row" data-pay="gate"><span>③ Gate毕业奖(味达美·成熟利润门)${I.gateCand?' <span class="pill amber">候选·待主管核定(核定≠验果)</span>':' <span class="pill gray">未达</span>'}</span><span class="mono" data-gatebonus>¥${I.gate.toLocaleString()}</span></div>
    <div class="row" data-pay="eff"><span>④ 效率提成(省下的钱×${EFF_RATE*100}%)<br><span class="hint">${EFF_SAVINGS.map(e=>e.nm+" ¥"+e.amt.toLocaleString()).join(" · ")}</span></span><span class="mono" data-eff>¥${I.eff.toLocaleString()}</span></div>
    <div class="row"><span><b>本月合计</b></span><span class="mono" style="font-weight:800;color:var(--go)" data-income-sum>¥${I.total.toLocaleString()}</span></div>
    <div class="qq"><b>三连问</b>:数从哪来=KPI结算节点(判级Output=结算Input) · 到哪去=仓管收入/绩效 · 谁的钱=省下的钱(账实/损耗/缺货)按比例分给省钱的人</div>
  </div>
  <div class="card" id="cardScore">
    <div class="ph">🗂 仓管KPI记分卡 · 双端6开关 <span class="sub">定标↓=满分100(非倒推) · 量实↑=双端盘 · 差=满分−实得</span></div>
    ${sc}
    <div class="row"><span><b>合计</b></span><span class="mono" data-sc-total>${[10,9,S.reconFixed[1]?22:16,15,16,10].reduce((a,b)=>a+b,0)}/100</span></div>
  </div>
  <div class="card" id="cardVerify">
    <div class="ph">🔎 验果面板(引擎件⑥·铁律) <span class="sub">验果=看上一层的标动没动,非任务做没做 · 候选≠固化 · 核定≠验果</span></div>
    ${verH}
    <div class="ph" style="margin-top:9px">📌 SOP候选(固化须过验果)</div>
    ${candH}
  </div>`;
}

/* ── 屏6 · 区域仓盘(主管) ── */
function renderRegion(){
  if(ROLE!=="mgr"){document.getElementById("pRegion").innerHTML="";return;}
  const worst=WAREHOUSES.reduce((a,b)=>a.zs<b.zs?a:b);
  const whH=WAREHOUSES.map(w=>`<tr data-wh="${w.id}" ${w.id===worst.id?'style="background:#fbf3f2"':""}>
    <td><b>${w.nm}</b>${w.id===worst.id?' <span class="pill red">worst仓·定档口径</span>':""}<br><span class="mono" style="color:var(--dim)">${w.id}</span></td>
    <td class="mono">${(w.zs*100).toFixed(1)}%</td><td class="mono">${(w.oos*100).toFixed(1)}%</td>
    <td class="mono">${(w.loss*100).toFixed(1)}%</td><td class="mono">${(w.otd*100).toFixed(0)}%</td>
    <td class="mono">${w.same>=0?"+":""}${(w.same*100).toFixed(0)}%</td></tr>`).join("");
  const pend=S.gateQueue.map((q,i)=>q.st!=="pending"?"":`
    <div class="gq" data-gq="${i}">
      <div class="gh">${q.t} ${q.irr?'<span class="pill red">不可逆</span>':'<span class="pill amber">涉钱</span>'}</div>
      <div class="gmeta">金额 ¥${q.amt.toLocaleString()} · 提案人 ${q.by} · block_before_exec=true(未批不得执行)</div>
      <div style="margin-top:7px;display:flex;gap:7px">
        <button class="btn xs go" data-gqok="${i}" onclick="gateDecide(${i},true)">✅ 核定通过</button>
        <button class="btn xs red" data-gqno="${i}" onclick="gateDecide(${i},false)">↩ 驳回</button>
      </div>
    </div>`).join("")||'<div class="hint">暂无待核定项 · 涉钱/不可逆任务提交后进此队列</div>';
  const hist=S.gateHistory.map(h=>`<div class="row"><span>${h.t}</span><span class="pill ${h.st==="approved"?"go":"red"}">${h.st==="approved"?"已核定":"已驳回"} · ${h.by}</span></div>`).join("");
  document.getElementById("pRegion").innerHTML=`
  <div class="card" id="cardWhs">
    <div class="ph">🗺️ 区域4仓 · 双端体检 <span class="sub">worst仓口径:最差仓定区域档位 · 同仓增长=复制质量口径</span></div>
    <table class="tb2"><tr><th>仓</th><th>账实准</th><th>缺货</th><th>损耗</th><th>30min达成</th><th>同仓增长</th></tr>${whH}</table>
    <div class="hint" style="margin-top:5px">大红门仓账实96.3%拖档 → 区域关差位=先救worst仓的命门,不是给好仓加码</div>
  </div>
  <div class="card" id="copyGate">
    <div class="ph">🧬 复制Gate(成长期·看复制) <span class="sub">六月鲜 3/3仓复制达标 · 候选毕业</span></div>
    <div class="row"><span>首仓模型复制</span><span class="pill go">3仓全过初步动销门</span></div>
    <div class="row"><span>毕业判定</span><span class="pill amber">候选 · 需核定 + 下期验果(上层标动)才固化</span></div>
  </div>
  <div class="card" id="cardGateQ">
    <div class="ph">🔒 HUMAN_GATE_QUEUE · 核定队列 <span class="sub">引擎只提案 · 人拍板 · 核定≠验果 · 驳回不自动罚</span></div>
    ${pend}
    ${hist?'<div class="ph" style="margin-top:9px">留痕</div>'+hist:""}
  </div>`;
}

function renderAll(){renderTop();renderTabs();renderToday();renderDual();renderRecon();renderClose();renderPay();renderRegion();}
renderAll();
toast("trial 假水已通:登录→定标→双端盘→校准→算差→归因→关差(HITL)→记分卡→验果 全链可点 · MOCK_MODE=true 绝不要真数据","go");
</script>
