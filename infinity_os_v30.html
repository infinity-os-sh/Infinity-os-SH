<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>INFINITY OS · 合伙人制 V1.2 · 欣和SH</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#07080c;--ink2:#0c0e14;--ink3:#12151e;
  --card:#161b24;--card2:#1c2230;
  --border:rgba(255,255,255,.05);--border2:rgba(255,255,255,.10);
  --text:#dde3f0;--text2:#7a8499;--text3:#363d50;
  --gold:#c9922a;--gold2:#e8b84b;--gold3:#f5d07a;
  --gold-dim:rgba(201,146,42,.08);--gold-glow:rgba(201,146,42,.18);
  --gold-border:rgba(201,146,42,.3);
  --teal:#3abfb8;--teal-dim:rgba(58,191,184,.08);
  --green:#35b06a;--green-dim:rgba(53,176,106,.08);
  --red:#d94f4f;--red-dim:rgba(217,79,79,.08);
  --blue:#4485cc;--blue-dim:rgba(68,133,204,.08);
  --purple:#8b6ee0;--purple-dim:rgba(139,110,224,.08);
  --rose:#d4507a;--rose-dim:rgba(212,80,122,.08);
  --silver:#8a9ab0;--silver-dim:rgba(138,154,176,.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--ink);color:var(--text);font-family:'Noto Sans SC',sans-serif}
.screen{position:fixed;inset:0;display:none;flex-direction:column;overflow:hidden}
.screen.on{display:flex;animation:fi .28s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ══ 角色选择屏 ══ */
#s-role{justify-content:center;align-items:center;padding:16px;
  background:radial-gradient(ellipse at 20% 20%,rgba(201,146,42,.05) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 80%,rgba(58,191,184,.03) 0%,transparent 60%),var(--ink)}
.role-wrap{width:100%;max-width:560px}
.role-top{text-align:center;margin-bottom:22px}
.r-sym{width:54px;height:54px;border-radius:14px;margin:0 auto 12px;
  background:linear-gradient(135deg,var(--gold),#b8760f);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--ink);
  box-shadow:0 8px 28px rgba(201,146,42,.28)}
.r-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--text);letter-spacing:.04em;margin-bottom:2px}
.r-sub{font-size:11px;color:var(--text3);font-family:'Space Mono',monospace;letter-spacing:.07em;margin-bottom:8px}
.r-star{font-size:12px;color:var(--gold2);margin-bottom:4px}
.r-star span{font-family:'Space Mono',monospace;font-weight:700}

.role-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
@media(min-width:460px){.role-grid{grid-template-columns:repeat(3,1fr);gap:10px}}
.rc{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:16px 12px;cursor:pointer;transition:all .22s;text-align:center;
  position:relative;overflow:hidden}
.rc:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.rc:active{transform:scale(.97)}
/* deep partner gold border */
.rc.deep{border-color:var(--gold-border);background:linear-gradient(135deg,var(--card),rgba(201,146,42,.04))}
.rc.deep::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold),transparent)}
.rc-badge{position:absolute;top:7px;right:8px;font-size:9px;font-weight:700;
  padding:1px 6px;border-radius:8px;letter-spacing:.04em}
.badge-deep{background:var(--gold);color:var(--ink)}
.badge-std{background:rgba(255,255,255,.08);color:var(--text3)}
.rc-icon{font-size:24px;margin-bottom:7px;display:block}
.rc-name{font-size:12px;font-weight:700;margin-bottom:3px}
.rc-desc{font-size:10px;color:var(--text3);line-height:1.5}

/* ══ 通用仪表板元素 ══ */
.topbar{background:rgba(7,8,12,.96);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 15px;height:52px;flex-shrink:0}
.tb-l{display:flex;align-items:center;gap:9px}
.tb-sym{width:30px;height:30px;border-radius:7px;
  background:linear-gradient(135deg,var(--gold),#b8760f);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:700;color:var(--ink)}
.tb-name{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;
  color:var(--text);letter-spacing:.03em}
.tb-r{display:flex;align-items:center;gap:7px}
.tb-pill{font-size:10px;background:var(--gold-dim);border:1px solid var(--gold-border);
  color:var(--gold2);padding:3px 9px;border-radius:12px;cursor:pointer;transition:all .2s}
.tb-pill:hover{background:var(--gold-glow)}
.tb-clock{font-family:'Space Mono',monospace;font-size:10px;color:var(--text3)}

.wb{display:flex;justify-content:space-between;align-items:flex-start;
  padding:11px 15px 6px;flex-shrink:0}
.wb-l{}
.wb-greet{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;
  color:var(--text);line-height:1.3}
.wb-date{font-size:10px;color:var(--text3);font-family:'Space Mono',monospace;margin-top:2px}
.wb-badge{font-size:10px;padding:3px 9px;border-radius:10px;font-weight:700;flex-shrink:0}
.wb-deep{background:var(--gold);color:var(--ink)}
.wb-std{background:rgba(255,255,255,.07);color:var(--silver)}

.body{flex:1;overflow-y:auto;padding:10px 15px 60px}
.body::-webkit-scrollbar{width:3px}
.body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:2px}

/* 北极星进度 */
.star-bar{background:linear-gradient(135deg,rgba(201,146,42,.08),rgba(7,8,12,0));
  border:1px solid var(--gold-border);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.sb-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.sb-title{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;color:var(--gold2)}
.sb-pct{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--gold)}
.sb-track{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin-bottom:5px}
.sb-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--gold2))}
.sb-bot{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);font-family:'Space Mono',monospace}

/* 双向承诺卡 */
.pact-card{background:var(--card);border:1px solid var(--border);border-radius:13px;
  overflow:hidden;margin-bottom:10px}
.pact-hdr{display:flex;border-bottom:1px solid var(--border)}
.pact-col{flex:1;padding:10px 12px}
.pact-col:first-child{border-right:1px solid var(--border)}
.pact-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.07em;
  text-transform:uppercase;margin-bottom:7px}
.pact-item{display:flex;align-items:flex-start;gap:6px;font-size:11px;
  color:var(--text2);margin-bottom:5px;line-height:1.4}
.pact-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:8px;margin-top:1px}
.dot-ok{background:var(--green-dim);color:var(--green);border:1px solid rgba(53,176,106,.2)}
.dot-pend{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border)}
.dot-no{background:var(--red-dim);color:var(--red);border:1px solid rgba(217,79,79,.2)}

/* sec 标题 */
.sec{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.09em;
  text-transform:uppercase;display:flex;align-items:center;gap:7px;
  margin-bottom:8px;margin-top:14px}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}

/* 核心数字 */
.core-row{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:2px}
.core-box{background:var(--card);border:1px solid var(--border);border-radius:11px;
  padding:11px 8px;text-align:center}
.cv{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;line-height:1}
.cl{font-size:9px;color:var(--text3);margin-top:4px;line-height:1.3}
.ct{font-size:10px;font-weight:700;margin-top:3px;font-family:'Space Mono',monospace}
.up{color:var(--green)}.dn{color:var(--red)}.wn{color:var(--gold)}

/* 待办 */
.todo{display:flex;align-items:center;gap:9px;padding:9px 12px;
  border-radius:10px;margin-bottom:6px;transition:all .15s}
.t-urg{background:var(--red-dim);border:1px solid rgba(217,79,79,.2)}
.t-nrm{background:var(--gold-dim);border:1px solid var(--gold-border)}
.t-inf{background:var(--blue-dim);border:1px solid rgba(68,133,204,.2)}
.t-ic{font-size:17px;flex-shrink:0}
.t-b{flex:1;min-width:0}
.t-title{font-size:12px;font-weight:700;margin-bottom:1px}
.t-urg .t-title{color:var(--red)}.t-nrm .t-title{color:var(--gold2)}.t-inf .t-title{color:var(--blue)}
.t-desc{font-size:10px;color:var(--text3)}
.tbtn{padding:5px 11px;border-radius:16px;font-size:11px;font-weight:700;
  border:none;cursor:pointer;flex-shrink:0;font-family:'Noto Sans SC',sans-serif}
.b-r{background:var(--red);color:#fff}.b-g{background:var(--gold);color:var(--ink)}
.b-b{background:var(--blue);color:#fff}.b-t{background:var(--teal);color:var(--ink)}
.b-gr{background:var(--green);color:#fff}

/* 模块网格 */
.mod-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:4px}
.mc{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:13px 12px;cursor:pointer;transition:all .2s;
  display:flex;flex-direction:column;min-height:88px;position:relative;overflow:hidden}
.mc:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.mc:active{transform:scale(.97)}
.mc-top{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.mc-ic{font-size:17px}.mc-lbl{font-size:12px;font-weight:700}
.mc-desc{font-size:10px;color:var(--text3);line-height:1.5;flex:1}
.mc-arr{position:absolute;bottom:9px;right:11px;font-size:13px;color:var(--text3)}

/* Layer 1.3 & 路线图 */
.layer-card{background:var(--card);border:1px solid var(--gold-border);
  border-radius:13px;padding:14px;margin-bottom:10px;
  position:relative;overflow:hidden}
.layer-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold),transparent)}
.layer-title{font-size:13px;font-weight:700;color:var(--gold2);margin-bottom:10px;
  display:flex;align-items:center;gap:7px}
.layer-status{display:flex;align-items:center;gap:8px;background:rgba(201,146,42,.06);
  border:1px solid var(--gold-border);border-radius:9px;padding:9px 12px;margin-bottom:8px}
.ls-num{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:var(--gold);flex-shrink:0;line-height:1}
.ls-body{}
.ls-name{font-size:12px;font-weight:700;color:var(--gold2);margin-bottom:2px}
.ls-desc{font-size:11px;color:var(--text2)}
.roadmap{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.rm-step{background:var(--ink3);border-radius:9px;padding:9px 10px;border:1px solid var(--border)}
.rm-step.current{border-color:var(--gold-border);background:var(--gold-dim)}
.rm-ph{font-size:10px;font-weight:700;margin-bottom:3px;font-family:'Space Mono',monospace}
.rm-step.current .rm-ph{color:var(--gold)}
.rm-name{font-size:11px;font-weight:600;margin-bottom:3px}
.rm-step.current .rm-name{color:var(--gold2)}
.rm-desc{font-size:10px;color:var(--text3);line-height:1.5}

/* vs 勤策 */
.qince-bar{background:var(--card);border:1px solid var(--border);
  border-radius:13px;padding:14px;margin-bottom:10px;
  position:relative;overflow:hidden}
.qince-bar::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--green),var(--gold),var(--red))}
.qb-title{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.qb-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.qb-col{text-align:center}
.qb-val{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;line-height:1}
.qb-lbl{font-size:10px;color:var(--text3);margin-top:3px}
.qb-bar{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:5px}
.qb-fill{height:100%;border-radius:2px}

/* AI Agent */
.ai-wrap{background:var(--card);border:1px solid var(--border);
  border-radius:13px;overflow:hidden;margin-top:14px;margin-bottom:4px}
.ai-hdr{padding:10px 13px;border-bottom:1px solid var(--border);
  font-size:11px;font-weight:700;color:var(--text3);
  letter-spacing:.07em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.ai-role{color:var(--gold2);font-size:12px}
.cps{display:flex;gap:5px;padding:8px 12px;overflow-x:auto;scrollbar-width:none}
.cps::-webkit-scrollbar{display:none}
.cp{background:var(--ink3);border:1px solid var(--border);border-radius:14px;
  padding:4px 10px;font-size:11px;color:var(--text2);white-space:nowrap;
  cursor:pointer;transition:all .15s;flex-shrink:0;font-family:'Noto Sans SC',sans-serif}
.cp:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
.ai-bub{margin:0 12px 8px;background:var(--ink3);border:1px solid var(--border);
  border-radius:10px;padding:9px 12px;font-size:12px;color:var(--text2);line-height:1.65}
.ai-resp{display:none;margin:0 12px 8px;background:var(--ink2);
  border:1px solid var(--border);border-radius:10px;
  padding:10px 12px;font-size:12px;color:var(--text2);line-height:1.7}
.ai-resp.on{display:block}
.ai-qe{font-size:10px;color:var(--text3);margin-bottom:6px;
  padding-bottom:6px;border-bottom:1px solid var(--border)}
.ai-row{display:flex;gap:6px;padding:6px 12px 10px}
.ai-in{flex:1;background:var(--ink3);border:1px solid var(--border);border-radius:9px;
  padding:8px 11px;font-size:12px;color:var(--text);outline:none;
  font-family:'Noto Sans SC',sans-serif}
.ai-in:focus{border-color:var(--gold-border)}
.ai-in::placeholder{color:var(--text3)}
.ai-btn{width:36px;height:36px;border-radius:9px;background:var(--gold);
  border:none;cursor:pointer;font-size:14px;flex-shrink:0;
  color:var(--ink);font-weight:700}
.td-w{display:flex;gap:4px;align-items:center}
.td{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:tda 1.2s infinite}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes tda{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* 会员消费者特殊 */
.member-level{background:linear-gradient(135deg,rgba(201,146,42,.15),rgba(201,146,42,.05));
  border:1px solid var(--gold-border);border-radius:12px;padding:14px;
  text-align:center;margin-bottom:10px}
.ml-crown{font-size:32px;margin-bottom:6px}
.ml-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--gold2);margin-bottom:3px}
.ml-sub{font-size:11px;color:var(--text3)}
.ml-pts{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;color:var(--gold);margin-top:8px}

/* 底部全模块入口（管理层） */
.all-mods{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:10px}
.am-card{background:var(--ink3);border:1px solid var(--border);border-radius:10px;
  padding:9px 11px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px}
.am-card:hover{border-color:var(--border2);background:var(--card)}
.am-ic{font-size:14px;flex-shrink:0}
.am-body{flex:1;min-width:0}
.am-name{font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.am-cat{font-size:9px;color:var(--text3)}
.am-arr{font-size:11px;color:var(--text3);flex-shrink:0}
</style>
</head>
<body>

<!-- ══ 角色选择 ══ -->
<div class="screen on" id="s-role">
  <div class="role-wrap">
    <div class="role-top">
      <div class="r-sym">∞</div>
      <div class="r-title">INFINITY OS</div>
      <div class="r-sub">合伙人制 V1.2 · 欣和SH</div>
      <div class="r-star">北极星：<span>2亿瓶 · ¥40亿</span> · 2029年</div>
    </div>
    <div class="role-grid" id="roleGrid"></div>
  </div>
</div>

<!-- ══ 仪表板（动态生成）══ -->
<div class="screen" id="s-dash">
  <div class="topbar">
    <div class="tb-l">
      <div class="tb-sym">∞</div>
      <div class="tb-name" id="tb-name">INFINITY OS</div>
    </div>
    <div class="tb-r">
      <div class="tb-pill" onclick="chg()" id="tb-pill">角色 ▾</div>
      <div class="tb-clock" id="tb-ck"></div>
    </div>
  </div>
  <div class="wb">
    <div>
      <div class="wb-greet" id="wb-greet"></div>
      <div class="wb-date" id="wb-date"></div>
    </div>
    <div class="wb-badge" id="wb-badge"></div>
  </div>
  <div class="body" id="dash-body"></div>
</div>

<script>
// ══ 配置数据 ══════════════════════════════════════════
const BASE = 'https://infinity-os-sh.github.io/Infinity-os-SH/';

const ROLES = {
  mgmt:{
    name:'管理层', icon:'🏢', color:'var(--gold)', deep:true,

      partner:['ok:欣和 → 所有合伙方','ok:INFINITY OS全栈数字化','ok:SPD深度合伙模式','pend:Agent真实决策闭环']
    },
    core:[
      {v:'71%', l:'全国动销达成率', t:'目标100%', c:'wn'},

      {v:'2条', l:'蝴蝶效应预警', t:'需处置', c:'dn'},
    ],
    todos:[
      {cls:'t-urg', ic:'🦋', title:'浦东A类压货预警', desc:'宝仓贸易消化率61%·库存超3.5a', btn:'处置', bcls:'b-r', url:'infinity_os_agent_spec_02.html'},
      {cls:'t-nrm', ic:'🍣', title:'本周Omakase推单审批', desc:'3个经销商·合计¥84,200·今日到期', btn:'审批', bcls:'b-g', url:'infinity_os_agent_spec_03.html'},
      {cls:'t-inf', ic:'🎯', title:'遵循自然目标规则申请', desc:'B2超额触发上调·需管理层确认', btn:'审批', bcls:'b-b', url:'infinity_os_target_rules.html'},
    ],
    mods:[
      {ic:'📊', lbl:'晨报中台', desc:'全国每日动销·节点健康', url:'infinity_os_v781.html', c:'var(--gold)'},
      {ic:'🔍', lbl:'多维分析', desc:'SKU×城市×渠道下钻', url:'infinity_os_drilldown.html', c:'var(--teal)'},
      {ic:'🦋', lbl:'蝴蝶效应', desc:'A/B/C/D失真全链检测', url:'infinity_os_agent_spec_02.html', c:'var(--red)'},
      {ic:'💹', lbl:'财务视图', desc:'P&L·费用率·返利', url:'infinity_os_v84.html', c:'var(--gold2)'},
    ],

let curRole = localStorage.getItem('ios30_role') || null;

// ══ 角色选择 ══════════════════════════════════════════
function initRoleGrid() {
  const g = document.getElementById('roleGrid');
  Object.entries(ROLES).forEach(([k, r]) => {
    const d = document.createElement('div');
    d.className = `rc${r.deep?' deep':''}`;
    d.onclick = () => selectRole(k);
    d.innerHTML = `
      <span class="rc-badge ${r.deep?'badge-deep':'badge-std'}">${r.deep?'深度合伙':'标准合伙'}</span>
      <span class="rc-icon">${r.icon}</span>
      <div class="rc-name" style="color:${r.color}">${r.name}</div>
      <div class="rc-desc">${r.badge}</div>`;
    g.appendChild(d);
  });
}

function selectRole(k) {
  localStorage.setItem('ios30_role', k);
  curRole = k;
  renderDash(k);
}
function chg() {
  localStorage.removeItem('ios30_role');
  curRole = null;
  document.getElementById('s-dash').classList.remove('on');
  document.getElementById('s-role').classList.add('on');
}
function go(url) { if(url && url!=='#') window.location.href=url; }

// ══ 渲染仪表板 ══════════════════════════════════════
function renderDash(k) {
  const r = ROLES[k];
  const now = new Date();
  const h = now.getHours();
  const greet = h<12?'早安':h<18?'下午好':'晚上好';
  const days = ['周日','周一','周二','周三','周四','周五','周六'];
  const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 · ${days[now.getDay()]}`;

  document.getElementById('tb-name').textContent = 'INFINITY OS';
  document.getElementById('tb-pill').textContent = `${r.icon} ${r.name} ▾`;
  document.getElementById('wb-greet').textContent = `${greet} · ${r.greeting}`;
  document.getElementById('wb-date').textContent = dateStr;
  const badge = document.getElementById('wb-badge');
  badge.textContent = r.badge;
  badge.className = `wb-badge ${r.deep?'wb-deep':'wb-std'}`;

  // 会员特殊处理
  const body = document.getElementById('dash-body');
  let html = '';

  if(k === 'member') {

// ══ AI ═══════════════════════════════════════════════
async function askAI(q, role, el) {
  if(!q||!q.trim()) return;
  if(el instanceof HTMLElement && el.tagName==='INPUT') el.value='';
  const resp = document.getElementById('ai-resp-'+role);
  const qEl = document.getElementById('ai-q-'+role);
  const aEl = document.getElementById('ai-a-'+role);
  if(!resp) return;
  resp.classList.add('on');
  qEl.textContent = '❓ ' + q;
  aEl.innerHTML = '<div class="td-w"><div class="td"></div><div class="td"></div><div class="td"></div></div>';
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:1000,
        system: ROLES[role]?.ai?.sys || '你是欣和SH INFINITY OS合伙人制AI助手，中文简洁回答，≤150字。',
        messages:[{role:'user', content:q}]
      })
    });
    const d = await r.json();
    aEl.innerHTML = `<div style="white-space:pre-wrap">${d.content?.map(c=>c.text||'').join('')||'—'}</div>`;
  } catch(e) {
    aEl.innerHTML = `<div style="color:var(--red);font-size:11px">⚠️ ${e.message}</div>`;
  }
}

// ══ 时钟 ══════════════════════════════════════════════
function tick() {
  const n = new Date();
  const t = n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
  const el = document.getElementById('tb-ck');
  if(el) el.textContent = t;
}
