<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>INFINITY OS · v8.0</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Mono:wght@400;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS ── */
:root {
  --bg:#07080e; --bg2:#0b0d15; --bg3:#10131c;
  --card:#13161f; --card2:#181c28;
  --border:rgba(255,255,255,0.05); --border2:rgba(255,255,255,0.10);
  --text:#dde3f0; --text2:#7a8499; --text3:#3d4457;
  --amber:#f5a623; --amber2:#ffc85e; --amber-dim:rgba(245,166,35,0.08);
  --teal:#4ecdc4; --teal-dim:rgba(78,205,196,0.08);
  --red:#ff5f5f;  --red-dim:rgba(255,95,95,0.08);
  --green:#4ade80; --green-dim:rgba(74,222,128,0.08);
  --blue:#60a5fa;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;min-height:100vh}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(7,8,14,0.95);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:52px;gap:10px;
}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-sym{
  width:28px;height:28px;border-radius:7px;
  background:linear-gradient(135deg,#f5a623,#ff7c38);
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;font-size:12px;color:#000;
}
.logo-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700}
.logo-name span{color:var(--amber)}
.breadcrumb{
  display:flex;align-items:center;gap:4px;
  font-size:11px;color:var(--text3);overflow-x:auto;scrollbar-width:none;flex:1;
}
.breadcrumb::-webkit-scrollbar{display:none}
.bc-item{white-space:nowrap;cursor:pointer;transition:color .15s;flex-shrink:0}
.bc-item:hover{color:var(--text2)}
.bc-cur{color:var(--text2)}
.bc-sep{opacity:.4;flex-shrink:0}
.topbar-r{display:flex;align-items:center;gap:8px;flex-shrink:0}
.clock{font-family:'Space Mono',monospace;font-size:10px;color:var(--text3)}
.back-btn{
  background:var(--card2);border:1px solid var(--border2);
  border-radius:16px;padding:4px 10px;font-size:11px;color:var(--text2);
  cursor:pointer;transition:all .15s;display:none;
}
.back-btn:hover{color:var(--text);background:var(--card)}
.ver-tag{
  font-size:9px;font-family:'Space Mono',monospace;
  color:var(--amber);background:var(--amber-dim);
  border:1px solid rgba(245,166,35,0.2);padding:2px 7px;border-radius:10px;
}

/* ── MAIN ── */
#app{padding:12px 16px 100px;min-height:calc(100vh - 52px)}

/* ── HOME HERO ── */
.home-hero{text-align:center;padding:20px 0 16px}
.home-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:3px}
.home-title span{color:var(--amber)}
.home-sub{font-size:10px;color:var(--text3);font-family:'Space Mono',monospace}

/* ── STATS ROW ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center}
.stat-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;line-height:1}
.stat-lbl{font-size:9px;color:var(--text3);margin-top:3px;line-height:1.2}

/* ── SECTION LABEL ── */
.sec{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;
     margin:14px 0 8px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}
.sec .badge{font-size:9px;background:var(--red);color:#fff;padding:1px 6px;border-radius:8px}
.sec .badge-a{background:var(--amber);color:#000}

/* ── NODE CARD (list item) ── */
.node-card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:12px 14px;margin-bottom:7px;cursor:pointer;
  display:flex;align-items:center;gap:10px;
  transition:all .15s;
}
.node-card:hover{background:var(--card2);border-color:var(--border2);transform:translateX(2px)}
.nc-icon{
  width:40px;height:40px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:18px;
}
.nc-body{flex:1;min-width:0}
.nc-name{font-size:13px;font-weight:600;margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nc-type{font-size:10px;color:var(--text3);margin-bottom:3px}
.nc-hb{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.nc-r{font-size:11px;font-family:'Space Mono',monospace}
.nc-right{flex-shrink:0;text-align:right}
.nc-pct{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;line-height:1}
.nc-water{font-size:9px;margin-top:2px;padding:2px 6px;border-radius:6px;
  font-family:'Space Mono',monospace;display:inline-block}
.alert-pip{
  width:7px;height:7px;border-radius:50%;background:var(--red);
  box-shadow:0 0 6px var(--red);flex-shrink:0;
}

/* water level colors */
.wl-overflow{color:var(--red);background:var(--red-dim);border:1px solid rgba(255,95,95,.2)}
.wl-full{color:var(--green);background:var(--green-dim);border:1px solid rgba(74,222,128,.2)}
.wl-warn{color:var(--amber);background:var(--amber-dim);border:1px solid rgba(245,166,35,.2)}
.wl-low{color:var(--red);background:var(--red-dim);border:1px solid rgba(255,95,95,.2)}
.wl-empty{color:var(--text3);background:rgba(255,255,255,.03);border:1px solid var(--border)}
.r-good{color:var(--green)} .r-warn{color:var(--amber)} .r-bad{color:var(--red)}

/* ── DETAIL SECTIONS ── */
.detail-hero{
  background:linear-gradient(135deg,var(--card) 0%,var(--card2) 100%);
  border:1px solid var(--border2);border-radius:14px;
  padding:16px;margin-bottom:10px;position:relative;overflow:hidden;
}
.detail-hero::before{content:'';position:absolute;top:0;left:0;right:0;
  height:2px;background:linear-gradient(90deg,var(--amber),transparent)}
.dh-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.dh-left{}
.dh-icon{font-size:28px;margin-bottom:6px}
.dh-name{font-family:'Syne',sans-serif;font-size:20px;font-weight:700}
.dh-type{font-size:11px;color:var(--amber);margin-top:2px}
.dh-right{text-align:right}
.dh-pct{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;line-height:1}
.dh-pct-lbl{font-size:10px;color:var(--text3)}
.dh-bar{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:10px}
.dh-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--amber),var(--amber2))}

/* Metric grid */
.metric-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:10px}
.metric-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.mb-lbl{font-size:10px;color:var(--text3);margin-bottom:4px}
.mb-val{font-size:15px;font-weight:700;line-height:1.2}

/* ── WATER LEVEL VISUAL ── */
.wl-visual{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:14px;margin-bottom:10px;
}
.wl-title{font-size:10px;color:var(--text3);font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:10px}
.wl-tank{
  position:relative;height:60px;background:rgba(255,255,255,.03);
  border:1px solid var(--border2);border-radius:8px;overflow:hidden;
}
.wl-fill{
  position:absolute;bottom:0;left:0;right:0;
  transition:height .8s ease;display:flex;align-items:center;justify-content:center;
}
.wl-fill-label{
  font-family:'Syne',sans-serif;font-size:14px;font-weight:800;
  text-shadow:0 1px 3px rgba(0,0,0,.5);
}
.wl-markers{display:flex;justify-content:space-between;margin-top:4px;
  font-size:9px;font-family:'Space Mono',monospace;color:var(--text3)}

/* ── ALERT CARD ── */
.alert-card{
  background:rgba(255,95,95,.05);border:1px solid rgba(255,95,95,.2);
  border-left:3px solid var(--red);border-radius:0 12px 12px 0;
  padding:12px 14px;margin-bottom:8px;
}
.ac-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.ac-label{font-size:9px;color:var(--red);font-family:'Space Mono',monospace;
  letter-spacing:.1em;text-transform:uppercase;font-weight:700}
.ac-badge{font-size:9px;background:var(--red-dim);color:var(--red);
  border:1px solid rgba(255,95,95,.2);padding:1px 6px;border-radius:6px}
.ac-title{font-size:12px;font-weight:600;margin-bottom:4px}
.ac-desc{font-size:11px;color:var(--text2);line-height:1.5}

/* ── ACTION CARD (decision queue) ── */
.action-card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  overflow:hidden;margin-bottom:8px;
}
.action-card.high{border-color:rgba(255,95,95,.2);background:rgba(255,95,95,.03)}
.action-card.mid{border-color:rgba(245,166,35,.15)}
.acard-top{padding:11px 14px;display:flex;gap:9px;align-items:flex-start}
.acard-agent{font-size:10px;color:var(--text3);margin-bottom:3px;display:flex;align-items:center;gap:5px}
.acard-agent span{color:var(--amber)}
.acard-title{font-size:13px;font-weight:600;margin-bottom:4px;line-height:1.3}
.acard-conf{display:flex;align-items:center;gap:5px;font-size:10px;
  font-family:'Space Mono',monospace;margin-top:4px}
.conf-bar{width:50px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.conf-fill{height:100%;border-radius:2px}
.acard-btns{display:flex;gap:6px;padding:0 14px 11px}
.btn-approve{flex:1;background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.25);
  border-radius:9px;padding:8px;font-size:12px;font-weight:600;color:var(--green);
  cursor:pointer;transition:all .15s;font-family:'Noto Sans SC',sans-serif}
.btn-approve:hover{background:rgba(74,222,128,.2)}
.btn-pass{flex:1;background:rgba(255,255,255,.03);border:1px solid var(--border2);
  border-radius:9px;padding:8px;font-size:12px;color:var(--text2);
  cursor:pointer;transition:all .15s;font-family:'Noto Sans SC',sans-serif}
.btn-pass:hover{border-color:var(--amber);color:var(--amber)}
.decided-row{padding:8px 14px;font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px}

/* ── CHILDREN LIST ── */
.children-wrap{display:flex;flex-direction:column;gap:7px}

/* ── CHAT ── */
.chat-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px}
.chat-hdr{padding:10px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;
  color:var(--text3);letter-spacing:.07em;text-transform:uppercase}
.chat-hdr-agent{color:var(--amber);font-size:12px}
.chat-chips{display:flex;gap:5px;padding:8px 12px;overflow-x:auto;scrollbar-width:none}
.chat-chips::-webkit-scrollbar{display:none}
.chip{
  background:var(--bg3);border:1px solid var(--border);border-radius:16px;
  padding:4px 10px;font-size:11px;color:var(--text2);white-space:nowrap;
  cursor:pointer;transition:all .15s;flex-shrink:0;font-family:'Noto Sans SC',sans-serif;
}
.chip:hover{border-color:var(--amber);color:var(--amber);background:var(--amber-dim)}
.chat-bubble{margin:0 12px 8px;background:var(--bg3);border:1px solid var(--border);
  border-radius:10px;padding:9px 12px;font-size:12px;color:var(--text2);line-height:1.65}
.chat-resp{display:none;margin:0 12px 8px;background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:10px 12px;font-size:12px;color:var(--text2);line-height:1.7}
.chat-resp.show{display:block}
.chat-q-echo{font-size:10px;color:var(--text3);margin-bottom:6px;
  padding-bottom:6px;border-bottom:1px solid var(--border)}
.chat-input-row{display:flex;gap:6px;padding:6px 12px 10px}
.chat-input{
  flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:9px;
  padding:8px 11px;font-size:12px;color:var(--text);outline:none;
  font-family:'Noto Sans SC',sans-serif;
}
.chat-input:focus{border-color:rgba(245,166,35,.4)}
.chat-input::placeholder{color:var(--text3)}
.chat-send{width:36px;height:36px;border-radius:9px;background:var(--amber);border:none;
  cursor:pointer;font-size:14px;transition:all .15s;flex-shrink:0}
.chat-send:hover{background:var(--amber2);transform:scale(1.05)}

/* ── THINKING DOTS ── */
.td-wrap{display:flex;gap:4px;align-items:center;padding:2px 0}
.td{width:5px;height:5px;border-radius:50%;background:var(--amber);animation:td 1.2s infinite}
.td:nth-child(2){animation-delay:.2s} .td:nth-child(3){animation-delay:.4s}
@keyframes td{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* ── HOME QUICK ACCESS ── */
.brand-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.brand-pill{
  background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;
  transition:all .15s;display:flex;align-items:center;gap:6px;
}
.brand-pill:hover{border-color:var(--amber);color:var(--amber);background:var(--amber-dim)}
.brand-pill.active{border-color:var(--amber);color:var(--amber);background:var(--amber-dim)}

/* ── CMD BAR ── */
.cmd-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(7,8,14,.97);backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  padding:8px 16px 14px;
}
.cmd-lbl{font-size:9px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;
  font-family:'Space Mono',monospace;margin-bottom:6px;
  display:flex;align-items:center;gap:5px}
.cmd-lbl::before{content:'⌘';color:var(--amber)}
.cmd-row{display:flex;gap:7px}
.cmd-input{
  flex:1;background:var(--card2);border:1px solid var(--border2);border-radius:12px;
  padding:10px 14px;font-size:13px;color:var(--text);outline:none;
  font-family:'Noto Sans SC',sans-serif;transition:border-color .2s;
}
.cmd-input:focus{border-color:rgba(245,166,35,.4)}
.cmd-input::placeholder{color:var(--text3)}
.cmd-btn{width:42px;height:42px;border-radius:11px;
  background:linear-gradient(135deg,var(--amber),#ff8c3a);
  border:none;cursor:pointer;font-size:16px;transition:all .2s;flex-shrink:0}
.cmd-btn:hover{transform:scale(1.05)}

/* ── CMD RESPONSE ── */
.cmd-resp{
  display:none;position:fixed;bottom:70px;left:16px;right:16px;z-index:99;
  background:var(--card2);border:1px solid var(--border2);border-radius:14px;
  padding:13px;max-height:45vh;overflow-y:auto;
  box-shadow:0 -8px 32px rgba(0,0,0,.5);
}
.cmd-resp.show{display:block;animation:slideUp .2s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.cmd-resp-close{position:absolute;top:9px;right:12px;cursor:pointer;
  color:var(--text3);font-size:13px;background:none;border:none}
.cmd-resp-q{font-size:10px;color:var(--amber);margin-bottom:7px;
  padding-bottom:7px;border-bottom:1px solid var(--border);font-family:'Space Mono',monospace}
.cmd-resp-a{font-size:12px;color:var(--text2);line-height:1.75;white-space:pre-wrap}

/* ── FADE ANIM ── */
.fade-in{animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:2px}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-sym">∞</div>
    <div class="logo-name">INFINITY <span>OS</span></div>
    <div class="ver-tag">v8.0</div>
  </div>
  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="topbar-r">
    <div class="clock" id="clock"></div>
    <div class="back-btn" id="backBtn" onclick="navBack()">← 返回</div>
  </div>
</div>

<div id="app"></div>

<!-- CMD BAR -->
<div class="cmd-bar">
  <div class="cmd-lbl">指令中枢</div>
  <div class="cmd-row">
    <input class="cmd-input" id="cmdInput"
      placeholder="「查浦东r值」「暂停宝仓补货」「今日低水位门店」…"
      onkeydown="if(event.key==='Enter')sendCmd()"/>
    <button class="cmd-btn" onclick="sendCmd()">↑</button>
  </div>
</div>

<!-- CMD RESPONSE -->
<div class="cmd-resp" id="cmdResp">
  <button class="cmd-resp-close" onclick="closeCmd()">×</button>
  <div class="cmd-resp-q" id="cmdQ"></div>
  <div class="cmd-resp-a" id="cmdA"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// INFINITY OS v8.0 · 架构核心
//
// 三个原则：
// 1. renderNode(nodeId)   → 唯一渲染入口，所有层级通用
// 2. callClaude(sys, q)   → 唯一 AI 对话函数，12个变成1个
// 3. MOCK_DB              → 与 NodeResponse.java DTO 完全对齐
//    API 上线后只需替换 fetchNode() 里的 URL，其余代码不变
// ═══════════════════════════════════════════════════════════════

// ── 导航栈 ──────────────────────────────────────────────────
const navStack = [];
let currentNodeId = null;

// ── 时钟 ─────────────────────────────────────────────────────
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent =
    n.getHours().toString().padStart(2,'0') + ':' +
    n.getMinutes().toString().padStart(2,'0') + ':' +
    n.getSeconds().toString().padStart(2,'0');
}
tick(); setInterval(tick, 1000);

// ══════════════════════════════════════════════════════════════
// MOCK DATABASE
// 结构完全对齐 NodeResponse.java DTO
// API 上线后 fetchNode() 从后端拉，这里的数据自动废弃
// ══════════════════════════════════════════════════════════════
const MOCK_DB = {

  // L0 品牌
  'lyx': {
    node: { id:'lyx', type:'brand', name:'六月鲜', brand:'lyx', channel:'both', grade:null, gradeCoeff:null, tDays:30 },
    heartbeat: { aValue:8500, rActual:283.3, rTarget:340.0, rAchievement:83.3, inventoryUnits:25500, inventoryA:3.0, waterLevel:'full', digestRate:0.78, snapshotDate:'2026-04-13', dataSource:'calculated' },
    cbTotal: 18.2, alerts: [], actions: [],
    breadcrumb: [{ id:'lyx', name:'六月鲜', type:'brand' }],
    children: [
      { id:'lyx-sh',  name:'上海',   type:'city', rAchievement:78.4, waterLevel:'warn',     activeAlertCount:1 },
      { id:'lyx-cd',  name:'成都',   type:'city', rAchievement:91.2, waterLevel:'full',     activeAlertCount:0 },
      { id:'lyx-bj',  name:'北京',   type:'city', rAchievement:65.8, waterLevel:'warn',     activeAlertCount:1 },
    ]
  },

  // L1 城市
  'lyx-sh': {
    node: { id:'lyx-sh', type:'city', name:'上海', brand:'lyx', channel:'P1', grade:null, gradeCoeff:null, tDays:30 },
    heartbeat: { aValue:1800, rActual:47.1, rTarget:60.0, rAchievement:78.5, inventoryUnits:5400, inventoryA:3.0, waterLevel:'full', digestRate:0.72, snapshotDate:'2026-04-13', dataSource:'calculated' },
    cbTotal: 17.8, alerts: [], actions: [],
    breadcrumb: [
      { id:'lyx',    name:'六月鲜', type:'brand' },
      { id:'lyx-sh', name:'上海',   type:'city'  }
    ],
    children: [
      { id:'lyx-sh-dist-baocang', name:'宝仓贸易（浦东）', type:'distributor', rAchievement:78.0, waterLevel:'overflow', activeAlertCount:1 },
      { id:'lyx-sh-dist-lina',    name:'李娜负责（黄浦）', type:'distributor', rAchievement:82.1, waterLevel:'warn',     activeAlertCount:0 },
      { id:'lyx-sh-dist-wanglei', name:'王磊负责（长宁）', type:'distributor', rAchievement:95.0, waterLevel:'full',     activeAlertCount:0 },

// THE ONLY CHAT FUNCTION
// 12个 sendXXXChat / askXXX 函数 → 这1个
// ══════════════════════════════════════════════════════════════
async function callClaude(systemPrompt, userQuestion, outputEl) {
  outputEl.innerHTML = '<div class="td-wrap"><div class="td"></div><div class="td"></div><div class="td"></div></div>';
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: userQuestion }]
      })
    });
    const d = await r.json();
    const txt = d.content?.map(c => c.text || '').join('') || '暂无回答';
    outputEl.innerHTML = `<div style="white-space:pre-wrap">${txt}</div>`;
  } catch (e) {
    outputEl.innerHTML = `<div style="color:var(--red)">⚠️ ${e.message}</div>`;
  }
}

      </div>

      </div>`;
    });
  }

  // 5. 子节点下钻
  if (children && children.length > 0) {
    html += `<div class="sec">${nodeTypeLabel(node.type)} › 下钻</div>`;
    html += `<div class="children-wrap">`;
    children.forEach(c => {
      const ca = c.rAchievement;
      const cc = ca >= 80 ? 'r-good' : ca >= 60 ? 'r-warn' : 'r-bad';

      <div class="node-card" onclick="renderNode('${c.id}')">

        </div>

    });
    html += `</div>`;
  }

  // 6. AI 对话（节点自带上下文）
  const chatId = `chat-${nodeId.replace(/[^a-z0-9]/gi,'_')}`;
  html += `
  <div class="sec">AI 对话</div>

    <div class="chat-hdr">NODE AGENT · <span class="chat-hdr-agent">${nodeIcon} ${node.name}</span></div>

  html += `</div>`; // fade-in
  app.innerHTML = html;

}

// ── 节点 Chat（使用唯一的 callClaude 函数）─────────────────
async function sendNodeChat(q, chatId, nodeId, chipEl, inputEl) {
  if (!q || !q.trim()) return;
  const respEl = document.getElementById('resp-' + chatId);
  const qEl    = document.getElementById('q-'    + chatId);
  const aEl    = document.getElementById('a-'    + chatId);
  if (!respEl) return;
  respEl.classList.add('show');
  qEl.textContent = '❓ ' + q;
  if (inputEl) inputEl.value = '';

  const data   = MOCK_DB[nodeId];
  const node   = data?.node;
  const hb     = data?.heartbeat;

  // 节点上下文自动注入 prompt，每个节点的 AI 对话都是它自己的数据
  const sys = `你是 INFINITY OS 中「${node?.name}」节点的 Agent（类型：${nodeTypeLabel(node?.type)}）。
当前心跳数据：r实际=${hb?.rActual}，r目标=${hb?.rTarget}，达成率=${hb?.rAchievement}%，库存=${hb?.inventoryA}a（${hb?.waterLevel}），消化率=${hb ? (hb.digestRate*100).toFixed(1)+'%' : '--'}。
${data?.alerts?.length > 0 ? '当前警报：' + data.alerts.map(a=>a.title).join('；') : '当前无警报。'}
用中文简洁回答，不超过150字，直接给结论。`;

  await callClaude(sys, q, aEl);
}

// ── 渲染面包屑 ────────────────────────────────────────────
function renderBreadcrumb(crumbs) {
  const bc = document.getElementById('breadcrumb');
  if (!crumbs || crumbs.length === 0) { bc.innerHTML = ''; return; }
  bc.innerHTML = crumbs.map((c, i) =>
    i === crumbs.length - 1
      ? `<span class="bc-item bc-cur">${c.name}</span>`
      : `<span class="bc-item" onclick="renderNode('${c.id}')">${c.name}</span><span class="bc-sep">›</span>`
  ).join('');
}

}
