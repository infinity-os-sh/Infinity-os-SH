  .metric.bad{border-color:#e0bdb7;background:var(--red-tint);}

  .metric .mt{font-family:var(--mono);font-size:9px;color:var(--slate);margin-top:1px;}

  .cnode.f{background:var(--red-tint);border-color:#e0bdb7;color:var(--red);}

  .btn.sm{font-size:11px;padding:6px 10px;}

  .navbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--surface);border-top:1px solid var(--rule);display:flex;}
  .nav{flex:1;text-align:center;padding:8px 2px 9px;font-size:10.5px;color:var(--slate);cursor:pointer;}
  .nav.on{color:var(--amber-deep);font-weight:700;}
  .nav .ni{font-size:15px;display:block;}
  .hint{font-family:var(--mono);font-size:9.5px;color:var(--slate);margin-top:4px;line-height:1.5;}
  .kbd{font-family:var(--mono);font-size:9px;background:#efece3;border:1px solid var(--rule);border-radius:3px;padding:0 4px;}
</style>

function toast(msg,kind){
  const w=document.getElementById('tw');const d=document.createElement('div');
  d.className='toast'+(kind?' '+kind:'');d.textContent=msg;w.appendChild(d);
  requestAnimationFrame(()=>d.classList.add('show'));

}
function metricVal(mk){ const ov=S.metricEdited[S.stage]||{}; return (mk in ov)?ov[mk]:null; }
function curMetrics(){
  const ms=curSKU().metrics;const ov=S.metricEdited[S.stage]||{};
  return ms.map(m=>{
    const v=(m.k in ov)?ov[m.k]:m.v;              // 校准值(去假后)
    const pass=m.dir==="lt"?(v<m.t):(v>=m.t);     // 判级恒用校准值(MUST:算差前先去假)
    const show=(!S.calib && m.raw!=null)?m.raw:v;  // 显示值:去假前露raw虚高
    return {...m,v,show,pass,inflated:(!S.calib&&m.raw!=null)};
  });
}
function gatePass(){
  const metricPass = curMetrics().every(m=>m.pass);
  const gr = curSKU().gate_result||{};
  // 硬红线真参与判级:有 hard_redline 的期,红线 false → Gate 必 false
  const redline = gr.hard_redline ? gr.hard_redline.pass===true : true;
  if(S.stage==='decline'){
    // Gate4:cost_squeeze 在先——没关直通车(squeeze_executed)不许判 stoploss_hold
    const c=gr.chain||{};
    return metricPass && redline
      && c.residual_signal?.pass===true
      && c.cost_squeeze?.pass===true && c.cost_squeeze?.squeeze_executed===true
      && c.inventory_clearance?.pass===true
      && c.migration_ready?.pass===true;
  }
  if(S.stage==='renewal'){
    // Gate-R:根因未解/同雷再踩 → 不许 back_to_growth
    return metricPass && redline
      && gr.root_cause_resolved===true && gr.relapse_free===true;
  }
  return metricPass && redline;
}

    roi_rule:"<1.0止损·1.0-1.3留修·≥1.3进成熟"};
  if(st==='mature')  return {...base, ...gr, gate3_pass:g, gate3_verdict:g?"stable_keep":"stable_reduce_spend",
    next_action:g?"stay_mature_next_cycle":"harvest_mode"};
  // Gate4:cost_squeeze 在先·verdict 恒在 options 内
  if(st==='decline') return {...base, ...gr, gate4_verdict:g?"stoploss_hold":"refresh_restart"};
  // Gate-R:出口与期内状态分轴
  if(st==='renewal') return {...base, ...gr,
    gate_r_verdict:g?"back_to_growth":null, internal_status:g?null:"stay_renewal_fix"};
  // Gate-T 终态(terminal/archive_delete:false/不可复活)
  return {...base, ...gr};
}

      Output:n6Verdict(), Next:n6Next() }
  ];

}
function escalate(){
  S.pending.push({kind:"关差关不了·升品类会诊",text:SKU.name+" · "+STAGES[S.stage].name+" 结构性未达标",amt:0,irr:true});
  if(S.tab==='cockpit')renderCockpit();
  toast("↑ 已升一层 · 关不了的差 → 主管品类层会诊(连接律·规律③)","warn");
}
function stepRing(i){
  S.ringLit[S.stage]=i+1; renderRing();
  const names=["定标↓","量实↑","算差(去假)","关差","验果"];
  toast("环 · 跑到「"+names[i]+"」"+(i===4?" · 验果=看上层标动没动":""));
}
function settle(){
  if(!gatePass()){ toast("有指标未达标 → 关差没关,滚明天,不放大断链","red"); return; }
  const st=STAGES[S.stage];
  if(st.inc===0){ S.done=true; renderToday(); toast("本阶段不计增长激励(衰退/淘汰按残值/收尾结算)","warn"); return; }
  S.hGot+=st.inc; S.done=true; renderToday();
  toast("✓ 数据回流确认 · "+st.gate+" 达标落袋 +"+st.inc+" · 验果上溯：品类层A认知资产上移","go");
}

/* ---------------- boot ---------------- */
/* ── 读登录页带来的身份(URL 参数)· 单独打开无参数则回落默认 ── */
(function readIdentity(){
  const p=new URLSearchParams(location.search);
  const name=p.get('name'), role=p.get('role'), ch=p.get('channel');
  if(name) CHANNEL.who=name;                         // 顶部姓名由登录带入
  if(role==='emp'||role==='mgr') S.role=role;        // 权限:决定 human_gate 能否核定
  // channel 用于校验(本 App=tmall);登录路由已保证进对的 App，这里只做温和提示
  if(ch && ch!==CHANNEL.key){ /* 渠道不匹配:仍按本 App 跑,登录页负责路由 */ }
})();

renderStrip(); renderHead(); renderToday();
// 若登录带入的是主管，初始高亮主管
if(S.role==='mgr'){ document.getElementById('rEmp').className='role'; document.getElementById('rMgr').className='role me'; }
</script>
