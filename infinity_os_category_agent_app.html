<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFINITY OS · 渠道品类 Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Mono:wght@400;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#09090f;--bg2:#0e1018;--bg3:#13161f;--card:#141820;--card2:#1a2030;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --text:#e8ecf5;--text2:#8a95aa;--text3:#4a5468;
  --amber:#f5a623;--amber2:#ffc85e;--amber-dim:rgba(245,166,35,0.1);
  --teal:#4ecdc4;--teal-dim:rgba(78,205,196,0.1);
  --red:#ff5f5f;--red-dim:rgba(255,95,95,0.1);
  --green:#4ade80;--green-dim:rgba(74,222,128,0.1);
  --blue:#60a5fa;--blue-dim:rgba(96,165,250,0.1);--purple:#a78bfa;--purple-dim:rgba(167,139,250,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;line-height:1.55;padding-bottom:80px}
.wrap{max-width:760px;margin:0 auto;padding:0 13px}
/* top */
.top{position:sticky;top:0;z-index:50;background:rgba(9,9,15,0.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:10px 13px;display:flex;align-items:center;gap:9px}
.sym{width:27px;height:27px;border-radius:7px;background:linear-gradient(135deg,#f5a623,#ff7c38);display:flex;align-items:center;justify-content:center;font-family:'Syne';font-weight:800;color:#000;font-size:13px}
.brand{font-family:'Syne';font-weight:700;font-size:13px}.brand span{color:var(--amber)}
.dsrc{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:10px;font-family:'Space Mono'}
.dpill{padding:3px 8px;border-radius:9px;border:1px solid var(--border2);cursor:pointer;color:var(--text3)}
.dpill.on{background:var(--amber-dim);border-color:rgba(245,166,35,.35);color:var(--amber)}
.dpill.off{opacity:.5;cursor:not-allowed}
/* tabs */
.tabs{position:sticky;top:48px;z-index:49;background:rgba(9,9,15,0.94);backdrop-filter:blur(12px);display:flex;gap:5px;padding:9px 13px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:7px 13px;border-radius:20px;border:1px solid var(--border);background:var(--card);font-size:12px;color:var(--text2);cursor:pointer;white-space:nowrap}
.tab.active{background:var(--amber-dim);border-color:rgba(245,166,35,.35);color:var(--amber);font-weight:600}
/* run bar */
.runbar{display:flex;align-items:center;gap:10px;margin:14px 0;padding:12px 14px;border-radius:12px;background:linear-gradient(135deg,rgba(245,166,35,.08),rgba(78,205,196,.04));border:1px solid rgba(245,166,35,.2)}
.runbar .ri{flex:1}.runbar .rt{font-size:12.5px;font-weight:600}.runbar .rs{font-size:10.5px;color:var(--text3);font-family:'Space Mono';margin-top:1px}
.runbtn{padding:9px 15px;border-radius:10px;background:var(--amber);color:#000;border:none;font-weight:700;font-size:12px;cursor:pointer;font-family:'Noto Sans SC';white-space:nowrap}
.runbtn:hover{background:var(--amber2)}
.runbtn:disabled{opacity:.5}
.runlog{font-family:'Space Mono';font-size:11px;color:var(--teal);margin-top:8px;min-height:16px}
/* view */
.view{display:none;animation:fade .2s}.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.h{font-family:'Syne';font-size:17px;font-weight:700;margin:16px 0 4px}
.sub{font-size:11.5px;color:var(--text3);margin-bottom:12px}
/* stat strip */
.strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.sbox{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px 9px;text-align:center}
.sbox .v{font-family:'Syne';font-size:20px;font-weight:800;line-height:1}
.sbox .l{font-size:9.5px;color:var(--text3);margin-top:3px}
.c-a{color:var(--amber)}.c-r{color:var(--red)}.c-g{color:var(--green)}.c-b{color:var(--blue)}.c-p{color:var(--purple)}
/* KA cards */
.ka{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:13px 15px;margin-bottom:9px;cursor:pointer;transition:all .15s}
.ka:hover{border-color:var(--border2);background:var(--card2)}
.ka-top{display:flex;align-items:center;gap:10px}
.ka-name{font-size:14px;font-weight:600}.ka-meta{font-size:10.5px;color:var(--text3);margin-top:1px}
.ka-score{margin-left:auto;text-align:right}
.ka-score .n{font-family:'Syne';font-size:19px;font-weight:800}
.ka-score .l{font-size:9px;color:var(--text3)}
.ka-bar{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:9px}
.ka-fill{height:100%;border-radius:2px}
.ka-foot{display:flex;justify-content:space-between;font-size:10.5px;color:var(--text3);margin-top:7px}
.ka-foot b{color:var(--amber)}
/* task feed */
.task{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:13px 15px;margin-bottom:9px;border-left:3px solid var(--purple)}
.task-h{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.task-rank{font-family:'Syne';font-size:13px;font-weight:800;color:var(--purple)}
.task-ka{font-size:11px;color:var(--text3)}
.task-gap{margin-left:auto;font-family:'Space Mono';font-size:11px;color:var(--amber)}
.task-act{font-size:13px;font-weight:600;margin:3px 0 7px}
.win2{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:9px}
.wtag{font-size:10.5px;padding:3px 8px;border-radius:7px}
.wtag.r{background:var(--blue-dim);color:var(--blue)}.wtag.x{background:var(--amber-dim);color:var(--amber)}
.grab{width:100%;padding:9px;border-radius:9px;background:var(--card2);border:1px solid var(--border2);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;font-family:'Noto Sans SC'}
.grab:hover{background:var(--amber);color:#000;border-color:var(--amber)}
.grab.grabbed{background:var(--green-dim);color:var(--green);border-color:rgba(74,222,128,.3);cursor:default}
/* detail */
.back{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);cursor:pointer;margin:14px 0 8px;padding:5px 11px;border:1px solid var(--border2);border-radius:18px}
.back:hover{color:var(--text)}
.acctlabel{font-size:10px;font-family:'Space Mono';letter-spacing:.05em;text-transform:uppercase;margin:16px 0 6px;display:flex;align-items:center;gap:6px}
.acctlabel::before{content:'';width:8px;height:8px;border-radius:2px}
.acctlabel.a{color:var(--blue)}.acctlabel.a::before{background:var(--blue)}
.acctlabel.x{color:var(--amber)}.acctlabel.x::before{background:var(--amber)}
.acctlabel.g{color:var(--purple)}.acctlabel.g::before{background:var(--purple)}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:11.5px;min-width:440px}
th{background:rgba(255,255,255,.04);color:var(--text3);text-align:left;padding:7px 9px;border-bottom:1px solid var(--border);font-size:9.5px;text-transform:uppercase;white-space:nowrap}
td{padding:7px 9px;border-bottom:1px solid rgba(255,255,255,.03);color:var(--text2);white-space:nowrap}
tr:last-child td{border-bottom:none}td b{color:var(--text)}
.neg{color:var(--red);font-weight:600}.pos{color:var(--green);font-weight:600}
.chip{display:inline-block;font-size:9.5px;padding:2px 6px;border-radius:7px;font-family:'Space Mono'}
.c-traffic{background:rgba(96,165,250,.15);color:var(--blue)}.c-trans{background:rgba(78,205,196,.15);color:var(--teal)}
.c-cash{background:rgba(245,166,35,.15);color:var(--amber)}.c-profit{background:rgba(74,222,128,.15);color:var(--green)}
.role-flag{display:inline-block;font-size:9.5px;padding:2px 6px;border-radius:6px;background:rgba(255,255,255,.05);color:var(--text2)}
.rec{border:1px solid rgba(167,139,250,.25);background:var(--purple-dim);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.rec .rh{font-size:12.5px;font-weight:700;color:var(--purple);margin-bottom:5px}
.rec .rr{font-size:11.5px;color:var(--text2);margin:2px 0}.rec .rr b{color:var(--text)}
.conf{font-size:10px;font-family:'Space Mono';color:var(--text3);margin-top:6px}
/* 8-step */
.stepper{display:flex;gap:4px;overflow-x:auto;padding:4px 0 11px;scrollbar-width:none}.stepper::-webkit-scrollbar{display:none}
.stp{flex:0 0 auto;min-width:56px;border:1px solid var(--border);background:var(--card);border-radius:9px;padding:6px 5px;text-align:center;cursor:pointer}
.stp .sn{font-family:'Space Mono';font-size:9px;color:var(--text3)}.stp .st{font-size:10.5px;font-weight:600;color:var(--text2);margin-top:2px}
.stp.active{border-color:var(--amber);background:var(--amber-dim)}.stp.active .st{color:var(--amber)}
.panel{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:15px;min-height:200px}
.pd{font-size:12px;color:var(--text2);margin-bottom:10px}
.nav8{display:flex;gap:8px;margin-top:13px}
.btn8{flex:1;padding:10px;border-radius:9px;border:1px solid var(--border2);background:var(--card2);color:var(--text2);font-size:12.5px;font-weight:600;cursor:pointer;font-family:'Noto Sans SC'}
.btn8.pri{background:var(--amber);color:#000;border-color:var(--amber)}
.foot{margin-top:20px;font-size:10px;color:var(--text3);font-family:'Space Mono';line-height:1.7}
</style>
</head>
<body>
<div class="top">
  <div class="sym">∞</div><div class="brand">渠道品类 <span>Agent</span></div>
  <div class="dsrc">数据源
    <span class="dpill on" id="dp-sim">模拟</span>
    <span class="dpill off" id="dp-live" title="接汉询/POS后启用">真实·待接</span>
  </div>
</div>
<div class="tabs">
  <div class="tab active" data-v="dash" onclick="tab('dash')">驾驶舱</div>
  <div class="tab" data-v="feed" onclick="tab('feed')">今日要关的差</div>
  <div class="tab" data-v="eng" onclick="tab('eng')">八步引擎</div>
</div>
<div class="wrap">

  <!-- DASH -->
  <div class="view active" id="v-dash">
    <div class="runbar">
      <div class="ri"><div class="rt">渠道品类 Agent · 引擎</div><div class="rs" id="run-state">就绪 · 模拟数据</div></div>
      <button class="runbtn" id="runbtn" onclick="runEngine()">▶ 运行引擎</button>
    </div>
    <div class="runlog" id="runlog"></div>
    <div class="strip" id="dash-strip"></div>
    <div class="h">KA / 门店</div>
    <div class="sub">点开看该客户的品类缺口与双赢建议 · 评分越低差距越大</div>
    <div id="ka-list"></div>
  </div>

  <!-- FEED -->
  <div class="view" id="v-feed">
    <div class="h">今日要关的差</div>
    <div class="sub">引擎跨所有 KA 生成的双赢动作,按机会大小排序 · 抢单式(美顾/SR 端 XM)</div>
    <div id="feed-list"></div>
  </div>

  <!-- ENGINE -->
  <div class="view" id="v-eng">
    <div class="h">八步引擎走查</div>
    <div class="sub" id="eng-sub"></div>
    <div class="stepper" id="stepper"></div>
    <div class="panel" id="panel"></div>
    <div class="nav8"><button class="btn8" id="e-prev" onclick="estep(-1)">← 上一步</button><button class="btn8 pri" id="e-next" onclick="estep(1)">下一步 →</button></div>
  </div>

  <!-- KA DETAIL (overlay-ish view) -->
  <div class="view" id="v-ka">
    <div class="back" onclick="tab('dash')">← 返回驾驶舱</div>
    <div id="ka-detail"></div>
  </div>

  <div class="foot" id="foot"></div>
</div>

<script>
// ========= 数据源适配层(换它不动引擎/界面) =========
const DataSource = {
  mode:'SIM',
  stores(){ return this.mode==='SIM' ? SIM.stores : LIVE.stores(); }
  // 接汉询后:LIVE.stores() 实现 fetch + 映射成同样结构即可,SIM/LIVE 对引擎透明
};
const LIVE = { stores(){ throw '真实数据未接入'; } };

// ========= 模拟种子:欣和 · 酱油品类 =========
const FS_DEFAULT = 6.0; // Fair Share 基准(模拟)
const STRAT={traffic:'增来客',trans:'增客单',cash:'现金流',profit:'提利润'};
const SCLS={traffic:'c-traffic',trans:'c-trans',cash:'c-cash',profit:'c-profit'};
// 欣和品牌→区隔→SKU角色
// seg: 区隔 | share该店份额 | fs应得 | mgn毛利 | grow增长 | size规模m | strat策略
// xh: 该区隔欣和品牌 | role角色 | mktShare欣和市占 | promoShare欣和占的促销/陈列资源
const SIM = {
  stores:[
    {id:'rt-jn',name:'大润发 · 济南',type:'大卖场',role:'优先性',fs:6.0,
      seg:[
        {n:'高端生抽',share:5.1,mgn:14,grow:true,size:1800,strat:'traffic', xh:{b:'六月鲜',role:'旗舰',mkt:31,promo:14}},
        {n:'普通生抽',share:6.4,mgn:9, grow:true,size:2400,strat:'trans',   xh:{b:'味达美',role:'主力',mkt:22,promo:20}},
        {n:'老抽',    share:6.1,mgn:8, grow:false,size:900, strat:'profit',  xh:{b:'味达美',role:'跑量',mkt:18,promo:16}},
        {n:'有机酱油',share:3.2,mgn:19,grow:true,size:600, strat:'cash',    xh:{b:'禾然',  role:'利基',mkt:9, promo:5}},
        {n:'凉拌蘸食',share:7.8,mgn:16,grow:true,size:420, strat:'profit',  xh:{b:'葱伴侣',role:'利基',mkt:13,promo:12}},
      ]},
    {id:'yh-qd',name:'永辉 · 青岛',type:'大卖场',role:'优先性',fs:6.0,
      seg:[
        {n:'高端生抽',share:4.2,mgn:13,grow:true,size:1500,strat:'traffic', xh:{b:'六月鲜',role:'旗舰',mkt:28,promo:11}},
        {n:'普通生抽',share:5.0,mgn:9, grow:false,size:2100,strat:'trans',  xh:{b:'味达美',role:'主力',mkt:19,promo:18}},
        {n:'有机酱油',share:2.4,mgn:20,grow:true,size:520, strat:'cash',    xh:{b:'禾然',  role:'利基',mkt:7, promo:3}},
        {n:'防御低价',share:8.1,mgn:5, grow:false,size:800, strat:'profit', xh:{b:'小康',  role:'防御',mkt:16,promo:15}},
      ]},
    {id:'sam-jn',name:'山姆 · 济南',type:'会员仓储',role:'目的性',fs:7.0,
      seg:[
        {n:'高端生抽',share:6.3,mgn:18,grow:true,size:1100,strat:'traffic', xh:{b:'六月鲜',role:'旗舰',mkt:38,promo:30}},
        {n:'有机酱油',share:4.1,mgn:22,grow:true,size:700, strat:'cash',    xh:{b:'禾然',  role:'利基',mkt:12,promo:6}},
      ]},
    {id:'cs-jd',name:'社区超市连锁 · 胶东',type:'社区',role:'便利性',fs:5.0,
      seg:[
        {n:'普通生抽',share:4.6,mgn:9, grow:true,size:900, strat:'trans',  xh:{b:'味达美',role:'主力',mkt:17,promo:9}},
        {n:'凉拌蘸食',share:5.4,mgn:15,grow:true,size:300, strat:'profit', xh:{b:'葱伴侣',role:'利基',mkt:11,promo:7}},
      ]},
  ]
};

// ========= 门引擎(真在算) =========
const G = {
  pg(s,fs){ return +(s.share - fs).toFixed(2); },
  opportunity(st){ return st.seg.filter(s=>s.grow && G.pg(s,st.fs)<0)
      .reduce((a,s)=>a+Math.abs(G.pg(s,st.fs))/100*s.size,0); },
  health(st){ // 100 - 加权缺口
    let pen=0; st.seg.forEach(s=>{ const g=G.pg(s,st.fs); if(g<0) pen+=Math.abs(g)*(s.size/1000); });
    return Math.max(20, Math.round(100 - pen*6));
  },
  keystone(st){ // 零售商缺口区隔(增长&pg<0) ∩ 欣和品牌被低估(mkt≫promo)
    const recs=[];
    st.seg.forEach(s=>{ const g=G.pg(s,st.fs);
      if(g<0 && s.grow){ const under=s.xh.mkt-s.xh.promo;
        if(under>5){ recs.push({ka:st.name,seg:s.n,strat:s.strat,brand:s.xh.b,role:s.xh.role,
          mkt:s.xh.mkt,promo:s.xh.promo,under,pg:g,
          opp:+(Math.abs(g)/100*s.size).toFixed(1),
          action:`在${st.name}「${s.n}」加配 ${s.xh.b} 的陈列/促销份额(${s.xh.promo}%→贴近市占 ${s.xh.mkt}%)`,
          rWin:`填该店「${s.n}·${STRAT[s.strat]}」缺口 ${g} 点`,
          xWin:`${s.xh.b}(${s.xh.role})动销↑·市占 ${s.xh.mkt}% 却只占 ${s.xh.promo}% 资源`}); } }
    });
    return recs;
  }
};
function allTasks(){ let t=[]; DataSource.stores().forEach(st=>t.push(...G.keystone(st))); return t.sort((a,b)=>b.opp-a.opp); }

// ========= 运行引擎动画 =========
let ran=false, grabbed={};
function runEngine(){
  const btn=document.getElementById('runbtn'), log=document.getElementById('runlog'), st=document.getElementById('run-state');
  btn.disabled=true; st.textContent='运行中…';
  const steps=['读数据(模拟·DataSource)…','③评估:算各 KA Fair Share 缺口…','⑤策略:区隔分派…','keystone:匹配欣和可补 SKU…','生成「今日要关的差」…'];
  let i=0; log.textContent='';
  const iv=setInterval(()=>{
    if(i<steps.length){ log.textContent='▸ '+steps[i]; i++; }
    else{ clearInterval(iv); ran=true; btn.disabled=false;
      st.textContent='完成 · '+allTasks().length+' 条待关差'; log.textContent='✓ 引擎跑完,驾驶舱与任务流已更新';
      renderDash(); renderFeed();
      setTimeout(()=>{log.textContent='';},2500);
    }
  },560);
}

// ========= 渲染 =========
function renderDash(){
  const sts=DataSource.stores();
  const totOpp=sts.reduce((a,s)=>a+G.opportunity(s),0);
  const tasks=allTasks().length;
  const avgH=Math.round(sts.reduce((a,s)=>a+G.health(s),0)/sts.length);
  document.getElementById('dash-strip').innerHTML=`
    <div class="sbox"><div class="v c-b">${sts.length}</div><div class="l">KA / 门店</div></div>
    <div class="sbox"><div class="v c-a">${totOpp.toFixed(0)}m</div><div class="l">可关机会(剔衰退)</div></div>
    <div class="sbox"><div class="v ${avgH>=60?'c-g':'c-r'}">${ran?avgH:'—'}</div><div class="l">平均健康度</div></div>`;
  document.getElementById('ka-list').innerHTML = sts.map(st=>{
    const h=ran?G.health(st):'—', opp=G.opportunity(st), nrec=G.keystone(st).length;
    const col=(typeof h==='number'? (h>=60?'var(--green)':h>=45?'var(--amber)':'var(--red)'):'var(--text3)');
    return `<div class="ka" onclick="openKA('${st.id}')">
      <div class="ka-top"><div><div class="ka-name">${st.name}</div><div class="ka-meta">${st.type} · 品类角色 ${st.role} · ${st.seg.length} 区隔</div></div>
        <div class="ka-score"><div class="n" style="color:${col}">${h}</div><div class="l">健康度</div></div></div>
      <div class="ka-bar"><div class="ka-fill" style="width:${typeof h==='number'?h:0}%;background:${col}"></div></div>
      <div class="ka-foot"><span>可关机会 <b>${opp.toFixed(1)}m</b></span><span>${ran?nrec+' 条双赢建议':'未运行'}</span></div>
    </div>`;
  }).join('');
}
function renderFeed(){
  const t=allTasks();
  if(!ran){ document.getElementById('feed-list').innerHTML='<div class="sub">先在驾驶舱点「运行引擎」。</div>'; return; }
  document.getElementById('feed-list').innerHTML=t.map((r,i)=>{
    const key=r.ka+r.seg+r.brand; const gb=grabbed[key];
    return `<div class="task">
      <div class="task-h"><span class="task-rank">#${i+1}</span><span class="task-ka">${r.ka} · ${r.seg}</span><span class="task-gap">机会 ${r.opp}m</span></div>
      <div class="task-act">${r.action}</div>
      <div class="win2"><span class="wtag r">零售商赢:${r.rWin}</span><span class="wtag x">欣和赢:${r.xWin}</span></div>
      <button class="grab ${gb?'grabbed':''}" onclick="grab('${key.replace(/'/g,"")}',this)">${gb?'✓ 已接单':'抢单 · 去执行'}</button>
    </div>`;
  }).join('');
}
function grab(k,el){ grabbed[k]=true; el.textContent='✓ 已接单'; el.classList.add('grabbed'); }

function openKA(id){
  const st=DataSource.stores().find(s=>s.id===id);
  let rows=st.seg.map(s=>{ const g=G.pg(s,st.fs);
    return `<tr><td>${s.n}</td><td>${s.share}%</td><td class="${g<0?'neg':'pos'}">${g>0?'+':''}${g}</td><td>${s.grow?'增':'衰'}</td><td><span class="chip ${SCLS[s.strat]}">${STRAT[s.strat]}</span></td></tr>`;
  }).join('');
  let xrows=st.seg.map(s=>`<tr><td>${s.xh.b}</td><td><span class="role-flag">${s.xh.role}</span></td><td>${s.n}</td><td>${s.xh.mkt}%</td><td>${s.xh.promo}%</td><td class="${s.xh.mkt-s.xh.promo>5?'neg':''}">${s.xh.mkt-s.xh.promo>5?'低估 '+(s.xh.mkt-s.xh.promo)+'点':'—'}</td></tr>`).join('');
  const recs=G.keystone(st);
  let rhtml = recs.length? recs.map((r,i)=>`<div class="rec"><div class="rh">建议 ${i+1} · ${r.action}</div>
      <div class="rr"><b>区隔:</b>${r.seg} · 策略 <span class="chip ${SCLS[r.strat]}">${STRAT[r.strat]}</span> · 机会 ${r.opp}m</div>
      <div class="rr"><b>依据:</b>${r.brand}(${r.role})市占 ${r.mkt}% 却只占 ${r.promo}% 资源(低估 ${r.under} 点)</div>
      <div class="win2"><span class="wtag r">零售商赢:${r.rWin}</span><span class="wtag x">欣和赢:${r.xWin}</span></div></div>`).join('')
    : '<div class="sub">该店暂无"增长+低于Fair Share+欣和可补"的交集机会。</div>';
  document.getElementById('ka-detail').innerHTML=`
    <div class="h" style="margin-top:4px">${st.name}</div>
    <div class="sub">${st.type} · 品类角色 ${st.role} · Fair Share 基准 ${st.fs}%</div>
    <div class="acctlabel a">账A 零售商品类缺口</div>
    <div class="tbl-wrap"><table><thead><tr><th>区隔</th><th>份额</th><th>Point Gap</th><th>增/衰</th><th>策略</th></tr></thead><tbody>${rows}</tbody></table></div>
    <div class="acctlabel x">账X 欣和 SKU(资源 vs 市占)</div>
    <div class="tbl-wrap"><table><thead><tr><th>品牌</th><th>角色</th><th>区隔</th><th>市占</th><th>资源占比</th><th>判定</th></tr></thead><tbody>${xrows}</tbody></table></div>
    <div class="acctlabel g">keystone · 双赢建议书(引擎生成)</div>
    ${rhtml}
    <div class="conf">账A 份额/竞品 = APPROX(模拟·待接真实) · keystone 实算 · entity_type 分层防混层</div>`;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('v-ka').classList.add('active');
  window.scrollTo(0,0);
}

// ========= 八步引擎(用第一个 KA 走查) =========
const ESTEPS=[['①','定义'],['②','角色'],['③','评估'],['④','评分表'],['⑤','策略'],['⑥','战术'],['⑦','执行'],['⑧','检视']];
let ecur=0;
function renderEng(){
  const st=DataSource.stores()[0];
  document.getElementById('eng-sub').textContent=`走查对象:${st.name} · ${st.type}(引擎对每个 KA 都跑同一套)`;
  document.getElementById('stepper').innerHTML=ESTEPS.map((s,i)=>`<div class="stp ${i===ecur?'active':''}" onclick="ejump(${i})"><div class="sn">${s[0]}</div><div class="st">${s[1]}</div></div>`).join('');
  document.getElementById('panel').innerHTML=engPanel(st,ecur);
  document.getElementById('e-prev').disabled=ecur===0;
  document.getElementById('e-next').textContent=ecur===7?'↻ 重启':'下一步 →';
}
function engPanel(st,i){
  const fs=st.fs;
  if(i===0) return `<div class="pd">双方对品类树达共识。${st.name} 经营「酱油」品类,含 ${st.seg.length} 个区隔;欣和 SKU 挂到对应节点。</div>`;
  if(i===1) return `<div class="pd">账A:整品类角色 = <b>${st.role}</b>。账X:各 SKU 六卡角色(旗舰/主力/利基/防御…)。两套角色不同层、不混。</div>`;
  if(i===2){ let r=st.seg.map(s=>{const g=G.pg(s,fs);return `<tr><td>${s.n}</td><td>${s.share}%</td><td class="${g<0?'neg':'pos'}">${g}</td><td>${s.grow?'增':'衰'}</td></tr>`}).join('');
    return `<div class="pd">门#2 Fair Share(基准 ${fs}%):份额−基准=Point Gap。</div><div class="tbl-wrap"><table><thead><tr><th>区隔</th><th>份额</th><th>PG</th><th>增/衰</th></tr></thead><tbody>${r}</tbody></table></div>`; }
  if(i===3) return `<div class="pd">门#3 机会(剔衰退):仅算「增长 AND PG<0」。本店可关机会 ≈ <b>${G.opportunity(st).toFixed(1)}m</b>。账X 评分表 = 北极星拆 node_target(自上而下,待业务填)。</div>`;
  if(i===4){ let r=st.seg.map(s=>`<tr><td>${s.n}</td><td><span class="chip ${SCLS[s.strat]}">${STRAT[s.strat]}</span></td></tr>`).join('');
    return `<div class="pd">门#6 角色筛菜单 + 区隔级分派。</div><div class="tbl-wrap"><table><thead><tr><th>区隔</th><th>策略</th></tr></thead><tbody>${r}</tbody></table></div>`; }
  if(i===5) return `<div class="pd">门#1 角色→4战术。${st.role} → 范围 Broad · 价格 Strongly Competitive · 货架 Quality · 促销 Build。账X 4P 一一对上。</div>`;
  if(i===6) return `<div class="pd">执行:GateResult 落到「今日要关的差」+ SFA 品类建议书,走派单互锁/SFA,不新建 surface。</div>`;
  if(i===7){ const recs=G.keystone(st);
    let rh=recs.length?recs.map((r,k)=>`<div class="rec"><div class="rh">建议 ${k+1} · ${r.action}</div><div class="win2"><span class="wtag r">零售商赢:${r.rWin}</span><span class="wtag x">欣和赢:${r.xWin}</span></div></div>`).join(''):'<div class="pd">本店无交集机会。</div>';
    return `<div class="pd">门 keystone:零售商缺口 ∩ 欣和可补 → 双赢建议书:</div>${rh}<div class="conf">检视回③重启,持续改进。每实例喂因果门(门#7 留接口)。</div>`; }
}
function estep(d){ if(ecur===7&&d>0){ecur=0;renderEng();return;} ecur=Math.max(0,Math.min(7,ecur+d)); renderEng(); }
function ejump(i){ ecur=i; renderEng(); }

// ========= 导航 =========
function tab(v){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.getElementById('v-'+v).classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.v===v));
  if(v==='feed') renderFeed();
  if(v==='eng') renderEng();
  window.scrollTo(0,0);
}
document.getElementById('foot').innerHTML='数据源:模拟(欣和酱油品类·五品牌)· 门引擎=真实计算 · DataSource 适配层一处换真实(汉询/POS)不动引擎/界面 · Layer 1.3 · 署名 DS';
renderDash();
</script>
