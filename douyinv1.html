<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>抖音 · 内容电商运营</title>
<style>
  :root{--ink:#17191E;--paper:#F2F1EB;--surface:#FBFAF6;--amber:#A8612A;--amber-deep:#834A1F;--amber-tint:#EADFCB;
    --slate:#6b6f76;--rule:#dcd7cb;--blue:#3a5a7a;--go:#3f7a4f;--red:#a8433a;--red-tint:#f0dcd8;--go-tint:#dbe7dc;
    --mono:'JetBrains Mono','SF Mono',ui-monospace,monospace;--cjk:'PingFang SC','Noto Sans CJK SC',system-ui,sans-serif;}
  *{box-sizing:border-box;}
  body{margin:0;background:#26282d;font-family:var(--cjk);color:var(--ink);-webkit-font-smoothing:antialiased;}
  .phone{max-width:430px;margin:0 auto;min-height:100vh;background:var(--paper);display:flex;flex-direction:column;position:relative;}
  .trialbar{background:repeating-linear-gradient(45deg,#2a2c31,#2a2c31 8px,#25272c 8px,#25272c 16px);color:#c9b48f;font-family:var(--mono);font-size:9.5px;padding:5px 12px;letter-spacing:.03em;line-height:1.5;}
  .trialbar b{color:#e7d3a8;}
  .hd{background:var(--ink);color:#F2F1EB;padding:11px 15px;}
  .hd .who{font-weight:700;font-size:14.5px;}
  .hd .who small{font-weight:400;color:#B7BAC0;font-family:var(--mono);font-size:10.5px;margin-left:5px;}
  .hd .roles{float:right;display:flex;gap:5px;}
  .role{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:2px;background:#2f3239;color:#B7BAC0;border:1px solid #3a3e45;cursor:pointer;}
  .role.me{background:var(--amber);color:#fff;border-color:var(--amber);}
  .hd .lead{margin-top:9px;}
  .hd .big{font-size:19px;font-weight:800;letter-spacing:.01em;}
  .hd .second{margin-top:7px;font-size:11px;color:#9a9da3;font-family:var(--mono);}
  .hd .second b{color:#e7d3a8;}
  /* stage strip — signature */
  .stagestrip{display:flex;overflow-x:auto;gap:0;background:#1d1f24;border-top:1px solid #2f3239;-webkit-overflow-scrolling:touch;}
  .stagestrip::-webkit-scrollbar{display:none;}
  .sstep{flex:0 0 auto;padding:8px 12px 7px;font-family:var(--mono);font-size:11px;color:#7d818a;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;text-align:center;}
  .sstep small{display:block;font-size:8.5px;color:#5e626b;margin-top:1px;}
  .sstep.on{color:#F2F1EB;border-bottom-color:var(--amber);background:#232529;}
  .sstep.on small{color:#c9b48f;}
  .tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--rule);position:sticky;top:0;z-index:5;}
  .tab{flex:1;text-align:center;padding:9px 2px;font-size:11px;color:var(--slate);cursor:pointer;border-bottom:2px solid transparent;}
  .tab.on{color:var(--amber-deep);font-weight:700;border-bottom-color:var(--amber);}
  .scroll{flex:1;overflow-y:auto;padding:13px 14px 90px;}
  .ph{font-family:var(--mono);font-size:11px;letter-spacing:.05em;color:var(--slate);margin:3px 0 11px;}
  .ph b{color:var(--amber-deep);}
  .card{background:var(--surface);border:1px solid var(--rule);border-radius:7px;padding:13px;margin-bottom:12px;}
  .card.hot{border-left:3px solid var(--amber);}
  .sku .nm{font-weight:800;font-size:15px;}
  .sku .tag{font-family:var(--mono);font-size:9.5px;color:#fff;background:var(--red);padding:1px 6px;border-radius:2px;margin-left:6px;vertical-align:2px;}
  .sku .tag.o{background:var(--go);}
  .sku .act{font-size:12.5px;margin-top:7px;color:var(--ink);line-height:1.5;}
  .line{font-family:var(--mono);font-size:10.5px;color:var(--slate);margin-top:6px;background:#efece3;padding:6px 9px;border-radius:4px;}
  .line b{color:var(--amber-deep);}
  .mrow{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;}
  .metric{flex:1 1 44%;min-width:0;background:var(--paper);border:1px solid var(--rule);border-radius:5px;padding:7px 9px;cursor:pointer;}
  .metric .mk{font-family:var(--mono);font-size:10px;color:var(--slate);}
  .metric .mv{font-family:var(--mono);font-size:14px;font-weight:700;margin-top:2px;}
  .metric.ok{border-color:#bcd3bf;background:var(--go-tint);}
  .metric.ok .mv{color:var(--go);}
  .metric.bad{border-color:#e0bdb7;background:var(--red-tint);}
  .metric.bad .mv{color:var(--red);}
  .metric .mt{font-family:var(--mono);font-size:9px;color:var(--slate);margin-top:1px;}
  .gate{margin-top:11px;border:1px dashed var(--rule);border-radius:6px;padding:10px;background:var(--paper);}
  .gate .gh{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:7px;}
  .gate .gv{font-family:var(--mono);font-size:10px;padding:1px 7px;border-radius:3px;}
  .gv.pass{background:var(--go-tint);color:var(--go);}.gv.fail{background:var(--red-tint);color:var(--red);}
  .chain{display:flex;gap:5px;margin-top:9px;}
  .cnode{flex:1;text-align:center;font-family:var(--mono);font-size:9px;padding:5px 2px;border-radius:4px;border:1px solid var(--rule);background:var(--surface);color:var(--slate);}
  .cnode.p{background:var(--go-tint);border-color:#bcd3bf;color:var(--go);}
  .cnode.f{background:var(--red-tint);border-color:#e0bdb7;color:var(--red);}
  .cnode b{display:block;font-size:11px;}
  .foot{display:flex;align-items:center;justify-content:space-between;margin-top:11px;padding-top:10px;border-top:1px solid var(--rule);}
  .foot .inc{font-family:var(--mono);font-weight:700;font-size:13px;color:var(--amber-deep);}
  .foot.done .inc{color:var(--go);}
  .btn{font-family:var(--cjk);font-size:12px;border:none;border-radius:5px;padding:8px 12px;cursor:pointer;background:var(--ink);color:#fff;}
  .btn.o{background:var(--surface);color:var(--amber-deep);border:1px solid var(--amber-tint);}
  .btn.sm{font-size:11px;padding:6px 10px;}
  .btn:active{transform:translateY(1px);}
  /* pipeline */
  .node{background:var(--surface);border:1px solid var(--rule);border-radius:6px;padding:10px 12px;margin-bottom:8px;cursor:pointer;}
  .node .nh{display:flex;align-items:center;gap:8px;}
  .node .nn{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--blue);}
  .node .nr{font-size:12px;font-weight:700;}
  .node .nd{font-size:11px;color:var(--slate);margin-top:4px;line-height:1.5;}
  .node .money{font-family:var(--mono);font-size:9px;color:var(--red);border:1px solid var(--red-tint);background:var(--red-tint);padding:1px 6px;border-radius:3px;margin-left:auto;}
  .art{display:none;margin-top:9px;background:#1d1f24;border-radius:5px;padding:9px 11px;overflow-x:auto;}
  .art.show{display:block;}
  .art pre{margin:0;font-family:var(--mono);font-size:9.5px;color:#c6cad2;line-height:1.55;white-space:pre;}
  .art .ic{color:#7d818a;}.art .k{color:#c9b48f;}.art .v{color:#9db5c9;}.art .g{color:#84b58f;}.art .r{color:#c98f88;}
  .arrow{text-align:center;color:var(--rule);font-family:var(--mono);font-size:11px;margin:-3px 0 5px;}
  /* collect */
  .ta{width:100%;border:1px solid var(--rule);border-radius:6px;padding:10px;font-family:var(--cjk);font-size:12.5px;resize:vertical;min-height:66px;background:var(--surface);}
  .consumer{background:var(--ink);border-radius:7px;padding:11px 12px;margin-bottom:12px;}
  .consumer .ch{font-family:var(--mono);font-size:10px;color:#c9b48f;margin-bottom:8px;}
  .cthree{display:flex;gap:7px;}
  .cthree .c{flex:1;background:#2a2c31;border-radius:5px;padding:8px;}
  .cthree .ct{font-size:11px;font-weight:700;color:#F2F1EB;}
  .cthree .cs{font-family:var(--mono);font-size:9px;color:#9a9da3;margin-top:3px;line-height:1.4;}
  /* ledger / pend */
  .pend{background:var(--amber-tint);border:1px solid #d8c4a4;border-radius:6px;padding:9px 11px;margin-bottom:8px;font-size:11.5px;}
  .pend .pt{font-family:var(--mono);font-size:9.5px;color:var(--amber-deep);}
  .row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--rule);font-size:12px;}
  .row .mono{font-family:var(--mono);font-size:12px;font-weight:700;}
  .ring{display:flex;gap:4px;margin:4px 0 12px;}
  .rstep{flex:1;text-align:center;font-family:var(--mono);font-size:9px;padding:6px 2px;border-radius:4px;border:1px solid var(--rule);background:var(--surface);color:var(--slate);cursor:pointer;}
  .rstep.lit{background:var(--amber);color:#fff;border-color:var(--amber);}
  .toastwrap{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);z-index:99;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none;width:88%;max-width:390px;}
  .toast{background:var(--ink);color:#fff;font-size:12px;padding:9px 14px;border-radius:6px;box-shadow:0 6px 20px rgba(0,0,0,.28);opacity:0;transform:translateY(8px);transition:.24s;text-align:center;line-height:1.45;}
  .toast.show{opacity:1;transform:translateY(0);}
  .toast.go{background:#26503a;}.toast.warn{background:#7a4a1f;}.toast.red{background:#7a322b;}
  .navbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--surface);border-top:1px solid var(--rule);display:flex;}
  .nav{flex:1;text-align:center;padding:8px 2px 9px;font-size:10.5px;color:var(--slate);cursor:pointer;}
  .nav.on{color:var(--amber-deep);font-weight:700;}
  .nav .ni{font-size:15px;display:block;}
  .hint{font-family:var(--mono);font-size:9.5px;color:var(--slate);margin-top:4px;line-height:1.5;}
  .kbd{font-family:var(--mono);font-size:9px;background:#efece3;border:1px solid var(--rule);border-radius:3px;padding:0 4px;}
</style>
</head>

      <div class="art" id="art${i}"><pre>${colorJson(artFor(i))}</pre></div>
    </div>`;
    if(i<6)h+=`<div class="arrow">↓ Artifact</div>`;
  });
  h+=`<div class="card"><div class="hint">🔒 全 Workflow(建设①规则型)· Agent三件套不全(数据未回流+涉钱HITL)→ loop_spec=N/A · 点任一节点看它这阶段的 JSON 契约</div></div>`;
  document.getElementById('scroll').innerHTML=h;
}
function colorJson(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/^(\/\/.*)$/gm,'<span class="ic">$1</span>')
    .replace(/"([^"]+)":/g,'<span class="k">"$1"</span>:')
    .replace(/: ?"([^"]*)"/g,': <span class="v">"$1"</span>')
    .replace(/: ?(true)/g,': <span class="g">$1</span>')
    .replace(/: ?(false)/g,': <span class="r">$1</span>');
}
function toggleArt(i){ const a=document.getElementById('art'+i); if(a)a.classList.toggle('show'); }

function doTriage(){
  const t=(document.getElementById('talk').value||'').trim();
  const seed=t||"减盐款3秒率32%完播涨了，直播GPM 650，某条视频疑似刷量，体验分4.7";
  const items=[];
  if(/刷量|机器人|异常订单|bot/i.test(seed)) items.push({type:"疑似假流量",flag:"low_trust",note:"未判级(假流量门拦·TypeB)"});
  if(/竞品|抢量|竞价|千禾|海天/.test(seed)) items.push({type:"竞品竞价压力",gate:"portfolio/竞价监测",risk:"competitor_bid_pressure"});
  let m2=seed.match(/GPM\s*([\d.]+)/i); if(m2) items.push({type:"直播GPM上报",value:parseFloat(m2[1]),field:"live_gpm"});
  m2=seed.match(/3\s*秒率?\s*([\d.]+)/); if(m2) items.push({type:"3秒率上报",value:parseFloat(m2[1]),field:"play_3s_rate"});
  m2=seed.match(/体验分\s*([\d.]+)/); if(m2) items.push({type:"体验分上报",value:parseFloat(m2[1]),field:"experience_score",note:"硬红线字段"});
  if(/完播/.test(seed)) items.push({type:"完播信号",field:"completion_rate"});
  if(items.length===0) items.push({type:"通用经营信号",note:"已归一"});
  const json={ channel:"douyin", lifecycle_stage:S.stage, sku_id:SKU.id, spu_id:SKU.spu,
    ts:"2026-07-08T14:20:00+08:00", items, flags:items.some(i=>i.flag)?["low_trust"]:[],
    calibrated:true, next:"→ N1/N4/N6" };
  S.triageJson=JSON.stringify(json,null,1);
  renderCollect();
  toast("已解析成标准 JSON("+items.length+" 条信号)· channel=douyin · stage="+S.stage,"go");
}

/* ---------------- LEDGER tab (统一 HUMAN_GATE_QUEUE) ---------------- */
// 各阶段关键动作 = 每条 SKU mock 自带的 human_gate_actions(卡执行前进同一队列)
function renderLedger(){
  const st=STAGES[S.stage];
  const acts=curSKU().human_gate_actions||[];
  const actBtns = acts.length? acts.map((a,i)=>`<button class="btn sm ${a.irr?'':'o'}" onclick="gateAction('${S.stage}',${i})" style="margin:0 6px 6px 0">${a.irr?'⚠ ':''}${a.k}${a.amt?' ¥'+a.amt.toLocaleString():''}</button>`).join('')
    : '<div class="hint">本阶段无额外关键动作(导入期主要是千川冷启+星图试水)。</div>';
  let pend=S.pending.length? S.pending.map((p)=>`
    <div class="pend"><div class="pt">⏳ 卡执行前·等主管核定 · ${p.kind}${p.irr?' · <span style="color:#a8433a">不可逆</span>':''}</div>
      ${p.text}${p.amt?' · <b>¥'+p.amt.toLocaleString()+'</b>':''}</div>`).join('') 
    : `<div class="hint">HUMAN_GATE_QUEUE 空。涉钱/不可逆动作(采买/砍投/下架/焕新/淘汰)都会进这里。</div>`;
  document.getElementById('scroll').innerHTML=`
    <div class="ph">📒 一本账 · 统一 <b>HUMAN_GATE_QUEUE</b> · 全生命周期护栏(卡执行前)</div>
    <div class="card">
      <div class="row"><span>本SKU本阶段预算</span><span class="mono" style="color:${S.budget<0?'var(--red)':'inherit'}">¥${S.budget.toLocaleString()}${S.budget<0?' · 超额授权(待追加)':''}</span></div>
      <div class="row"><span>已落袋激励</span><span class="mono" style="color:var(--go)">+${S.hGot}</span></div>
      <div class="row"><span>当前 SKU · 阶段</span><span class="mono">${SKU.id} · ${st.name}</span></div>
    </div>
    <div class="card">
      <div class="ph" style="margin:0 0 9px">💰 千川/星图/直播加热(N2·涉钱→HITL)</div>
      ${(S.stage==='decline'||S.stage==='retire')
        ? `<div class="hint" style="margin-bottom:9px;color:var(--red)">⛔ ${st.name}：停投/零采买(new_spend_allowed=false)· 任何采买都不能额度内自动执行,必须进队列核定</div>
           ${S.stage==='retire'?'':'<button class="btn sm" onclick="buy(2000)">残值复投(例外·≤¥2,000·ROI≥1.5·必核定)</button>'}`
        : `<button class="btn sm o" onclick="buy(5000)">投 ¥5,000(额度内自主)</button>
           <button class="btn sm" onclick="buy(20000)" style="margin-left:6px">投 ¥20,000(超额·提议)</button>`}
    </div>
    <div class="card">
      <div class="ph" style="margin:0 0 9px">🚨 本阶段关键动作(砍投/下架/焕新/淘汰=不可逆·全卡执行前)</div>
      ${actBtns}
    </div>
    <div class="card">
      <div class="ph" style="margin:0 0 9px">📥 HUMAN_GATE_QUEUE(${S.pending.length})</div>
      ${pend}
    </div>`;
}
function gateAction(stg,i){
  const a=MOCK_DATA[stg].human_gate_actions[i];
  S.pending.push({kind:a.k, text:SKU.name+" · "+STAGES[stg].name, amt:a.amt||0, irr:a.irr});
  renderLedger(); if(S.tab==='cockpit')renderCockpit();
  toast((a.irr?"⚠ 不可逆动作":"涉钱动作")+" → 进 HUMAN_GATE_QUEUE · 卡执行前,等主管核定","warn");
}
function buy(amt){
  if(S.stage==='decline'||S.stage==='retire'){
    S.pending.push({kind:S.stage==='retire'?"淘汰期禁采买·需核定":"衰退期残值复投·例外需核定",
      text:SKU.name+" · "+STAGES[S.stage].name, amt, irr:true});
    renderLedger(); if(S.tab==='cockpit')renderCockpit();
    toast("⛔ 本阶段禁止额度内自动采买 → 强制进 HUMAN_GATE_QUEUE,等主管核定","red"); return;
  }
  if(amt<=S.budget){ S.budget-=amt; renderLedger();
    toast("额度内自主放行 · 已投千川/星图 ¥"+amt.toLocaleString()+" · 剩 ¥"+S.budget.toLocaleString(),"go"); }
  else { S.pending.push({kind:"千川/星图采买超额",text:SKU.name+"·千川计划/星图矩阵",amt,irr:false});
    renderLedger(); if(S.tab==='cockpit')renderCockpit();
    toast("超额 → 涉钱进 HUMAN_GATE_QUEUE · 已挂起,等主管核定","warn"); }
}

/* ---------------- COCKPIT tab (role switch) ---------------- */
function renderCockpit(){
  if(S.role==='emp'){
    const g=gatePass();
    document.getElementById('scroll').innerHTML=`
      <div class="ph">🧭 我的驾驶舱 · 一线视角(SKU/内容层)</div>
      <div class="card">
        <div class="sku"><span class="nm">${SKU.name}</span></div>
        <div class="line">我这层：${STAGES[S.stage].name} · 目标差距 ${g?'已抹平':'有缺口'} · 最短板见「今日运营」红灯指标</div>
        <div class="hint" style="margin-top:8px">一线只转 SKU 层；关不了的差(结构性/品类)→升一层(主管品类会诊)</div>
      </div>
      <div class="card"><div class="ph" style="margin:0 0 6px">↑ 我的提议(升给主管)</div>
        ${S.pending.length?S.pending.map(p=>`<div class="row"><span>${p.kind}</span><span class="mono">${p.amt?'¥'+p.amt.toLocaleString():(p.irr?'不可逆':'—')}</span></div>`).join(''):'<div class="hint">暂无</div>'}
      </div>`;
  } else {
    document.getElementById('scroll').innerHTML=`
      <div class="ph">🧭 驾驶舱 · 主管视角(品类层)</div>
      <div class="card">
        <div class="ph" style="margin:0 0 8px">🔔 ${S.pending.length} 条待核定(HUMAN_GATE_QUEUE·涉钱/不可逆/分歧)</div>
        ${S.pending.length? S.pending.map((p,i)=>`
          <div class="pend"><div class="pt">${p.kind}${p.irr?' · <span style="color:#a8433a">不可逆</span>':''}</div>${p.text}${p.amt?' · <b>¥'+p.amt.toLocaleString()+'</b>':''}
          <div style="margin-top:7px"><button class="btn sm" onclick="approve(${i})">✓ 核定通过</button>
          <button class="btn sm o" onclick="reject(${i})" style="margin-left:6px">✗ 驳回</button></div></div>`).join('')
          : '<div class="hint">暂无待核提议。</div>'}
      </div>
      <div class="card">
        <div class="ph" style="margin:0 0 6px">🗂 HUMAN_GATE_HISTORY(${S.history.length}) · 核定留痕</div>
        ${S.history.length? S.history.slice(0,5).map(h=>`<div class="row"><span>${h.ts} · ${h.kind}</span><span class="mono" style="color:${h.result==='通过'?'var(--go)':'var(--red)'}">${h.result}</span></div>`).join('') : '<div class="hint">暂无核定记录。通过/驳回都会留痕。</div>'}
      </div>
      <div class="card">
        <div class="ph" style="margin:0 0 6px">品类层 · 连接律</div>
        <div class="hint">上层关差=下层定标 · 一线关不了的差(组合内耗/结构性衰退)在这层会诊(战略店会诊)</div>
      </div>`;
  }
}
function reject(i){
  const p=S.pending[i];if(!p)return;
  S.pending.splice(i,1);
  S.history.unshift({...p, result:"驳回", ts:"W28"}); // HUMAN_GATE_HISTORY 留痕
  renderCockpit();
  toast("✗ 已驳回 · "+p.kind+" 退回一线(记原因·未执行·已留痕)","red");
}
function approve(i){
  const p=S.pending[i];if(!p)return;
  if(p.amt){
    if(p.amt>S.budget){ p.budget_override=true; }   // 超额授权:留痕,主管有权批
    S.budget-=p.amt;                                  // 照扣(可为负=已用超额授权额度)
  }
  S.pending.splice(i,1);
  S.history.unshift({...p, result:"通过", ts:"W28"}); // HUMAN_GATE_HISTORY 留痕
  renderCockpit(); 
  toast("✓ 已核定通过 · "+p.kind+(p.amt?" ¥"+p.amt.toLocaleString()+(p.budget_override?"(超额授权·预算转负)":"")+" 执行":(p.irr?" 执行(不可逆)":" 执行"))+" · 已留痕",p.budget_override?"warn":"go");
}

/* ---------------- interactions that MUTATE state ---------------- */
function setStage(k){
  if(!STAGES[k])return; S.stage=k; S.done=false;
  renderStrip(); renderHead(); rerender();
  const st=STAGES[k];
  toast("切到 "+st.name+" · 引擎不变,阈值/字段/指标/"+st.gate+" 全部按 stage 重渲染","go");
}
function setRole(r){
  S.role=r;
  document.getElementById('rEmp').className='role'+(r==='emp'?' me':'');
  document.getElementById('rMgr').className='role'+(r==='mgr'?' me':'');
  if(S.tab==='cockpit')renderCockpit();
  toast(r==='emp'?"切到一线视角(SKU层)":"切到主管视角(品类层)");
}
function setTab(t){
  S.tab=t;
  document.querySelectorAll('.tab').forEach(e=>e.classList.toggle('on',e.dataset.t===t));
  document.querySelectorAll('.nav').forEach(e=>e.classList.toggle('on',e.dataset.n===t));
  rerender();
}
function rerender(){
  if(S.tab==='today')renderToday();
  else if(S.tab==='pipe')renderPipe();
  else if(S.tab==='collect')renderCollect();
  else if(S.tab==='ledger')renderLedger();
  else if(S.tab==='cockpit')renderCockpit();
}
function editMetric(i){
  const st=STAGES[S.stage];const m=curSKU().metrics[i];
  const cur=(S.metricEdited[S.stage]&&(m.k in S.metricEdited[S.stage]))?S.metricEdited[S.stage][m.k]:m.v;
  // toggle: 达标 <-> 未达标 by nudging across threshold
  const passNow = m.dir==='lt'?(cur<m.t):(cur>=m.t);
  const nv = passNow ? (m.dir==='lt'? +(m.t+ (m.t*0.15||0.1)).toFixed(3) : +(m.t*0.85).toFixed(3))
                     : (m.dir==='lt'? +(m.t*0.85).toFixed(3) : +(m.t*1.15).toFixed(3));
  S.metricEdited[S.stage]=S.metricEdited[S.stage]||{}; S.metricEdited[S.stage][m.k]=nv;
  renderToday();
  toast(m.k+" 改为 "+fmt(nv)+" → "+st.gate+" 重判："+(gatePass()?"四判全绿":"该判未达标·留本期修"), gatePass()?'go':'red');
}
function toggleCalib(){
  S.calib=!S.calib; renderToday();
  toast(S.calib?"去假后(TypeB)· 判级只认这个真值":"去假前 · 含刷量虚高 · 这些数不进算差","warn");
}
function escalate(){
  S.pending.push({kind:"关差关不了·升品类会诊",text:SKU.name+" · "+STAGES[S.stage].name+" 结构性未达标",amt:0,irr:true});
  if(S.tab==='cockpit')renderCockpit();
  toast("↑ 已升一层 · 关不了的差 → 主管品类层会诊(连接律·规律③)","warn");
}
function stepRing(i){
  S.ringLit[S.stage]=i+1; renderRing();
  const names=["定标↓","量实↑","算差(去假)","关差","验果"];
  toast("环 · 跑到「"+names[i]+"」"+(i===4?" · 验果=看上层标动没动":""));
}
function settle(){
  if(!gatePass()){ toast("有指标未达标 → 关差没关,滚明天,不放大断链","red"); return; }
  const st=STAGES[S.stage];
  if(st.inc===0){ S.done=true; renderToday(); toast("本阶段不计增长激励(衰退/淘汰按残值/收尾结算)","warn"); return; }
  S.hGot+=st.inc; S.done=true; renderToday();
  toast("✓ 数据回流确认 · "+st.gate+" 达标落袋 +"+st.inc+" · 验果上溯：品类层A认知资产上移","go");
}

/* ---------------- boot ---------------- */
/* ── 读登录页带来的身份(URL 参数)· 单独打开无参数则回落默认 ── */
(function readIdentity(){
  const p=new URLSearchParams(location.search);

renderStrip(); renderHead(); renderToday();
// 若登录带入的是主管，初始高亮主管
if(S.role==='mgr'){ document.getElementById('rEmp').className='role'; document.getElementById('rMgr').className='role me'; }
