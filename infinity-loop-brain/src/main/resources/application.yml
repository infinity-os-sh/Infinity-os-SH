# ════════════════════════════════════════════════════════════
# 默认 profile = dev:H2 内存库,起即端到端跑通(自检/联调用)。
# 生产用 --spring.profiles.active=hologres(见 application-hologres.yml)。
# ════════════════════════════════════════════════════════════
spring:
  application:
    name: infinity-loop-brain
  # H2 内存库,PostgreSQL 兼容模式(贴近 Hologres 语义)
  datasource:
    url: jdbc:h2:mem:loopdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

loop:
  hanxun:
    # 取数表名:dev=H2 的 ipo10_sales;生产换成汉询真实表/视图,改这里不改代码
    actual-table: ipo10_sales
  cors:
    # 放行 CloudBase 前端域(ICA App / 各渠道 App);生产收敛到真实域
    allowed-origins: http://localhost:3000,http://localhost:5173
  auth:
    # 本地联调默认关;生产置 true 接网关身份头
    enabled: false
    mode: header
    user-header: X-Gateway-User
