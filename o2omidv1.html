<style>
  :root{--ink:#16181C;--paper:#F4F2EC;--surface:#FBFAF6;--amber:#A8612A;--amber-deep:#834A1F;--amber-tint:#EADFCB;
    --go:#2E6A4A;--go-tint:#DDE8DF;--stop:#9A3A33;--stop-tint:#F0DBD7;--blue:#3A5A7A;--blue-tint:#DCE6F0;--gold:#C8A04A;--purple:#6B4A7A;--purple-tint:#E7DEF0;
    --red:#C0392B;--yellow:#D4A017;--green:#2E7D32;
    --slate:#565A62;--mute:#8C8F96;--rule:#DBD8CD;--mono:ui-monospace,Menlo,monospace;--cjk:'PingFang SC','Microsoft YaHei',sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:#0F1114;color:var(--ink);font-family:var(--cjk);font-size:13px;line-height:1.5;}
  .wm{background:repeating-linear-gradient(45deg,#2a2d34,#2a2d34 8px,#22252b 8px,#22252b 16px);color:#E8B57E;font-family:var(--mono);font-size:9.5px;text-align:center;padding:6px;}
  .wrap{max-width:1080px;margin:0 auto;background:var(--paper);min-height:100vh;}
  .top{background:var(--ink);color:#EDEBE4;padding:16px 22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}

  .top .sub{font-size:11px;color:#9a9da3;font-family:var(--mono);}

  .body{padding:16px 22px;}
  .ph{font-size:11.5px;font-family:var(--mono);color:var(--amber-deep);background:var(--amber-tint);padding:8px 11px;border-radius:6px;margin-bottom:14px;line-height:1.55;}

  .nums{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}

  .num .nl{font-size:11px;color:var(--slate);font-weight:700;}
  .num .nv{font-size:28px;font-weight:800;margin:4px 0;}
  .num.fc .nv{color:var(--purple);}.num.bg .nv{color:var(--amber-deep);}.num.ac .nv{color:var(--go);}
  .num .nd{font-size:10.5px;color:var(--mute);}
  .num .diff{font-size:11px;font-weight:700;margin-top:3px;}
  .fcbox{background:var(--purple-tint);border-radius:10px;padding:12px;margin-bottom:16px;}

  .fcbox input{width:80px;padding:7px;border:1.5px solid var(--purple);border-radius:7px;font-size:14px;text-align:center;font-family:var(--mono);}

  .fcbox .fb{padding:8px 16px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}
  .fcbox .fnote{font-size:10.5px;color:var(--slate);margin-top:6px;line-height:1.5;}
  /* 多店红黄绿表 */
  table{width:100%;border-collapse:collapse;font-size:12.5px;background:var(--surface);border-radius:11px;overflow:hidden;}
  th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--rule);}
  th{font-size:10.5px;color:var(--mute);font-weight:700;font-family:var(--mono);background:#F0EEE6;}
  tr:hover td{background:#F7F5EF;}
  .dot{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:6px;vertical-align:middle;}
  .dot.red{background:var(--red);}.dot.yellow{background:var(--yellow);}.dot.green{background:var(--green);}
  .hl{font-weight:800;}.hl.red{color:var(--red);}.hl.yellow{color:var(--yellow);}.hl.green{color:var(--green);}
  .mini{font-family:var(--mono);font-size:11px;}
  .badge{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;}
  .badge.esc{background:var(--stop-tint);color:var(--stop);}.badge.ok{background:var(--go-tint);color:var(--go);}
  .drill{padding:5px 11px;border:1.5px solid var(--blue);background:#fff;color:var(--blue);border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;}
  /* 升级队列 */
  .esc{background:var(--stop-tint);border:1px solid var(--stop);border-radius:11px;padding:13px;margin-bottom:14px;}
  .esc .eh{font-size:13px;font-weight:800;color:var(--stop);margin-bottom:9px;}
  .esc .ecard{background:#fff;border-radius:9px;padding:11px;margin-bottom:9px;}
  .esc .ecard .et{font-size:13px;font-weight:700;}.esc .ecard .ew{font-size:11.5px;color:var(--slate);margin:4px 0;}
  .esc .ecard .need{font-size:11.5px;color:var(--amber-deep);font-weight:700;}
  .esc .eact{display:flex;gap:8px;margin-top:9px;}
  .esc .eb{flex:1;padding:9px;border-radius:8px;font-size:12px;font-weight:700;border:none;cursor:pointer;}
  .esc .eb.close{background:var(--go);color:#fff;}.esc .eb.up{background:var(--amber);color:#fff;}
  .esc .done{background:var(--go-tint);color:var(--go);border-radius:8px;padding:9px;font-size:12px;font-weight:700;text-align:center;}
  /* 调配(HITL) */
  .realloc{background:var(--surface);border:1px solid var(--rule);border-radius:11px;padding:14px;margin-bottom:14px;}
  .realloc .rrow{display:flex;align-items:center;gap:9px;font-size:12.5px;flex-wrap:wrap;margin:8px 0;}
  .realloc select,.realloc input{padding:7px;border:1.5px solid var(--rule);border-radius:7px;font-size:12px;}
  .realloc input{width:70px;text-align:center;font-family:var(--mono);}
  .realloc .hitl{background:var(--stop-tint);color:var(--stop);border-radius:7px;padding:8px 11px;font-size:11px;margin:8px 0;line-height:1.5;}
  .realloc .rb{padding:9px 16px;background:var(--amber);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}
  .rlog{font-size:11px;color:var(--slate);margin-top:8px;font-family:var(--mono);}
  .foot{text-align:center;font-family:var(--mono);font-size:9px;color:var(--mute);padding:16px;}
  #tw{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);width:440px;max-width:88%;z-index:99;pointer-events:none;}
  #tw .t{background:#1B1E24;color:#EDEBE4;border-radius:9px;padding:12px 14px;font-size:12.5px;margin-top:8px;box-shadow:0 6px 20px rgba(0,0,0,.3);}#tw .t b{color:#9FD6B6;}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
  .modal.on{display:flex;}
  .modal .mc{background:var(--paper);border-radius:14px;padding:20px;max-width:440px;width:100%;max-height:80vh;overflow:auto;}
  .modal .mh{font-size:15px;font-weight:800;margin-bottom:12px;display:flex;justify-content:space-between;}
  .modal .mx{cursor:pointer;color:var(--mute);}
  .modal .mrow{font-size:12.5px;padding:6px 0;border-bottom:1px solid var(--rule);}
  .modal .mrow b{color:var(--amber-deep);}

    <table><thead><tr><th>门店</th><th>健康</th><th>六月鲜动销</th><th>履约</th><th>待关差</th><th>本月实际/预测</th><th>升级</th><th></th></tr></thead>

<script>
/* ══════════════════════════════════════════════════════════════════
   INFINITY OS · 渠道引擎母版 参考实现 · o2o · v2 双环交汇
   三层合并 + 双环模型:
     冻结层(V843)  不可变 reduce · commandFingerprint 幂等 · 审计 hash 链 · Registry
     运行层(v8.2)  环五步 · actualOf 现算 · actual 恒 null
     动机层(o2ov1) 战功/收入皮 · no_data 诚实
   双环交汇(本次):一家店 = 两条定标↓的交汇点
     · 盒马环:盒马定标↓ → 店长owns → 盒马发薪(店长KPI记分卡)= 客户价值
     · SH环  :SH城市切出 → SR owns → SH发薪(SR城市战功)     = 我方价值
     · 两环读同一份 facts(店的共享经营现实)· 两端都落同一消费者 · 非零和
   JBP桥(GCD/LCM):关差瞄最大公约数(共同因子动作)·定标瞄最小公倍数(最小共同目标盘)
     · GCD≈1 或 LCM≈两目标相乘 = 假双赢报警
   换渠道 = 只换 CHANNEL_FILL 块。
   ══════════════════════════════════════════════════════════════════ */
(function(root){
'use strict';

/* ────────── 冻结层:引擎件(带走·跨渠道字节一致) ────────── */
const CORE_VERSION = 'o2oref-engine-2.0.0-dualloop';

function deepFreeze(o){
  if(o && typeof o==='object' && !Object.isFrozen(o)){ Object.freeze(o); Object.keys(o).forEach(function(k){deepFreeze(o[k]);}); }
  return o;
}
function clone(o){ return JSON.parse(JSON.stringify(o)); }
function digest(str){ let h=0; for(let i=0;i<str.length;i++){ h=(h*31 + str.charCodeAt(i))|0; } return (h>>>0).toString(16).padStart(8,'0'); }
function commandFingerprint(cmd){ return 'CMD-'+digest(JSON.stringify(cmd)); }
function hashChain(prevHash, entry){ return digest((prevHash||'0') + JSON.stringify(entry)); }

/* 环:实际恒由量实↑现算(宪法:定标↓绝不倒推·gap.actual 恒 null)
   双环下 actualOf 读"店的共享 facts"——这是两环交汇的物理基础 */
function factOf(state, key){ const f=state.facts[key]; return (f==null)?null:f; }
function actualOf(gap, state){
  if(gap.actual != null) return gap.actual;              // 极少:显式写入优先
  const base = factOf(state, gap.actual_key);
  if(base == null) return null;                          // no_data — 不假装(o2ov1 诚实)
  let v;
  if(gap.formula === 'shortage') v = Math.max(0, 0.20*(1-base));           // 缺货率 = f(库存深度)·越满越低
  else if(gap.co_fact){                                                     // 复合:主事实 + 协同事实
    const co = factOf(state, gap.co_fact); if(co==null) return null;
    v = gap.w_base*base + gap.w_co*co;
  } else v = base;
  return +v.toFixed(4);
}
function gapMet(gap, state){
  const a = actualOf(gap, state);
  if(a==null) return null;
  return gap.standard.dir==='gte' ? a>=gap.standard.v : a<=gap.standard.v;
}

/* 收入(母版引擎件①·四段:底薪+功勋+Gate毕业奖+效率提成)· 结构冻结
   ★双环:同一四段结构算两次——发给谁由"角色定义(填充层)"决定,不是引擎决定 */
/* 收入守红线R2:关差DONE 已需证据齐(证据门),Gate毕业奖挂 verify.effective(标动才给·非任务做没做)·故不可验证自评无法直接换钱 */
function calcLoopIncome(loop, state){
  let merit=0, gate=0;
  for(const id in loop.gaps){
    const g=loop.gaps[id]; const met=gapMet(g,state);
    if(met===null) continue;                                 // no_data 不计功
    const a=actualOf(g,state), std=g.standard.v;
    const ratio = g.standard.dir==='gte' ? Math.min(1,a/std) : Math.min(1, std/Math.max(a,0.0001));
    merit += g.merit_weight * ratio;
    if(g.verify.status==='VERIFIED' && g.verify.effective) gate += g.merit_weight*0.5;
  }
  const ecr = merit*0.1;
  return { base:loop.income_base, merit:+merit.toFixed(2), gate_bonus:+gate.toFixed(2),
           ecr_commission:+ecr.toFixed(2), total:+(loop.income_base+merit+gate+ecr).toFixed(2),
           paid_by:loop.paid_by, owner:loop.owner };
}

/* JBP 桥:最大公约数(共同因子动作) + 最小公倍数(最小共同目标盘) + 假双赢探测
   这是给 SR 谈 JBP 的一把尺,不是自动算数节点(潜力/客群是软信息) */
function jbpIntersection(state){
  const SHARED = 'inventory_depth';                          // 两环交汇的共享事实
  const h = state.loops.hema, s = state.loops.sh;
  // 每环对共享事实的"需求水位"= 该环里读此事实的 gap 达标所需的最低 depth
  function reqOf(loop){
    let need=0;
    for(const id in loop.gaps){ const g=loop.gaps[id];
      if(g.actual_key!==SHARED && g.co_fact!==SHARED) continue;
      let r;
      if(g.formula==='shortage') r = 1 - g.standard.v/0.20;                          // 缺货≤std → depth≥
      else if(g.co_fact===SHARED){ const co=factOf(state,g.actual_key)||0; r=(g.standard.v-g.w_co*co)/g.w_base; }
      else if(g.actual_key===SHARED){ const co=g.co_fact?factOf(state,g.co_fact)||0:0; r=(g.standard.v-(g.w_co||0)*co)/(g.w_base||1); }
      else r=g.standard.v;
      need=Math.max(need, r);
    }
    return +Math.min(1,Math.max(0,need)).toFixed(3);
  }
  const hemaReq=reqOf(h), shReq=reqOf(s);
  const lcm = +Math.max(hemaReq, shReq).toFixed(3);           // 最小公倍数:同时覆盖两环的最小共同目标
  // 最大公约数:能同时喂两环的关差动作(fact_delta 触及共享事实)
  const gcdActions=[];
  [h,s].forEach(function(loop){ for(const id in loop.gaps){ (loop.gaps[id].close_menu||[]).forEach(function(m){
    if(m.gcd && m.fact_delta && m.fact_delta[SHARED]) gcdActions.push({loop:loop.loop_id, gap:id, action:m.action, delta:m.fact_delta[SHARED]});
  });}});
  const gcdStrength = gcdActions.length ? +Math.max.apply(null, gcdActions.map(function(a){return a.delta;})).toFixed(3) : 0;
  const divergence = +Math.abs(hemaReq-shReq).toFixed(3);
  // 假双赢:无共同因子动作(GCD≈0/1) 或 两环需求水位相距过大(近似互质)
  const fake = gcdStrength < 0.05 || divergence > 0.20;
  return { shared:SHARED, current:factOf(state,SHARED), hema_req:hemaReq, sh_req:shReq,
           lcm:lcm, gcd_actions:gcdActions, gcd_strength:gcdStrength, divergence:divergence,
           fake_winwin:fake, verdict: fake?'⚠假双赢(硬凑·该报警)':'✓真双赢(非零和·同源消费者)' };
}

/* 环五步 = 不可变命令。reduce 纯函数:旧态→新态(深冻结) · 关差改共享 facts → 两环同时联动 */
function syncPrimaryStore(s){  // 主体店从真实state现算→投影到中层多店表(真同源:一线关差→中层变)
  if(!s.ops_layer) return;
  const prim=s.ops_layer.stores.find(function(x){return x.id===s.store.id;}); if(!prim) return;
  const dx=actualOf(s.loops.sh.gaps['S-DX'],s), lx=s.facts.fulfillment_30min;
  let open=0; for(const k in s.loops){ const gs=s.loops[k].gaps; for(const id in gs){ if((gs[id].close_menu||[]).length && gs[id].close.status==='OPEN') open++; } }
  if(dx!=null) prim.dongxiao=+dx.toFixed(3);
  if(lx!=null) prim.fulfillment=lx;
  prim.gaps_open=open;
  const score=(dx||0)*0.6+(lx||0)*0.4;
  prim.health=score>=0.75?'green':score>=0.55?'yellow':'red';
  s.ops_layer.numbers.actual_mtd=s.ops_layer.stores.reduce(function(a,x){return a+x.actual_mtd;},0);
}
function recomputeIncomes(s){ s.loops.hema.income=calcLoopIncome(s.loops.hema,s); s.loops.sh.income=calcLoopIncome(s.loops.sh,s); s.jbp=jbpIntersection(s); syncPrimaryStore(s); }
function findGap(s,loopId,gapId){ const lp = loopId==='LOOP-HEMA'?s.loops.hema:s.loops.sh; return {loop:lp, gap:lp.gaps[gapId]}; }

function reduce(state, cmd, ctx){
  const s = clone(state); s.seq += 1;
  const now = (ctx&&ctx.now) || '2026-07-18T09:00:00Z';
  let detail='', before=null, after=null;
  switch(cmd.type){
    case 'SET_STANDARD': {                 // ① 定标↓ 红线·自上而下·绝不倒推
      const gp=findGap(s,cmd.loop_id,cmd.gap_id); if(!gp.gap) throw new Error('no gap');
      before=gp.gap.standard.v; gp.gap.standard.v=cmd.value; gp.gap.standard.src=cmd.src||'上层定标↓';
      after=cmd.value; detail='定标↓ '+cmd.gap_id+' → '+cmd.value; break;
    }
    case 'CALC_GAP': {                      // ③ 算差(先校准去促销/压货假,再 standard vs actual)
      const gp=findGap(s,cmd.loop_id,cmd.gap_id); const a=actualOf(gp.gap,s);
      if(a==null){ detail='算差跳过 '+cmd.gap_id+' · no_data'; break; }
      gp.gap.diag={ actual:a, standard:gp.gap.standard.v, delta:+(a-gp.gap.standard.v).toFixed(4),
        met:(gp.gap.standard.dir==='gte'? a>=gp.gap.standard.v : a<=gp.gap.standard.v), rc:cmd.rc||null, calibrated:true };
      detail='算差 '+cmd.gap_id+' Δ='+gp.gap.diag.delta; break;
    }
    case 'CLOSE_GAP': {                     // ④ 关差(硬门:先算差 + 证据门:必须带可验证证据·红线R1)
      const gp=findGap(s,cmd.loop_id,cmd.gap_id);
      if(!gp.gap.diag) throw new Error('算差前先校准:必须先 CALC_GAP 再 CLOSE_GAP');
      const m=(gp.gap.close_menu||[])[cmd.menu_i]; if(!m) throw new Error('no close option');
      // ★证据门(红线R1:证据可验证>口头自报)·关差必须交齐所需证据,否则不 DONE
      const req=m.evidence_required||[]; const got=cmd.evidence||{};
      const missing=req.filter(function(e){return !got[e.key];});
      if(missing.length) throw new Error('证据未交齐(红线R1·不可口头自报):缺 '+missing.map(function(e){return e.label;}).join('、'));
      before=gp.gap.close.status;
      gp.gap.close={ action:m.action, status:'DONE', by:gp.loop.owner, gcd:!!m.gcd,
                     evidence:req.map(function(e){return {key:e.key,label:e.label,type:e.type,value:got[e.key],verifiable:e.verifiable!==false};}) };
      if(m.fact_delta){ for(const k in m.fact_delta){ s.facts[k]=+Math.min(1, (s.facts[k]||0)+m.fact_delta[k]).toFixed(4); } }
      after='DONE'; detail='关差 '+cmd.gap_id+' · '+m.action+'(证据'+req.length+'件)'+(m.gcd?' [GCD·喂两环]':' [仅本环]'); break;

      const met=(gp.gap.standard.dir==='gte'? a>=gp.gap.standard.v : a<=gp.gap.standard.v);
      gp.gap.verify={ status:'VERIFIED', effective:met, actual_at_verify:a };

    }
    case 'ESCALATE': {
      const gp=findGap(s,cmd.loop_id,cmd.gap_id);

      detail='升级 '+cmd.gap_id+' → '+gp.loop.up; break;
    }
    case 'XD_SCAN': {                       // XD 进店三拍盘点(量实↑入口·全员动作·照片写L1真源·红线R1)
      if(!cmd.photo) throw new Error('进店盘点必须拍照(红线R1:照片是SKU状态最硬证据)');
      const sw=cmd.switch, val=cmd.value;   // 盘出的开关状态(如 有货:true)
      if(sw && s.switches.on.hasOwnProperty(sw)) s.switches.on[sw]=!!val;
      // 照片→识别→更新对应 fact(mock:AI识货架待TL后端)
      if(cmd.fact_delta){ for(const k in cmd.fact_delta){ s.facts[k]=+Math.min(1,Math.max(0,(s.facts[k]||0)+cmd.fact_delta[k])).toFixed(4); } }
      s.switches.last_scan={ by:cmd.by||'进店人', photo:cmd.photo, at:now, sku:s.switches.sku };
      // 标记5类采集完成(哪一类)
      if(cmd.collect_key){ const cc=s.xd_collect.find(function(x){return x.key===cmd.collect_key;}); if(cc){cc.done=true; cc.value=cmd.collect_value||cmd.photo||'已采';} }
      detail='XD进店盘点 '+(sw?(sw+'='+val):'')+(cmd.collect_key?(' · 采集'+cmd.collect_key):'')+' · 照片写入L1真源'; break;
    }
    case 'NORTHSTAR_DECIDE': {              // 高层结构性决策:改战略标→连接律自动下沉(上层关差=下层定标)
      const ns=s.northstar;
      const conv=ns.convergence, tgt=conv.down_target;
      // ① 记录结构性决策(高层"做对的事")
      ns.decisions.push({ at:now, by:ns.owner, type:cmd.decision_type||'raise_standard',
        point:conv.point, from:cmd.from, to:cmd.to, reason:cmd.reason||'四维度诊断:结构性问题' });
      // ② ★连接律下沉:高层的标→变成一线那个gap的定标↓(上层关差=下层定标)
      const lp = tgt.loop==='LOOP-SH'?s.loops.sh:s.loops.hema;
      const g = lp.gaps[tgt.gap];
      if(g){ g.standard.src='北极星↓·'+ns.owner+'(战略下沉·非倒推)'; g.standard.v=cmd.to;
             g.standard.pushed_from='L1-northstar'; }
      // ③ ★下沉到中层:对应店的forecast随战略标上调(中层要背这个新目标)
      const prim=s.ops_layer.stores.find(function(x){return x.id===s.store.id;});
      if(prim && cmd.forecast_bump) prim.forecast=+(prim.forecast+cmd.forecast_bump).toFixed(0);
      // ④ 战略标本身也更新
      if(cmd.strategy_key) ns.strategy_standard[cmd.strategy_key]=cmd.to;
      detail='北极星决策:'+conv.point+' 标 '+cmd.from+'→'+cmd.to+' · 连接律下沉到 '+tgt.loop+'/'+tgt.gap+'(一线)+中层forecast'; break;
    }
    case 'XD_BACKROOM': {                   // 后仓库存盘点(拍后仓+批次)·压货判断=校准前置(算差前先校准)
      if(!cmd.photo) throw new Error('后仓盘点必须拍照(红线R1:实物证据)');
      const br=s.backroom;
      br.backroom_qty = cmd.qty!=null ? cmd.qty : (cmd.batches||[]).reduce(function(a,x){return a+(x.qty||0);},0);
      if(cmd.batches) br.batches=cmd.batches;
      br.scanned=true; br.photo=cmd.photo; br.at=now;
      // ★压货判断:后仓>2A → 压货失真(蝴蝶TypeB)→"先消化不补"·算差前先校准
      br.overstock = br.backroom_qty > br.safety_2a;
      // 压货时:physical=shelf+backroom·有货开关"看着有"但那是压货假象(校准要扣掉)
      s.facts.backroom_depth = +(br.backroom_qty/(br.safety_2a*2)).toFixed(3);
      detail='后仓盘点 · '+br.backroom_qty+'瓶'+(br.overstock?(' > 2A('+br.safety_2a+')= 压货!先消化不补(校准前置)'):' · 正常')+(cmd.batches?(' · '+cmd.batches.length+'批次'):''); break;
    }
    case 'GUANXI_TALK': {                   // 客情谈判(答应+共识)
      const t=s.guanxi.talks[cmd.idx]; if(!t) throw new Error('no talk target');
      if(cmd.he_agreed!=null) t.he_agreed=cmd.he_agreed;
      if(cmd.consensus_status) t.consensus.status=cmd.consensus_status;
      t.logged=true; t.at=now;
      t.actionable = (t.he_agreed===true && t.consensus.status==='agreed');
      // ★每次谈判自动留痕进历史(接棒看得到)
      t.history.push({ at:now.slice(0,10), by:(s.loops[ (cmd.by_loop||'sh') ]||s.loops.sh).owner, what:cmd.note||'谈判', result:(t.he_agreed===true?'谈成·落任务':t.he_agreed===false?'没谈拢·待升级':'谈判中') });
      detail='客情谈判 · '+t.who+' · 答应='+t.he_agreed+' · 共识='+t.consensus.status+(t.actionable?' → 落任务':'(软记录不换钱)')+' · 已留痕'; break;
    }
    case 'GUANXI_EDIT': {                   // 编辑三段(他的要求/我方承诺/我方要求·谈判是活的·会变)
      const t=s.guanxi.talks[cmd.idx]; if(!t) throw new Error('no talk target');
      const f=cmd.field; if(['his_ask','our_promise','our_ask','prefs','handover_note'].indexOf(f)<0) throw new Error('字段不可编辑:'+f);
      const old_v=t[f]; t[f]=cmd.value;
      if(f!=='handover_note'&&f!=='prefs') t.history.push({ at:now.slice(0,10), by:(s.loops.sh.owner), what:'更新['+f+']', result:'旧:'+String(old_v).slice(0,20)+'→新' });
      detail='客情编辑 · '+t.who+' · '+f+' 已更新'+(f==='handover_note'?'(交接语)':''); break;
    }
    case 'GUANXI_HANDOVER': {               // ★交接给新人(记经手人链·关系资产传承不断)
      const t=s.guanxi.talks[cmd.idx]; if(!t) throw new Error('no talk target');
      t.owner_chain.push((cmd.new_owner||'新SR')+'('+now.slice(0,10)+'起)');
      t.history.push({ at:now.slice(0,10), by:cmd.old_owner||'交接', what:'关系交接给 '+(cmd.new_owner||'新SR'), result:'知识库已传承' });
      if(cmd.handover_note) t.handover_note=cmd.handover_note;
      detail='客情交接 · '+t.who+' → '+(cmd.new_owner||'新SR')+' · 历史+脾性+承诺全传承'; break;
    }
    case 'OPS_FORECAST': {                  // 中层押预测(建议型·系统给锚+主管押判断·地基:预测=主管能力)
      const o=s.ops_layer; const base=o.numbers.forecast_baseline;
      o.numbers.forecast_manager=cmd.value;  // 主管在基线上押的数
      o.numbers.forecast_delta=+(cmd.value-base).toFixed(1); // 相对锚上调/下调
      o.numbers.forecast_reason=cmd.reason||''; // 押判断的理由(拐点:竞品/新店)
      detail='押预测 · 基线'+base+' → 主管押'+cmd.value+'('+(o.numbers.forecast_delta>=0?'+':'')+o.numbers.forecast_delta+')·'+(cmd.reason||''); break;
    }
    case 'OPS_REALLOCATE': {                // 店间资源调配(战术调整·涉钱=human_gate·A店挪B店)
      const o=s.ops_layer;
      if(!cmd.approved) throw new Error('店间调配涉钱(HITL):须 human_gate 批准后执行(approved:true)');
      const from=o.stores.find(function(x){return x.id===cmd.from;}), to=o.stores.find(function(x){return x.id===cmd.to;});
      if(!from||!to) throw new Error('店不存在');
      o.reallocations.push({ from:cmd.from, to:cmd.to, amount:cmd.amount, what:cmd.what||'预算调配', at:now, by:o.manager });
      detail='店间调配(HITL已批)· '+from.name+' → '+to.name+' · '+cmd.amount+'k · '+(cmd.what||''); break;
    }
    case 'OPS_HANDLE_ESC': {                // 处理一线升上来的差(连接律:中层关差 或 再升一层)
      const o=s.ops_layer; const e=o.escalations[cmd.idx]; if(!e) throw new Error('no escalation');
      if(cmd.decision==='close'){ e.status='CLOSED_BY_OPS'; e.action=cmd.action||'中层调配资源关差'; }
      else if(cmd.decision==='escalate'){ e.status='ESCALATED_UP'; e.to='城市JBP/总部'; } // 中层也关不了→再升
      e.at=now;
      detail='处理升级 · '+e.from+' · '+(cmd.decision==='close'?'中层关差:'+(cmd.action||''):'再升一层→城市JBP'); break;
    }
    default: throw new Error('unknown command '+cmd.type);
  }
  recomputeIncomes(s);                      // ★两环收入 + JBP 同时重算
  const prev = s.audit.length ? s.audit[s.audit.length-1].hash : '0';
  const entry = {seq:s.seq, at:now, actor:(cmd.loop_id==='LOOP-HEMA'?'店长':'SR'), cmd:cmd.type, gap:cmd.gap_id||null, detail, before, after};
  entry.hash = hashChain(prev, entry);
  s.audit.push(entry);
  return deepFreeze(s);
}
function dispatch(state, cmd, ctx){
  const fp = commandFingerprint(cmd);
  if(state.idempotency[fp]) return state;
  const s2 = reduce(state, cmd, ctx);
  const s3 = clone(s2); s3.idempotency[fp]=s2.seq;
  return deepFreeze(s3);
}

/* 契约自检:真同源 + 宪法守则(对象/值双查) */
function contractHash(){
  const frozen=[deepFreeze,clone,digest,commandFingerprint,hashChain,factOf,actualOf,gapMet,calcLoopIncome,jbpIntersection,reduce,dispatch,seedState].map(function(f){return f.toString();}).join('§');
  const fillSig=JSON.stringify(Object.keys(CHANNEL_FILL))+'|'+CHANNEL_FILL.hema_gaps.map(function(g){return g.gap_id;}).join(',')+'|'+CHANNEL_FILL.sh_gaps.map(function(g){return g.gap_id;}).join(',');
  return digest(CORE_VERSION+'§'+frozen+'§'+fillSig);
}
function selfCheck(state){
  const bad=[];
  ['hema','sh'].forEach(function(k){ const gs=state.loops[k].gaps; for(const id in gs) if(gs[id].actual!==null) bad.push('ACTUAL_NOT_NULL:'+id); });
  if(state.meta.live_gate_pass!==null) bad.push('LIVE_GATE_NOT_NULL');
  if(!Object.isFrozen(state)) bad.push('STATE_NOT_FROZEN');
  if(state.meta.contract_hash && state.meta.contract_hash!==contractHash()) bad.push('CONTRACT_DRIFT');
  // 双环必须锚同一消费者(两端落消费者)
  if(state.loops.hema.anchor!==state.loops.sh.anchor) bad.push('CONSUMER_ANCHOR_MISMATCH');
  return {ok:bad.length===0, bad, contract_hash:contractHash()};
}
