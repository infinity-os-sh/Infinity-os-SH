<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>infinity無界♾️1-v4 · 界面D · 极简对话</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Mono:wght@400;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07080d;--bg2:#0c0e16;--bg3:#111420;
  --card:#151820;--card2:#1c2030;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e0e6f5;--text2:#8a97b0;--text3:#414d62;
  --amber:#f5a623;--amber2:#ffca6a;--amber-dim:rgba(245,166,35,0.12);
  --teal:#4ecdc4;--red:#ff5f5f;--green:#4ade80;--purple:#a78bfa;
  --user-bubble:#1e2435;--ai-bubble:#141820;
  --msg-border:rgba(255,255,255,0.05);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;display:flex;flex-direction:column}

/* ── SIDEBAR ── */
.sidebar{
  position:fixed;top:0;left:0;bottom:0;width:240px;
  background:var(--bg2);border-right:1px solid var(--border);
  z-index:200;transform:translateX(-100%);transition:transform 0.25s ease;
  display:flex;flex-direction:column;
}
.sidebar.open{transform:translateX(0)}
.sidebar-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.sidebar-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700}
.sidebar-close{
  width:26px;height:26px;border-radius:7px;background:var(--bg3);border:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--text2);
}
.sidebar-section{padding:10px 12px 6px;font-size:9px;font-weight:700;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase}
.agent-btn{
  display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;
  border-radius:9px;margin:0 6px 2px;transition:all 0.15s;
}
.agent-btn:hover{background:rgba(255,255,255,0.04)}
.agent-btn.active{background:rgba(245,166,35,0.08);border:1px solid rgba(245,166,35,0.15)}
.agent-btn-icon{font-size:15px;flex-shrink:0;width:20px;text-align:center}
.agent-btn-info{flex:1;min-width:0}
.agent-btn-name{font-size:11px;font-weight:600;line-height:1.2}
.agent-btn-score{font-family:'Space Mono',monospace;font-size:10px}
.sidebar-scroll{flex:1;overflow-y:auto;padding-bottom:12px}
.sidebar-scroll::-webkit-scrollbar{width:2px}
.sidebar-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:2px}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;height:52px;
  background:rgba(7,8,13,0.95);border-bottom:1px solid var(--border);
  padding:0 14px;gap:10px;flex-shrink:0;z-index:100;
  backdrop-filter:blur(12px);
}
.menu-btn{
  width:34px;height:34px;border-radius:10px;background:var(--card);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;
  transition:all 0.15s;flex-shrink:0;
}
.menu-btn:hover{border-color:var(--amber)}
.current-agent{
  flex:1;display:flex;align-items:center;gap:10px;cursor:pointer;
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:7px 12px;transition:all 0.15s;min-width:0;
}
.current-agent:hover{border-color:var(--border2)}
.ca-emoji{font-size:18px;flex-shrink:0}
.ca-info{flex:1;min-width:0}
.ca-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ca-tag{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ca-score{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;flex-shrink:0}
.ca-chevron{font-size:10px;color:var(--text3);flex-shrink:0}
.clock{font-family:'Space Mono',monospace;font-size:11px;color:var(--text3);flex-shrink:0}

/* ── CHAT AREA ── */
.chat-area{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:2px}
.chat-area::-webkit-scrollbar{width:3px}
.chat-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.07);border-radius:2px}

.welcome-card{
  margin:auto;max-width:400px;text-align:center;padding:32px 20px;
}
.welcome-agent-emoji{font-size:52px;margin-bottom:12px;display:block}
.welcome-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:4px}
.welcome-tag{font-size:12px;color:var(--amber);margin-bottom:12px}
.welcome-desc{font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:20px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px}
.welcome-kpis{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:16px;text-align:left}
.welcome-kpi{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px}
.welcome-kpi-lbl{font-size:9px;color:var(--text3);margin-bottom:2px;text-transform:uppercase;letter-spacing:0.06em}
.welcome-kpi-val{font-size:12px;font-weight:700}
.welcome-kpi-val.good{color:var(--green)}.welcome-kpi-val.warn{color:var(--amber)}.welcome-kpi-val.bad{color:var(--red)}
.quick-q-title{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px}
.quick-qs{display:flex;flex-direction:column;gap:6px}
.quick-q-btn{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:9px 14px;font-size:12px;color:var(--text2);text-align:left;cursor:pointer;
  transition:all 0.14s;font-family:'Noto Sans SC',sans-serif;
  display:flex;align-items:center;gap:8px;
}
.quick-q-btn:hover{border-color:var(--amber);color:var(--text);background:var(--amber-dim)}

/* Messages */
.msg{display:flex;gap:10px;padding:6px 0;max-width:100%;animation:msgIn 0.18s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

.msg-user{flex-direction:row-reverse}
.msg-bubble{
  border-radius:14px;padding:11px 14px;font-size:13px;line-height:1.7;
  max-width:calc(100% - 40px);border:1px solid var(--msg-border);
}
.msg-user .msg-bubble{
  background:var(--user-bubble);border-color:rgba(255,255,255,0.08);color:var(--text);
  border-radius:14px 4px 14px 14px;
}
.msg-ai .msg-bubble{
  background:var(--ai-bubble);border-color:rgba(255,255,255,0.06);color:var(--text2);
  border-radius:4px 14px 14px 14px;
}
.msg-avatar{
  width:30px;height:30px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:15px;margin-top:4px;
  border:1px solid var(--border);
}
.msg-user .msg-avatar{background:rgba(245,166,35,0.1);border-color:rgba(245,166,35,0.2)}
.msg-ai .msg-avatar{background:var(--card);border-color:var(--border)}
.thinking-msg{color:var(--text3);display:flex;gap:4px;align-items:center;padding:4px 0}
.td{width:5px;height:5px;border-radius:50%;background:var(--amber);animation:td 1.2s infinite}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes td{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* ── INPUT BAR ── */
.input-bar{
  padding:10px 14px;background:rgba(7,8,13,0.95);backdrop-filter:blur(12px);
  border-top:1px solid var(--border);flex-shrink:0;
}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-box{
  flex:1;background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:11px 14px;font-size:13px;color:var(--text);outline:none;
  font-family:'Noto Sans SC',sans-serif;resize:none;max-height:120px;
  transition:border-color 0.15s;
}
.input-box:focus{border-color:rgba(245,166,35,0.4)}
.input-box::placeholder{color:var(--text3)}
.send-btn{
  width:42px;height:42px;border-radius:12px;background:var(--amber);border:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:18px;font-weight:700;color:#000;transition:all 0.15s;flex-shrink:0;
}
.send-btn:hover{background:var(--amber2);transform:scale(1.05)}
.send-btn:disabled{background:var(--bg3);cursor:default;transform:none}
.input-hints{display:flex;gap:6px;margin-top:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.input-hints::-webkit-scrollbar{display:none}
.hint-chip{
  background:var(--bg3);border:1px solid var(--border);border-radius:14px;
  padding:4px 10px;font-size:10px;color:var(--text3);white-space:nowrap;cursor:pointer;
  transition:all 0.12s;flex-shrink:0;font-family:'Noto Sans SC',sans-serif;
}
.hint-chip:hover{border-color:var(--amber);color:var(--amber);background:var(--amber-dim)}

/* Overlay backdrop */
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:150}
.backdrop.show{display:block}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.07);border-radius:2px}
</style>
</head>

// Build sidebar
const cats={};
AGENTS_LIST.forEach(a=>{if(!cats[a.cat])cats[a.cat]=[];cats[a.cat].push(a)});
const scroll=document.getElementById('sidebarScroll');

// Brain first
const brainBtn=document.createElement('div');
brainBtn.className='agent-btn';brainBtn.id='btn-brain';
brainBtn.innerHTML=`<div class="agent-btn-icon">🧠</div><div class="agent-btn-info"><div class="agent-btn-name">AI战略大脑</div><div class="agent-btn-score" style="color:var(--amber)">全局</div></div>`;
brainBtn.onclick=()=>switchAgent(null);
scroll.appendChild(brainBtn);

Object.entries(cats).forEach(([cat,agents])=>{
  const sec=document.createElement('div');sec.className='sidebar-section';sec.textContent=cat;scroll.appendChild(sec);
  agents.forEach(a=>{
    const sc=a.score>=65?'var(--green)':a.score>=45?'var(--amber)':'var(--red)';
    const btn=document.createElement('div');btn.className='agent-btn';btn.id='btn-'+a.name.replace(/\s/g,'_');
    btn.innerHTML=`<div class="agent-btn-icon">${a.emoji}</div><div class="agent-btn-info"><div class="agent-btn-name">${a.name}</div><div class="agent-btn-score" style="color:${sc}">${a.score}</div></div>`;
    btn.onclick=()=>switchAgent(a);
    scroll.appendChild(btn);
  });
});

// Sidebar open/close
function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('backdrop').classList.add('show')}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('backdrop').classList.remove('show')}

// State
let currentAgent=null;// null = brain
let history=[];
let isThinking=false;

function switchAgent(agent){
  currentAgent=agent;
  history=[];
  closeSidebar();

  // Update topbar
  const a=agent||BRAIN;
  document.getElementById('caEmoji').textContent=a.emoji;
  document.getElementById('caName').textContent=a.name||a.name;
  document.getElementById('caTag').textContent=a.tag;
  const sc=a.score?(a.score>=65?'var(--green)':a.score>=45?'var(--amber)':'var(--red)'):'var(--amber)';
  document.getElementById('caScore').style.color=sc;
  document.getElementById('caScore').textContent=a.score||'—';

  // Update sidebar active
  document.querySelectorAll('.agent-btn').forEach(b=>b.classList.remove('active'));
  const btnId=agent?'btn-'+agent.name.replace(/\s/g,'_'):'btn-brain';
  const b=document.getElementById(btnId);if(b)b.classList.add('active');

  // Reset chat
  const area=document.getElementById('chatArea');
  area.innerHTML='';
  showWelcome(agent||BRAIN);
  updateHints(a);
}

function showWelcome(a){
  const area=document.getElementById('chatArea');
  const div=document.createElement('div');
  div.className='welcome-card';

  let kpiHtml='';
  if(a.kpis&&a.kpis.length>0){
    kpiHtml='<div class="welcome-kpis">';
    a.kpis.forEach(k=>kpiHtml+=`<div class="welcome-kpi"><div class="welcome-kpi-lbl">${k.l}</div><div class="welcome-kpi-val ${k.s}">${k.v}</div></div>`);
    kpiHtml+='</div>';
  }

  let presetsHtml='';
  if(a.presets&&a.presets.length>0){
    presetsHtml=`<div class="quick-q-title">快捷提问</div><div class="quick-qs">`;
    a.presets.forEach(p=>presetsHtml+=`<button class="quick-q-btn" onclick="fillAndSend('${p.replace(/'/g,"\\'")}')">→ ${p}</button>`);
    presetsHtml+='</div>';
  }

  div.innerHTML=`
    <span class="welcome-agent-emoji">${a.emoji}</span>
    <div class="welcome-name">${a.name}</div>
    <div class="welcome-tag">${a.tag}</div>
    <div class="welcome-desc">${a.desc}</div>
    ${kpiHtml}
    ${presetsHtml}`;
  area.appendChild(div);
}

function updateHints(a){
  const el=document.getElementById('inputHints');
  el.innerHTML='';
  (a.presets||[]).slice(0,4).forEach(p=>{
    const chip=document.createElement('div');
    chip.className='hint-chip';chip.textContent=p;
    chip.onclick=()=>fillAndSend(p);
    el.appendChild(chip);
  });
}

function fillAndSend(text){
  document.getElementById('inputBox').value=text;
  sendMessage();
}

function addMsg(role,text){
  const area=document.getElementById('chatArea');
  const welcomeCard=area.querySelector('.welcome-card');
  if(welcomeCard) welcomeCard.remove();

  const div=document.createElement('div');
  div.className=`msg msg-${role}`;
  const avatar=role==='user'?'你':((currentAgent||BRAIN).emoji);
  div.innerHTML=`
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-bubble">${typeof text==='string'?text.replace(/\n/g,'<br>'):'<div class="thinking-msg"><div class="td"></div><div class="td"></div><div class="td"></div></div>'}</div>`;
  area.appendChild(div);
  area.scrollTop=area.scrollHeight;
  return div;
}

async function sendMessage(){
  if(isThinking)return;
  const input=document.getElementById('inputBox');
  const q=input.value.trim();if(!q)return;
  input.value='';autoResize(input);

  addMsg('user',q);
  history.push({role:'user',content:q});

  const thinkingDiv=addMsg('ai',null);
  isThinking=true;
  document.getElementById('sendBtn').disabled=true;

  const a=currentAgent||BRAIN;
  const sys=a.systemPrompt||`你是欣和SH infinity無界♾️1-v4中的「${a.name}」Agent（${a.tag}）。职责：${a.desc}。指标：${(a.kpis||[]).map(k=>k.l+'='+k.v).join('·')}。缺口：${(a.gaps||[]).join('、')}。用中文简洁回答，不超过200字，直接给出要点。`;

  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:history.slice(-10)})
    });
    const d=await r.json();
    const txt=d.content?.map(c=>c.text||'').join('')||'暂时无法获取回答。';
    const bubble=thinkingDiv.querySelector('.msg-bubble');
    bubble.innerHTML=txt.replace(/\n/g,'<br>');
    history.push({role:'assistant',content:txt});
  }catch(e){
    thinkingDiv.querySelector('.msg-bubble').innerHTML=`<span style="color:var(--red);font-size:11px">⚠️ ${e.message}</span>`;
  }
  isThinking=false;
  document.getElementById('sendBtn').disabled=false;
  document.getElementById('chatArea').scrollTop=document.getElementById('chatArea').scrollHeight;
}

function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}
}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}

// Init
switchAgent(null);
document.getElementById('btn-brain').classList.add('active');
</script>
