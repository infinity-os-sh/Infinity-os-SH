<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>INFINITY OS · Interface D · 对话模式</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080a10;--bg2:#0c0f18;--bg3:#111520;
  --card:#161c28;--card2:#1c2334;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e2e8f5;--text2:#7a8ba0;--text3:#3d4e66;
  --amber:#f5a623;--amber2:#ffd07a;--amber-dim:rgba(245,166,35,0.1);
  --teal:#3ecfb8;--teal-dim:rgba(62,207,184,0.1);
  --red:#ff4d6d;--red-dim:rgba(255,77,109,0.1);
  --green:#3ddc84;--green-dim:rgba(61,220,132,0.1);
  --user-bubble:#1a2540;--ai-bubble:#111520;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;display:flex;flex-direction:column}

/* ── TOPBAR ── */
.topbar{
  height:52px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;z-index:10;
}
.logo-sym{
  width:28px;height:28px;border-radius:7px;flex-shrink:0;
  background:linear-gradient(135deg,#f5a623,#ff7c38);
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;font-size:12px;color:#000;
  box-shadow:0 0 12px rgba(245,166,35,0.3);
}
.topbar-flex{flex:1}
.topbar-center{display:flex;align-items:center;gap:8px;cursor:pointer}
.agent-avatar{
  width:28px;height:28px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:14px;background:var(--card2);border:1px solid var(--border2);
  flex-shrink:0;
}
.agent-info-top{}
.agent-name-top{font-size:13px;font-weight:600;line-height:1.2}
.agent-tag-top{font-size:10px;color:var(--text3)}
.agent-switch{font-size:11px;color:var(--text3);opacity:0.6}
.topbar-right{display:flex;align-items:center;gap:8px}
.clock-sm{font-family:'Space Mono',monospace;font-size:10px;color:var(--text3)}
.ver-sm{font-size:10px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);padding:2px 7px;border-radius:5px;font-family:'Space Mono',monospace}

/* ── AGENT PICKER ── */
.agent-picker{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);
  z-index:100;display:none;flex-direction:column;
  justify-content:flex-end;backdrop-filter:blur(4px);
}
.agent-picker.show{display:flex}
.picker-sheet{
  background:var(--bg2);border-top:1px solid var(--border2);
  border-radius:18px 18px 0 0;max-height:72vh;overflow:hidden;
  display:flex;flex-direction:column;
}
.picker-hdr{
  padding:14px 16px 10px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.picker-title{font-size:13px;font-weight:700}
.picker-close{
  width:28px;height:28px;border-radius:7px;background:var(--card);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:var(--text2);
}
.picker-body{overflow-y:auto;padding:10px 12px 20px}
.picker-sec-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:0.09em;text-transform:uppercase;padding:8px 4px 6px}
.picker-row{
  display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;
  cursor:pointer;transition:all 0.15s;margin-bottom:2px;
}
.picker-row:hover,.picker-row:active{background:rgba(255,255,255,0.04)}
.picker-row.selected{background:var(--amber-dim);border:1px solid rgba(245,166,35,0.2)}
.picker-emoji{
  width:36px;height:36px;border-radius:9px;background:var(--card);
  display:flex;align-items:center;justify-content:center;font-size:16px;
  border:1px solid var(--border);flex-shrink:0;
}
.picker-info{flex:1;min-width:0}
.picker-name{font-size:13px;font-weight:500;margin-bottom:2px}
.picker-sub{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.picker-score{
  font-family:'Syne',sans-serif;font-size:16px;font-weight:800;flex-shrink:0;
}
.picker-ms{font-size:9px;color:var(--text3);text-align:right}

/* ── CHAT AREA ── */
.chat-area{
  flex:1;overflow-y:auto;padding:12px 16px;
  display:flex;flex-direction:column;gap:14px;
}
.chat-area::-webkit-scrollbar{width:3px}
.chat-area::-webkit-scrollbar-track{background:transparent}
.chat-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}

/* Welcome state */
.welcome{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:24px 16px;gap:14px;
}
.welcome-icon{
  width:64px;height:64px;border-radius:16px;
  background:linear-gradient(135deg,rgba(245,166,35,0.15),rgba(62,207,184,0.08));
  border:1px solid rgba(245,166,35,0.25);
  display:flex;align-items:center;justify-content:center;font-size:28px;
  margin-bottom:4px;
}
.welcome-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:4px}
.welcome-sub{font-size:12px;color:var(--text3);line-height:1.6;max-width:280px}
.welcome-presets{width:100%;max-width:340px;display:flex;flex-direction:column;gap:6px;margin-top:4px}
.wp-btn{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:9px 14px;font-size:12px;color:var(--text2);text-align:left;cursor:pointer;
  display:flex;align-items:center;gap:8px;transition:all 0.15s;
  font-family:'Noto Sans SC',sans-serif;
}
.wp-btn:hover{border-color:var(--amber);color:var(--text);background:var(--amber-dim)}
.wp-icon{font-size:13px;flex-shrink:0}

/* Messages */
.msg{display:flex;flex-direction:column;gap:4px;animation:msgIn 0.2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg-user{align-items:flex-end}
.msg-ai{align-items:flex-start}

.bubble{
  max-width:84%;border-radius:14px;padding:10px 13px;
  font-size:13px;line-height:1.65;
}
.bubble-user{
  background:var(--user-bubble);border:1px solid var(--border2);
  border-bottom-right-radius:4px;color:var(--text);
}
.bubble-ai{
  background:var(--ai-bubble);border:1px solid var(--border);
  border-bottom-left-radius:4px;color:var(--text2);
}
.msg-meta{font-size:10px;color:var(--text3);padding:0 4px;display:flex;align-items:center;gap:5px}
.msg-avatar{font-size:12px}

/* Typing indicator */
.typing-dots{display:flex;gap:4px;align-items:center;padding:2px 0}
.dot{width:6px;height:6px;border-radius:50%;background:var(--amber);animation:dotPulse 1.3s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,80%,100%{opacity:.2;transform:scale(.75)}40%{opacity:1;transform:scale(1)}}

/* Preset chips (inside chat) */
.chips-row{display:flex;gap:6px;flex-wrap:wrap;padding:0 2px}
.chip-d{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:5px 11px;font-size:11px;color:var(--text2);cursor:pointer;
  transition:all 0.15s;font-family:'Noto Sans SC',sans-serif;
}
.chip-d:hover{border-color:var(--amber);color:var(--amber);background:var(--amber-dim)}

/* Agent info card */
.agent-card-msg{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:12px 14px;max-width:84%;
}
.acm-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.acm-emoji{font-size:18px}
.acm-name{font-size:13px;font-weight:600}
.acm-tag{font-size:10px;color:var(--amber)}
.acm-kpis{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px}
.acm-kpi{background:var(--bg3);border-radius:7px;padding:6px 8px;border:1px solid var(--border)}
.acm-kpi-l{font-size:9px;color:var(--text3);margin-bottom:2px}
.acm-kpi-v{font-size:12px;font-weight:600}
.acm-kpi-v.good{color:var(--green)}.acm-kpi-v.warn{color:var(--amber)}.acm-kpi-v.bad{color:var(--red)}
.acm-gaps{font-size:11px;color:var(--text3);line-height:1.5}
.acm-gaps span{color:var(--red)}

/* ── INPUT AREA ── */
.input-area{
  padding:10px 14px 16px;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;
}
.input-row{
  display:flex;gap:8px;background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:6px 8px 6px 14px;align-items:flex-end;
  transition:border-color 0.2s;
}
.input-row:focus-within{border-color:rgba(245,166,35,0.3)}
.chat-input{
  flex:1;background:transparent;border:none;outline:none;
  font-size:13px;color:var(--text);font-family:'Noto Sans SC',sans-serif;
  resize:none;max-height:100px;min-height:22px;line-height:1.5;padding-top:2px;
}
.chat-input::placeholder{color:var(--text3)}
.send-btn{
  width:36px;height:36px;border-radius:10px;background:var(--amber);border:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:16px;transition:all 0.15s;flex-shrink:0;
}
.send-btn:hover{background:var(--amber2);transform:scale(1.05)}
.send-btn:disabled{background:var(--card2);cursor:not-allowed;transform:none}
.input-hint{display:flex;align-items:center;justify-content:space-between;margin-top:6px;padding:0 4px}
.input-hint-l{font-size:10px;color:var(--text3)}
.input-hint-r{font-size:10px;color:var(--text3);font-family:'Space Mono',monospace}

/* Brain mode button */
.brain-mode-btn{
  background:linear-gradient(135deg,var(--amber-dim),var(--teal-dim));
  border:1px solid rgba(245,166,35,0.25);border-radius:10px;
  padding:8px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;
  margin-bottom:8px;transition:all 0.2s;
}
.brain-mode-btn:hover{border-color:rgba(245,166,35,0.45)}
.bmb-icon{font-size:14px}
.bmb-text{font-size:11px;color:var(--text2)}
.bmb-text strong{color:var(--amber)}

</style>
</head>

<!-- TOPBAR -->

  </div>
</div>

<!-- INPUT AREA -->
<div class="input-area">

      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
  </div>
  <div class="input-hint">
    <div class="input-hint-l">Enter 发送 · Shift+Enter 换行</div>
    <div class="input-hint-r" id="charCount">0</div>
  </div>
</div>

const catLabels={commander:'总指挥',lianheng:'连横',system:'系统Agent',shelf:'货架识别',consumer:'消费者',brand:'品牌'};

let currentAgent=BRAIN_AGENT;
let isLoading=false;

// ── Picker ──
function buildPicker(){
  const body=document.getElementById('pickerBody');
  // Brain first
  const brainRow=document.createElement('div');
  brainRow.className='picker-row'+(currentAgent===BRAIN_AGENT?' selected':'');
  brainRow.innerHTML=`<div class="picker-emoji">🧠</div>
    <div class="picker-info"><div class="picker-name">战略大脑</div><div class="picker-sub">INFINITY OS · 完整知识库 · 问任何经营问题</div></div>`;
  brainRow.onclick=()=>{selectAgent(BRAIN_AGENT);hidePicker()};
  body.appendChild(brainRow);
  // By category
  const cats={};
  AGENTS.forEach(a=>{if(!cats[a.cat]) cats[a.cat]=[];cats[a.cat].push(a)});
  Object.keys(cats).forEach(cat=>{
    const lbl=document.createElement('div');lbl.className='picker-sec-label';lbl.textContent=catLabels[cat]||cat;
    body.appendChild(lbl);
    cats[cat].forEach(a=>{
      const sc=a.score>=65?'var(--green)':a.score>=45?'var(--amber)':'var(--red)';
      const row=document.createElement('div');
      row.className='picker-row'+(currentAgent===a?' selected':'');
      row.id='pr-'+a.name;
      row.innerHTML=`<div class="picker-emoji">${a.emoji}</div>
        <div class="picker-info"><div class="picker-name">${a.name}</div><div class="picker-sub">${a.tag} · ${a.desc.substring(0,36)}…</div></div>
        <div><div class="picker-score" style="color:${sc}">${a.score}</div><div class="picker-ms">M${a.ms}/5</div></div>`;
      row.onclick=()=>{selectAgent(a);hidePicker()};
      body.appendChild(row);
    });
  });
}

function selectAgent(a){
  currentAgent=a;
  document.getElementById('topAgentAvatar').textContent=a.emoji;
  document.getElementById('topAgentName').textContent=a.name;
  document.getElementById('topAgentTag').textContent=a.tag;
  document.getElementById('currentAgentLabel').textContent=a.name;
  document.getElementById('chatInput').placeholder='问 '+a.name+'…';
  // Reset chat
  clearAndShowWelcome(a);
}

function showPicker(){document.getElementById('agentPicker').classList.add('show')}
function hidePicker(){document.getElementById('agentPicker').classList.remove('show')}
function pickerBg(e){if(e.target===document.getElementById('agentPicker'))hidePicker()}

function switchToBrain(){selectAgent(BRAIN_AGENT)}

// ── Welcome ──
function clearAndShowWelcome(a){
  const area=document.getElementById('chatArea');
  area.innerHTML=`<div class="welcome" id="welcome">
    <div class="welcome-icon">${a.emoji}</div>
    <div class="welcome-title">${a.name}</div>
    <div class="welcome-sub">${a.tag}</div>
    <div class="welcome-presets" id="welcomePresets"></div>
  </div>`;
  buildWelcomePresets(a);
}

function buildWelcomePresets(a){
  const el=document.getElementById('welcomePresets');
  if(!el)return;
  // Agent info card for non-brain
  if(a!==BRAIN_AGENT&&a.kpis){
    const card=document.createElement('div');card.className='agent-card-msg';
    let kpiHtml='<div class="acm-kpis">';
    a.kpis.forEach(k=>{kpiHtml+=`<div class="acm-kpi"><div class="acm-kpi-l">${k.l}</div><div class="acm-kpi-v ${k.s}">${k.v}</div></div>`;});
    kpiHtml+='</div>';
    card.innerHTML=`<div class="acm-top"><div class="acm-emoji">${a.emoji}</div><div><div class="acm-name">${a.name}</div><div class="acm-tag">${a.tag}</div></div></div>
      ${kpiHtml}
      <div class="acm-gaps">⚠️ 缺口：<span>${a.gaps?.slice(0,2).join('、')}</span></div>`;
    el.appendChild(card);
  }
  a.presets.forEach(p=>{
    const btn=document.createElement('div');btn.className='wp-btn';
    btn.innerHTML=`<div class="wp-icon">›</div>${p}`;
    btn.onclick=()=>{sendPreset(p)};
    el.appendChild(btn);
  });
}

// ── Chat ──
function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}
}

function autoResize(ta){
  ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,100)+'px';
  document.getElementById('charCount').textContent=ta.value.length;
}

function sendPreset(q){
  document.getElementById('chatInput').value=q;
  sendMessage();
}

async function sendMessage(){
  const input=document.getElementById('chatInput');
  const q=input.value.trim();
  if(!q||isLoading)return;
  input.value='';input.style.height='auto';
  document.getElementById('charCount').textContent='0';

  // Remove welcome
  const welcome=document.getElementById('welcome');
  if(welcome)welcome.remove();

  // Add user msg
  addMsg('user',q);

  // Add AI loading
  const loadId='load-'+Date.now();
  addLoadingMsg(loadId);
  isLoading=true;

  const sys=currentAgent===BRAIN_AGENT?BRAIN_AGENT.systemPrompt:currentAgent.systemPrompt;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:[{role:'user',content:q}]})});
    const d=await r.json();
    const txt=d.content?.map(c=>c.text||'').join('')||'暂时无法获取回答，请稍后重试。';
    replaceLoading(loadId,txt);
  }catch(e){
    replaceLoading(loadId,'⚠️ 连接失败：'+e.message);
  }
  isLoading=false;
}

function addMsg(role,text){
  const area=document.getElementById('chatArea');
  const div=document.createElement('div');
  div.className='msg msg-'+(role==='user'?'user':'ai');
  if(role==='user'){
    div.innerHTML=`<div class="bubble bubble-user">${escHtml(text)}</div>
      <div class="msg-meta">你</div>`;
  }else{
    div.innerHTML=`<div class="msg-meta"><span class="msg-avatar">${currentAgent.emoji}</span>${currentAgent.name}</div>
      <div class="bubble bubble-ai"><div style="white-space:pre-wrap">${escHtml(text)}</div></div>`;
  }
  area.appendChild(div);
  area.scrollTop=area.scrollHeight;
}

function addLoadingMsg(id){
  const area=document.getElementById('chatArea');
  const div=document.createElement('div');div.className='msg msg-ai';div.id=id;
  div.innerHTML=`<div class="msg-meta"><span class="msg-avatar">${currentAgent.emoji}</span>${currentAgent.name}</div>
    <div class="bubble bubble-ai"><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  area.appendChild(div);
  area.scrollTop=area.scrollHeight;
}

function replaceLoading(id,text){
  const div=document.getElementById(id);
  if(!div)return;
  div.innerHTML=`<div class="msg-meta"><span class="msg-avatar">${currentAgent.emoji}</span>${currentAgent.name}</div>
    <div class="bubble bubble-ai"><div style="white-space:pre-wrap">${escHtml(text)}</div></div>`;
  const area=document.getElementById('chatArea');
  area.scrollTop=area.scrollHeight;
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ── Init ──
buildPicker();
buildWelcomePresets(BRAIN_AGENT);
