<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天猫 v11 · SKU生命周期经营 Agent</title>
<style>
:root{--ink:#17191E;--paper:#F2F1EB;--surface:#FBFAF6;--amber:#A8612A;--amber-deep:#834A1F;--amber-tint:#EADFCB;
  --slate:#6b6f76;--rule:#dcd7cb;--blue:#3a5a7a;--go:#3f7a4f;--red:#a8433a;--red-tint:#f0dcd8;--go-tint:#dbe7dc;
  --mono:'JetBrains Mono','SF Mono',ui-monospace,monospace;--cjk:'PingFang SC','Noto Sans CJK SC',system-ui,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#26282d;font-family:var(--cjk);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:13px;}
button{cursor:pointer;font-family:var(--cjk);font-size:12px;border:1px solid var(--amber-tint);border-radius:5px;padding:7px 11px;background:var(--surface);color:var(--amber-deep);}
button:active{transform:translateY(1px);}
button:focus,select:focus,input:focus{outline:2px solid var(--blue);}
button:disabled{opacity:.4;cursor:not-allowed;}
input,select{background:var(--surface);border:1px solid var(--rule);color:var(--ink);border-radius:5px;padding:5px 8px;font-size:12px;font-family:var(--cjk);}
.phone{max-width:430px;margin:0 auto;min-height:100vh;background:var(--paper);display:flex;flex-direction:column;position:relative;}
.trialbar{background:repeating-linear-gradient(45deg,#2a2c31,#2a2c31 8px,#25272c 8px,#25272c 16px);color:#c9b48f;font-family:var(--mono);font-size:9.5px;padding:5px 12px;letter-spacing:.03em;line-height:1.5;}
.trialbar b{color:#e7d3a8;}
.hd{background:var(--ink);color:#F2F1EB;padding:11px 15px;}
.hd .who{font-weight:700;font-size:14.5px;}
.hd .who small{font-weight:400;color:#B7BAC0;font-family:var(--mono);font-size:10.5px;margin-left:5px;}
.roles{float:right;display:flex;gap:4px;flex-wrap:wrap;}
.roleb{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:2px;background:#2f3239;color:#B7BAC0;border:1px solid #3a3e45;}
.roleb.on{background:var(--amber);color:#fff;border-color:var(--amber);}
.hd .second{margin-top:9px;font-size:11px;color:#9a9da3;font-family:var(--mono);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.hd .second select{background:#2f3239;border-color:#3a3e45;color:#F2F1EB;font-size:11px;max-width:230px;}
.cyb{font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:2px;background:#2f3239;color:#B7BAC0;border:1px solid #3a3e45;}
.cyb.on{background:var(--amber);color:#fff;border-color:var(--amber);}
.mockchip{font-family:var(--mono);font-size:9px;color:#e7d3a8;border:1px dashed #5a5136;padding:1px 6px;border-radius:2px;}
.stagestrip{display:flex;overflow-x:auto;background:#1d1f24;border-top:1px solid #2f3239;-webkit-overflow-scrolling:touch;}
.stagestrip::-webkit-scrollbar{display:none;}
.stgb{flex:1 0 auto;padding:8px 12px 7px;font-family:var(--mono);font-size:11px;color:#7d818a;border:none;border-radius:0;background:transparent;border-bottom:2px solid transparent;white-space:nowrap;text-align:center;}
.stgb.on{color:#F2F1EB;border-bottom-color:var(--amber);background:#232529;}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--rule);position:sticky;top:0;z-index:5;}
.navb{flex:1;text-align:center;padding:9px 2px;font-size:11px;color:var(--slate);border:none;border-radius:0;background:transparent;border-bottom:2px solid transparent;}
.navb.on{color:var(--amber-deep);font-weight:700;border-bottom-color:var(--amber);background:var(--surface);}
.body-row{flex:1;display:flex;min-height:0;}
.main{flex:1;overflow-y:auto;padding:13px 14px 90px;min-width:0;}
.side{display:none;background:var(--surface);border-left:1px solid var(--rule);padding:13px;width:320px;overflow-y:auto;}
.side .sh{font-family:var(--mono);font-size:11px;letter-spacing:.05em;color:var(--amber-deep);}
.card{overflow-x:auto;background:var(--surface);border:1px solid var(--rule);border-radius:7px;padding:13px;margin-bottom:12px;}
.card h3{font-size:13.5px;font-weight:800;margin-bottom:7px;}
.card h4{font-family:var(--mono);font-size:10.5px;letter-spacing:.04em;color:var(--amber-deep);margin:10px 0 5px;}
.sub{font-size:11.5px;color:var(--slate);line-height:1.55;}
.tiny{font-family:var(--mono);font-size:9.5px;color:var(--slate);line-height:1.6;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.grid3{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.tile{background:var(--paper);border:1px solid var(--rule);border-radius:5px;padding:8px 10px;cursor:pointer;}
.tile .v{font-family:var(--mono);font-size:15px;font-weight:700;margin:2px 0;}
.tile .lbl{font-family:var(--mono);font-size:10px;color:var(--slate);}
.st-red{background:var(--red-tint);border-color:#e0bdb7;}.st-red .v{color:var(--red);}
.st-green{background:var(--go-tint);border-color:#bcd3bf;}.st-green .v{color:var(--go);}
.st-amber{background:var(--amber-tint);border-color:#d8c39a;}.st-amber .v{color:var(--amber-deep);}
.st-gray{background:#e9e7df;opacity:.85;}.st-gray .v{color:var(--slate);}
.pill{display:inline-block;font-family:var(--mono);font-size:9.5px;border-radius:2px;padding:1px 7px;margin-right:4px;}
.p-red{background:var(--red-tint);color:var(--red);}
.p-green{background:var(--go-tint);color:var(--go);}
.p-amber{background:var(--amber-tint);color:var(--amber-deep);}
.p-gray{background:#e9e7df;color:var(--slate);}
.p-blue{background:#dde5ee;color:var(--blue);}
.p-purple{background:#e7dff0;color:#6b4b9e;}
.row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.spread{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;}
table{width:100%;border-collapse:collapse;font-size:11.5px;}
th,td{text-align:left;padding:6px 7px;border-bottom:1px solid var(--rule);}
th{font-family:var(--mono);font-size:10px;color:var(--slate);font-weight:500;}
.jnode,.nnode{background:var(--surface);border:1px solid var(--rule);border-radius:6px;padding:10px 12px;margin-bottom:8px;cursor:pointer;}
.jnode.open,.nnode.open{border-left:3px solid var(--amber);}
.jnode b,.nnode b{font-size:12.5px;}
.attrcard{background:var(--surface);border:1px solid var(--rule);border-left:3px solid var(--amber);border-radius:6px;padding:12px;margin-top:8px;}
.attrcard .seg{margin-bottom:8px;padding-left:8px;border-left:2px solid var(--rule);}
.attrcard .seg b{font-size:12px;}
.chk{display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid var(--rule);cursor:pointer;font-size:12px;}
.chk.done{color:var(--go);}
.feest{display:flex;gap:4px;flex-wrap:wrap;margin:6px 0;}
.feest span{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:2px;background:var(--paper);color:var(--slate);border:1px solid var(--rule);}
.feest span.hit{background:var(--go-tint);color:var(--go);border-color:#bcd3bf;}
.feest span.cur{background:var(--amber-tint);color:var(--amber-deep);border-color:#d8c39a;}
#tw{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:99;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none;}
#tw .t{background:#17191Ee6;color:#F2F1EB;padding:8px 16px;border-radius:20px;font-size:12px;max-width:86vw;}
.jsonbox{background:#1d1f24;border:1px solid #2f3239;border-radius:6px;padding:10px;font-family:var(--mono);font-size:10px;white-space:pre-wrap;word-break:break-all;color:#c9d8a8;max-height:260px;overflow:auto;}
.gaunt{width:100%;height:8px;background:var(--paper);border-radius:4px;overflow:hidden;margin:4px 0;}
.gaunt i{display:block;height:100%;background:var(--go);}
.mnav{display:none;}
.oidCards{display:none;}
@media (max-width:767px){ .oidTable{display:none;} .oidCards{display:block;} }
@media (min-width:1360px){ .phone{max-width:1330px;} }
@media (min-width:1600px){ .phone{max-width:1560px;} .grid3{grid-template-columns:repeat(3,1fr);} }
.teamTable th{position:sticky;top:0;background:var(--surface);z-index:2;}
.teamTable th:first-child,.teamTable td:first-child{position:sticky;left:0;background:var(--surface);z-index:3;}
.dimTab.on{background:var(--amber);color:#fff;border-color:var(--amber);}
@media (min-width:1200px){
  .phone{display:grid;grid-template-columns:168px 1fr;grid-template-rows:auto auto auto 1fr;}
  .trialbar{grid-column:1/3;}
  .hd{grid-column:1/3;}
  .stagestrip{grid-column:1/3;}
  .tabs{grid-column:1;grid-row:4;flex-direction:column;border-bottom:none;border-right:1px solid var(--rule);position:static;align-items:stretch;height:100%;}
  .navb{text-align:left;padding:11px 14px;border-bottom:none;border-left:3px solid transparent;font-size:12.5px;}
  .navb.on{border-left-color:var(--amber);border-bottom:none;}
  .body-row{grid-column:2;grid-row:4;}
}

.drawerbtn{display:none;}
@media (min-width:1200px){
  .phone{max-width:1240px;}
  .side{display:block;}
  .main{padding:16px 20px 60px;}
  .grid3{grid-template-columns:1fr 1fr 1fr;}
}
@media (max-width:1199px){
  .phone{max-width:760px;}
  .side.open{display:block;position:fixed;right:0;top:0;bottom:0;width:320px;z-index:50;box-shadow:-8px 0 30px #0006;}
  .drawerbtn{display:inline-block;}
}
@media (max-width:767px){
  .phone{max-width:430px;}
  .side.open{position:fixed;left:0;right:0;bottom:0;top:auto;width:auto;max-height:70vh;border-top:1px solid var(--rule);border-left:none;border-radius:12px 12px 0 0;box-shadow:0 -8px 30px #0006;}
  .grid2,.grid3{grid-template-columns:1fr;}
}
</style>
</head>

function curSKU(){return SKUS.find(k=>k.id===S.skuId)}

function rawVal(sku,k){ if(sku.caps && sku.caps[k]) return null; return sku.m[S.cycle][k]; }
function mvalFor(sku,k){ /* 最终判级值 = 补证值 ?? 原值(经校准口径) */
  if(sku.caps && sku.caps[k]) return null;
  const ov=S.override[sku.id][S.cycle][k];
  return (ov!==undefined)? ov.val : sku.m[S.cycle][k];

function mval(k){return mvalFor(curSKU(),k)}
function calibDone(id){const c=S.calib[id||S.skuId];return c.anomaly&&c.refund&&c.split}

function gateLine(stage,k,fallback){
  const r=RULES.find(x=>x.id==='R-GATE-'+stage.toUpperCase());
  if(r&&r.params&&r.params[k]) return r.params[k].value;
  if(r&&r.param&&r.param[k]!==undefined) return r.param[k];
  return fallback;
}
function gateEval(){
  const sku=curSKU(), st=stageCfg();
  if(!st.gate.length) return {mode:'retire'};
  if(S.cycle==='campaign') return {mode:'blocked-cycle', reason:'大促cycle不用于毕业判定;活动后30天回看透支'};
  if(!calibDone(sku.id)) return {mode:'blocked-calib', reason:'校准未完成(异常剔除/退款回冲/活动分账),Gate与算差锁定'};
  const rows = st.gate.map(g=>{
    const [k,op,v0,u]=g; const v=gateLine(curStage(),k,v0); const cur=mval(k);
    let pass=null;
    if(cur!==null) pass = op==='>='? cur>=v : cur<=v;
    return {k,op,v,u,cur,pass};
  });
  const gray = rows.filter(r=>r.pass===null).length;
  const fail = rows.filter(r=>r.pass===false).length;
  return {mode:'eval', rows, gray, fail, pass: fail===0 && gray===0, degraded: gray>0};
}
function light(k){
  const st=stageCfg(); const cur=mval(k);
  if(cur===null) return 'gray';
  const g=st.gate.find(x=>x[0]===k);
  if(!g) return 'green';
  const gl=gateLine(curStage(),k,g[2]);
  const pass = g[1]==='>='? cur>=gl : cur<=gl;
  if(pass) return 'green';
  const near = g[1]==='>='? cur>=gl*0.85 : cur<=gl*1.15;
  return near?'amber':'red';
}

/* =========================================================
   规则执行器(P0-04):扫描→命中→断点→自动派任务→绑SOP→去重
   ========================================================= */
function firedRules(sku){
  sku=sku||curSKU(); const out=[];
  if(S.cycle!=='normal') return out;              /* 大促不判 */
  if(!calibDone(sku.id)) return out;              /* 校准先于算差 */
  const st=STAGES[sku.stage];
  st.gate.forEach(g=>{
    const [k,op,v0]=g; const v=gateLine(sku.stage,k,v0); const cur=mvalFor(sku,k);
    if(cur===null) return;
    const pass=op==='>='?cur>=v:cur<=v;
    if(!pass) out.push({rule:'R-GATE-'+sku.stage.toUpperCase(), metric:k, cur, line:op+''+v, owner:METRICS[k].owner, sop:METRICS[k].sop, skuId:sku.id});
  });
  return out;
}
function ruleEvidence(f){
  const rr=RULES.find(r=>r.id===f.rule);
  return {rule_id:f.rule, rule_version:rr?rr.version:'unversioned', metric:f.metric, current:f.cur, line:f.line, calib:'done', cycle:'normal_cycle', quality_score:0.93, t:ev0('RULE_FIRED','sys').t};
}

  return S.tasks.some(t=>t.skuId===skuId && t.status==='open' && t.ruleKey===ruleKey);
}
function generateTasksFromRules(){
  const fired=firedRules();

  fired.forEach(f=>{
    const key=f.rule+':'+f.metric;
    audit('RULE_FIRED', f.rule+' 命中 '+METRICS[f.metric].n+'='+f.cur+' vs '+f.line);
    if(dedupeTask(f.skuId,key)) return;
    const g=STAGES[SKUS.find(k=>k.id===f.skuId).stage].gate.find(x=>x[0]===f.metric);
    S.tasks.push({id:'T-'+(S.taskSeq++), title:'规则命中·'+METRICS[f.metric].n+'未达线('+f.cur+' vs '+f.line+')', role:f.owner, sop:f.sop,
      src:'规则命中·'+f.rule, skuId:f.skuId, status:'open', baseline:f.cur, target:g?g[2]:null, result:null, verify:null, fixed:false,
      upStd:STAGES[SKUS.find(k=>k.id===f.skuId).stage].n+'期Gate·'+METRICS[f.metric].n+'线', ruleKey:key, dir:METRICS[f.metric].direction||'gt', sla_h:48, evidence:ruleEvidence(f)});
    stampTask(S.tasks[S.tasks.length-1]);
    audit('TASK_CREATED','规则自动派发→'+ROLES[f.owner].n+' '+f.sop+'(48h验果)');

  if(created) toast('规则扫描:命中'+fired.length+'条,新派任务'+created+'条(去重后)');
  else if(fired.length) toast('规则扫描:命中'+fired.length+'条,均已有在办任务(去重)');

  return created;
}

   规则回放/回滚(P1-05)
   ========================================================= */
function evalParams(sku,params,fbParams){
  let pass=true;
  Object.keys(params).forEach(k=>{
    const cur=mvalFor(sku,k); if(cur===null)return;
    const p=params[k];
    if(!(p.op==='>='? cur>=p.value : cur<=p.value)) pass=false;
  });
  return pass;
}
function ruleReplay(ruleId){
  const r=RULES.find(x=>x.id===ruleId);
  if(!r||!r.hist.length||!r.params) return {ok:false,msg:'该规则无可回放的参数化历史版本'};
  const old=r.hist[r.hist.length-1];
  const oldParams=Object.assign({},r.params,old.params||{});
  const stage=ruleId.replace('R-GATE-','').toLowerCase();
  const affected=[];
  SKUS.filter(k=>k.stage===stage).forEach(k=>{
    const newV=evalParams(k,r.params), oldV=evalParams(k,oldParams);
    if(newV!==oldV) affected.push({sku:k.id, old:old.version+(oldV?'过':'不过'), now:r.version+(newV?'过':'不过')});
  });
  audit('RULE_REPLAY', ruleId+' '+old.version+' vs '+r.version+' 判定翻转SKU数='+affected.length);
  return {ok:true, old, affected};
}
function ruleRollback(ruleId, reason){
  if(S.role!=='mgr'){audit('RULE_ROLLBACK_DENIED',ruleId+' 非主管拒绝');return false}
  if(!reason||!String(reason).trim()) return false;
  const r=RULES.find(x=>x.id===ruleId);
  if(!r.hist.length) return false;
  const old=r.hist.pop();
  r.hist.push({version:r.version, effective:r.effective, expr:r.expr, params:r.params, approver:r.approver});
  Object.assign(r,{version:old.version, effective:ev0('x','x').t.slice(0,10), expr:old.expr, params:Object.assign({},r.params,old.params||{})});
  audit('RULE_ROLLBACK', ruleId+' 回滚至 '+old.version+' 理由:'+reason);
  return true;
}

    if(f.state==='consumed'){ if(FEE_PERM.invoice.includes(S.role)) h+=`<button data-fee-invoice="${f.id}">开票与差异核对</button>`; else h+=`<span class="tiny">待财务岗开票结清</span>`; }

    h+=`</div><div class="tiny" style="margin-top:4px">${f.log.map(l=>l.t+' '+l.type+'('+l.who+')').join(' → ')}</div></div>`;
  });
  h+=`</div></div>`;

  h+=`<div class="card"><h3>HITL 队列(涉钱/改价/下架/合同/残值复投/阶段出口)</h3>`;

  S.pending.forEach(p=>{
    h+=`<div class="spread" style="padding:6px 0;border-bottom:1px solid var(--rule)"><div><b>${p.title}</b><div class="tiny">${p.id} · ${p.type} · 提交:${ROLES[p.by].n} · ${p.reason?('理由:'+p.reason+' · '):''}状态:${p.status}</div></div>

  h+=`</div>`;
  return h;
}

  <h4>阶段冻结档案(lifecycle_transition)</h4>${S.frozen.map(f=>`<div class="tiny">❄ ${f.skuId} · ${STAGES[f.from_stage].n}期结果冻结 · 出口:${f.exit} · ${f.t}</div>`).join('')||'<div class="sub">暂无迁移。</div>'}</div>`;

  let sopRole = (S.role==='cmd'||S.role==='mgr'||S.role==='fin')?'ops':S.role;
  let openStep=null;
  if(S.focus&&S.focus.sop){ const st=SOP_STEPS.find(x=>x.id===S.focus.sop); if(st){sopRole=st.owner; openStep=st.id;} }
  h+=`<div class="card"><h3>M11 四岗泡面级SOP(点步骤展开·全字段)</h3>
  <div class="row" style="margin-bottom:6px">${['mkt','ad','ops','crm'].map(r=>`<button class="sopTab" data-sop="${r}">${ROLES[r].n}</button>`).join('')}</div>
  <div id="sopBody">${sopSteps(sopRole, openStep)}</div></div>`;
  return h;
}
function sopSteps(r, openId){
  const steps=SOP_STEPS.filter(s=>s.owner===r);
  return `<div class="tiny" style="margin-bottom:6px">${SOPS_META[r]} · 每步:owner/Input/Process/Output/KPI公式/目标/历史最佳/当前值/判定/SLA/HITL/next_owner/evidence</div>`+
  steps.map(s=>{
    const judge = s.current>=s.target? '达标' : (s.current>=s.target*0.9?'临界':'未达');
    return `<div class="jnode sopStep ${openId===s.id?'open':''}" data-step="${s.id}"><div class="spread"><b>${s.id} · ${s.name}</b><span class="pill p-${judge==='达标'?'green':judge==='临界'?'amber':'red'}">${judge}</span></div>
    <div class="sopDetail" style="display:${openId===s.id?'block':'none'};margin-top:8px">
      <table>
      <tr><th>owner</th><td>${ROLES[s.owner].n}</td><th>SLA</th><td>${s.sla_hours}h · HITL:${s.hitl?'是':'否'}</td></tr>
      <tr><th>Input</th><td colspan="3">${s.input.join(' · ')}</td></tr>
      <tr><th>Process</th><td colspan="3">${s.process.map((p,i)=>(i+1)+'.'+p).join(' → ')}</td></tr>
      <tr><th>Output</th><td colspan="3">${s.output} → 交接:${s.next_owner==='—'?'—':ROLES[s.next_owner]?ROLES[s.next_owner].n:s.next_owner}${s.next_step&&s.next_step!=='—'?'·'+s.next_step:''}</td></tr>
      <tr><th>KPI</th><td>${s.kpi}</td><th>公式</th><td>${s.formula}</td></tr>
      <tr><th>目标</th><td>${s.target}</td><th>历史最佳/当前</th><td>${s.historical_best} / <b>${s.current}</b></td></tr>
      <tr><th>evidence</th><td colspan="3">${s.evidence.join(' · ')}</td></tr>
      </table>
      <div class="row" style="margin-top:8px">
        <button data-sop-dispatch="${s.id}">按此步骤派任务</button>
        <button data-sop-tasks="${s.id}">查看当前绑定任务</button>
        <button data-sop-hist="${s.id}">历史成功样本</button>
        <button data-go-s1ho="1">去下游交接</button>
      </div></div></div>`;
  }).join('');
}

/* ====== PC补强:屏7主管模块(P1) ====== */
function renderPortfolio(){
  const agg={};
  STAGE_ORDER.forEach(s=>agg[s]={n:0,gmv:0,profit:0});
  SKUS.forEach(k=>{agg[k.stage].n++;agg[k.stage].gmv+=k.m.normal.gmv;agg[k.stage].profit+=k.m.normal.profit});
  const sug={intro:'继续小额测试',growth:'放大(守线)',mature:'维持·收口投放',decline:'停投验残值',renew:'受控重启',retire:'体面收尾'};
  const sim=S.simPct??0;
  const g0=SKUS.filter(k=>k.stage==='growth').reduce((s,k)=>s+k.m.normal.gmv,0);
  const est={gmv:Math.round(g0*(1+sim/100*0.6)), profit:Math.round(g0*0.126*(1+sim/100*0.35)), free:Math.round(31*(1+sim/100*0.1)), rep:11, risk:sim>30?'高(透支自然力)':sim<-30?'高(权重回落)':'中'};
  return `<div class="card"><h3>生命周期组合与资源决策(品类层)</h3>
  <table><tr><th>阶段</th><th>SKU数</th><th>GMV/期</th><th>利润/期</th><th>建议</th></tr>
  ${STAGE_ORDER.map(s=>`<tr><td>${STAGES[s].n}</td><td>${agg[s].n}</td><td>${fmt(agg[s].gmv,'元')}</td><td>${fmt(agg[s].profit,'元')}</td><td class="tiny">${sug[s]}</td></tr>`).join('')}</table>
  <h4>战略SKU例外</h4>

    ids.forEach(id=>{const t=S.tasks.find(x=>x.id===id); if(!t)return;
      if(act==='owner')t.role='cmd'; if(act==='pri')t.priority='high';
      if(act==='due'&&t.due_at)t.due_at+=48*3600e3; if(act==='esc')audit('TASK_ESCALATED',t.id);
    });
    audit('BATCH_ACTION',act+' ×'+ids.length+' 理由:'+reason);
    toast('批量已执行并审计'); S.teamSel=[]; S.batchArm=null; rerender();
  });
  const bbc=$('#btnBatchCancel'); if(bbc)bbc.addEventListener('click',()=>{S.batchArm=null;toast('已取消批量');rerender()});
  const bpf=$('#btnPerf'); if(bpf)bpf.addEventListener('click',loadPerf);
  const bex=$('#btnExport'); if(bex)bex.addEventListener('click',()=>{
    if(!['mgr','fin'].includes(S.role)){toast('权限不足:导出需主管/财务');return}
    audit('EXPORTED','团队任务导出·加水印·OneID个人级字段已脱敏排除');
    toast('导出完成(MOCK):含水印,个人级OneID数据默认排除');
  });
  m.querySelectorAll('.exTile').forEach(el=>el.addEventListener('click',()=>{
    const mM=execMetrics().find(x=>x.k===el.dataset.ex);
    S.teamFilter=Object.assign({role:'',sku:'',status:'',src:''},mM.drill); S.teamPage=1; rerender();
    toast('已按『'+mM.n+'』下钻团队全景');
  }));
  m.querySelectorAll('[data-fin]').forEach(el=>el.addEventListener('click',()=>jump(5)));
  /* 屏7 P1模块 */
  m.querySelectorAll('.dimTab').forEach(el=>el.addEventListener('click',()=>{S.dimOpen=el.dataset.dim;rerender()}));
  const bsim=$('#btnSim'); if(bsim)bsim.addEventListener('click',()=>{S.simPct=parseFloat($('#simPct').value)||0;rerender()});
  const bsa=$('#btnSimAdopt'); if(bsa)bsa.addEventListener('click',()=>{
    S.pending.push({id:'HITL-'+(S.penSeq++),type:'预算模拟采纳',title:'成长期预算'+(S.simPct>=0?'+':'')+(S.simPct||0)+'%(AI建议·需核定)',by:S.role,skuId:S.skuId,status:'pending',reason:'模拟结果采纳'});
    audit('HITL_REQUESTED','预算模拟采纳'); toast('已进HITL队列;AI不自动执行涉钱'); rerender();
  });
  const bst=$('#btnStr'); if(bst)bst.addEventListener('click',()=>{
    const w=$('#strW').value, why=$('#strWhy').value.trim(), bud=$('#strBud').value, dt=$('#strDate').value;
    if(!w||!why||!dt){toast('战略权重/救援理由/复查周期必填');return}
    S.pending.push({id:'HITL-'+(S.penSeq++),type:'战略SKU例外',title:'战略SKU '+$('#strSku').value+' 权重'+w+' 预算¥'+(bud||0)+' 复查'+dt,by:S.role,skuId:$('#strSku').value,status:'pending',reason:why});
    audit('HITL_REQUESTED','战略SKU例外'); toast('战略例外已进HITL'); rerender();
  });
  m.querySelectorAll('[data-jbp-split]').forEach(el=>el.addEventListener('click',()=>{
    const c=S.jbp.commitments.find(x=>x.id===el.dataset.jbpSplit);
    const t=stampTask({id:'T-'+(S.taskSeq++), title:'JBP承诺:'+c.text.slice(0,20), role:c.owner==='mgr'?'cmd':c.owner, sop:c.owner==='mkt'?'A-11':c.owner==='ops'?'P-2':'—', src:'JBP承诺', skuId:S.skuId, status:'open', baseline:null,target:1,result:null,verify:null,fixed:false,upStd:'JBP Scorecard',ruleKey:null, sla_h:72, jbp:c.id});
    S.tasks.push(t); c.linked_task=t.id; c.status='已拆解';
    audit('TASK_CREATED','JBP承诺拆任务 '+c.id+'→'+t.id); toast('承诺已拆为任务并绑定Scorecard'); rerender();
  }));
  const bjr=$('#btnJbpReview'); if(bjr)bjr.addEventListener('click',()=>{
    const note=$('#jbpNote').value.trim(); if(!note){toast('复盘结论必填');return}
    const done=S.jbp.commitments.filter(c=>c.linked_task&&(S.tasks.find(t=>t.id===c.linked_task)||{}).verify==='valid').length;
    const rate=Math.round(done/S.jbp.commitments.length*100);
    S.jbp.reviews.unshift({t:ev0('J','x').t, note, rate});
    audit('JBP_REVIEWED',S.jbp.jbp_id+' 完成率'+rate+'% '+note); toast('JBP复盘完成留痕'); rerender();
  });
  /* 规则历史/回放/回滚 */
  m.querySelectorAll('[data-rule-hist]').forEach(el=>el.addEventListener('click',()=>{
    const r=RULES.find(x=>x.id===el.dataset.ruleHist);
    $('#ruleOut').innerHTML=`<div class="jsonbox" style="margin-top:8px">${escJson({rule:r.id, current:{version:r.version,expr:r.expr,effective:r.effective}, history:r.hist})}</div>`;
  }));
  m.querySelectorAll('[data-rule-replay]').forEach(el=>el.addEventListener('click',()=>{
    const res=ruleReplay(el.dataset.ruleReplay);
    if(!res.ok){toast(res.msg);return}
    $('#ruleOut').innerHTML=`<div class="card" style="margin-top:8px"><h4>回放对比:${res.old.version} vs 现行</h4>
    <div class="sub">判定翻转SKU数:<b>${res.affected.length}</b></div>
    ${res.affected.map(a=>`<div class="tiny">${a.sku} · 旧口径:${a.old} → 新口径:${a.now}</div>`).join('')||'<div class="tiny">当前假水下无判定翻转</div>'}</div>`;
    toast('回放完成(按历史阈值重算判定)');
  }));
  m.querySelectorAll('[data-rule-roll]').forEach(el=>el.addEventListener('click',()=>{
    if(S.role!=='mgr'){toast('权限不足:仅主管可回滚规则');return}
    const rs=m.querySelector(`.ruleReason[data-r="${el.dataset.ruleRoll}"]`);
    if(!rs.value.trim()){toast('回滚理由必填');return}
    if(ruleRollback(el.dataset.ruleRoll, rs.value.trim())){toast('规则已回滚(留痕·可再回滚回来)');rerender()}
  }));
}

/* ---------- 顶层控件 ---------- */
function boot(){
  $('#roleBox').innerHTML=Object.keys(ROLES).map(r=>`<button class="roleb" data-r="${r}">${ROLES[r].n.split('/')[0].split(' ')[0]}</button>`).join('');
  document.querySelectorAll('.roleb').forEach(b=>b.addEventListener('click',()=>{S.role=b.dataset.r;audit('ROLE_SWITCH',ROLES[S.role].n);rerender()}));
  $('#skuSel').innerHTML=SKUS.map(k=>`<option value="${k.id}">${k.name}(${STAGES[k.stage].n})</option>`).join('');
  $('#skuSel').addEventListener('change',e=>{S.skuId=e.target.value;S.stageOverride=null;rerender()});
  $('#stgBox').innerHTML=STAGE_ORDER.map(s=>`<button class="stgb" data-st="${s}">${STAGES[s].n}</button>`).join('');
  document.querySelectorAll('.stgb').forEach(b=>b.addEventListener('click',()=>{S.stageOverride=b.dataset.st;toast('查看'+STAGES[b.dataset.st].n+'期口径(真实阶段迁移需Gate+主管裁决)');rerender()}));
  $('#cyN').addEventListener('click',()=>{S.cycle='normal';rerender()});
  $('#cyC').addEventListener('click',()=>{S.cycle='campaign';toast('大促cycle:双账分列·不用于毕业判定');rerender()});
  document.querySelectorAll('.navb').forEach(b=>b.addEventListener('click',()=>{S.screen=+b.dataset.s;rerender()}));
  $('#mnav').innerHTML=[1,2,3,4,5,6,7].map(i=>`<button data-s="${i}">${['今日','J旅程','N引擎','校准','三本账','任务','驾驶舱'][i-1]}</button>`).join('');
  document.querySelectorAll('#mnav button').forEach(b=>b.addEventListener('click',()=>{S.screen=+b.dataset.s;rerender()}));
  /* P0-02: #sideBody 事件委托(动态按钮稳绑) */
  $('#sideBody').addEventListener('click',e=>{
    const b=e.target.closest('[data-t-metric]');
    if(b&&b.dataset.tMetric){ jump(1); drill(b.dataset.tMetric); }
  });
  S.jbp=JBP_MOCK;
  const restored=restoreState();
  hashRead();
  if(S.role==='mgr'&&!S._hashHadScreen)S.screen=6; /* 主管默认进"需要我处理":仅当深链接未显式指定屏 */
  if(restored)toast('已从持久化恢复上次状态(trial=localStorage;生产=API)');
  /* 深链接复制+重置 */
  const mk=$('#mockBadge');
  if(mk){
    mk.insertAdjacentHTML('afterend',' <button id="btnLink" class="cyb" title="复制深链接">🔗链接</button><button id="btnReset" class="cyb" title="重置试跑数据">重置</button>');
    $('#btnLink').addEventListener('click',()=>{
      hashWrite();
      const url=location.href;
      try{navigator.clipboard.writeText(url).then(()=>toast('深链接已复制(含屏/角色/SKU/Cycle/筛选)'))}catch(e){toast('深链接: '+url)}
    });
    $('#btnReset').addEventListener('click',resetTrial);
  }
  /* 可访问性:导航ARIA+瓦片键盘可达 */
  document.querySelectorAll('.tabs,.stagestrip').forEach(n=>n.setAttribute('role','navigation'));
  document.querySelectorAll('.navb').forEach(b=>b.setAttribute('aria-label','切换到'+b.textContent));
  try{
    window.addEventListener('beforeunload',flushPersist);
    document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')flushPersist()});
  }catch(e){}
  document.body.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&e.target&&e.target.classList&&(e.target.classList.contains('tile')||e.target.classList.contains('chk'))) e.target.click();
  });
  audit('DATA_INGESTED','MOCK假水装载:6 SKU × 双cycle × 交接/费用/规则全事件模型');
  rerender();
}
function hashWrite(){
  try{
    const f=S.teamFilter||{};
    const q='s='+S.screen+'&r='+S.role+'&k='+S.skuId+'&c='+S.cycle+(S.stageOverride?'&st='+S.stageOverride:'')+
      (S.supQOpen?'&q='+S.supQOpen:'')+(S.dimOpen?'&d='+encodeURIComponent(S.dimOpen):'')+
      (f.role||f.sku||f.status||f.src? '&fr='+(f.role||'')+'&fk='+(f.sku||'')+'&fs='+(f.status||'')+'&fq='+encodeURIComponent(f.src||''):'');
    if(typeof history!=='undefined'&&history.replaceState) history.replaceState(null,'','#'+q);
    else location.hash=q;
  }catch(e){}
}
function hashRead(){
  try{
    const raw=(location.hash||'').replace(/^#/,''); if(!raw)return false;
    const p=new URLSearchParams(raw);
    if(p.get('r')&&ROLES[p.get('r')])S.role=p.get('r');
    if(p.get('k')&&SKUS.some(x=>x.id===p.get('k')))S.skuId=p.get('k');
    if(p.get('c'))S.cycle=p.get('c')==='campaign'?'campaign':'normal';
    if(p.get('st')&&STAGES[p.get('st')])S.stageOverride=p.get('st');
    S._hashHadScreen=p.has('s');
    if(p.get('s'))S.screen=Math.min(7,Math.max(1,+p.get('s')||1));
    if(p.get('q')&&SUP_QUEUES[p.get('q')])S.supQOpen=p.get('q');
    if(p.get('d'))S.dimOpen=decodeURIComponent(p.get('d'));
    if(p.get('fr')!==null&&p.get('fr')!==undefined)S.teamFilter={role:p.get('fr')||'',sku:p.get('fk')||'',status:p.get('fs')||'',src:decodeURIComponent(p.get('fq')||'')};
    return true;
  }catch(e){return false}
}
window.setStage=(s)=>{S.stageOverride=s;rerender()};
window.setRole=(r)=>{S.role=r;rerender()};
window.setScreen=(n)=>{S.screen=n;rerender()};
window.setCycle=(c)=>{S.cycle=c;rerender()};
window.S=S; window.SKUS=SKUS; window.RULES=RULES; window.gateEval=gateEval; window.n3pass=n3pass; window.calibDone=calibDone;
window.firedRules=firedRules; window.generateTasksFromRules=generateTasksFromRules; window.ruleReplay=ruleReplay; window.ruleRollback=ruleRollback;
window.persistState=persistState; window.flushPersist=flushPersist; window.schedulePersist=schedulePersist; window.loadStateFrom=loadStateFrom; window.restoreState=restoreState; window.hashWrite=hashWrite; window.hashRead=hashRead;
window.buildPostReview=buildPostReview; window.execMetrics=execMetrics; window.syncSupervisorTasks=syncSupervisorTasks; window.supBack=supBack; window.backedFor=backedFor; window.teamRows=teamRows; window.loadPerf=loadPerf; window.incentiveRows=incentiveRows; window.mvalFor=mvalFor; window.jump=jump; window.ruleEvidence=ruleEvidence; window.SOP_STEPS=SOP_STEPS; window.ONEID_ROWS=ONEID_ROWS;
(function(){try{const p=new URLSearchParams(location.search);if(p.get('role')&&ROLES[p.get('role')])S.role=p.get('role');if(p.get('sku'))S.skuId=p.get('sku')}catch(e){}})();
boot();

</script>
